    class SoundEngine {
        constructor(theme) {
            this.theme = theme;
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            this.master = this.ctx.createGain(); this.master.gain.value = 0.25; this.master.connect(this.ctx.destination);
        }
        tryResume() { if(this.ctx.state === 'suspended') this.ctx.resume().catch(console.error); }
        play(freq, type='sine', dur=0.1, vol=1, slide=null) {
            if(this.ctx.state === 'suspended') this.ctx.resume();
            const finalFreq = freq * this.theme.pitch;
            const finalDur = dur / this.theme.speed;
            const osc = this.ctx.createOscillator(); const g = this.ctx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(finalFreq, this.ctx.currentTime);
            if(slide) osc.frequency.linearRampToValueAtTime(slide * this.theme.pitch, this.ctx.currentTime + finalDur);
            g.gain.setValueAtTime(vol, this.ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + finalDur);
            osc.connect(g); g.connect(this.master);
            osc.start(); osc.stop(this.ctx.currentTime + finalDur);
        }

            if (this.colorScheme.accent) this.COLORS.accent = toHex(this.colorScheme.accent);
            if (this.colorScheme.gold) this.COLORS.gold = toHex(this.colorScheme.gold);
            if (this.colorScheme.spin) this.COLORS.spin = toHex(this.colorScheme.spin);
            if (this.colorScheme.btnActive) this.COLORS.btnActive = toHex(this.colorScheme.btnActive);
            if (this.colorScheme.btnIdle) this.COLORS.btnIdle = toHex(this.colorScheme.btnIdle);
            if (this.colorScheme.text) this.COLORS.text = this.colorScheme.text;
            
            // Helper function to load asset with fallback to default machine
            const loadAssetWithFallback = (key, path, type = 'image') => {
                const defaultPath = this.defaultMachineFolder + path.replace(this.machineFolder, '');
                if (type === 'image') {
                    this.load.image(key, this.machineFolder + path);
                    // Also load default version as fallback
                    this.load.image(key + '_default', defaultPath);
                } else if (type === 'audio') {
                    this.load.audio(key, this.machineFolder + path);
                    // Also load default version as fallback
                    this.load.audio(key + '_default', defaultPath);
                }
            };
            
            // Track which assets failed to load
            this.failedAssets = new Set();
            this.load.on('filecomplete', (key, type, data) => {
                // If an asset failed, we'll use the default version
            });
            this.load.on('loaderror', (file) => {
                // Mark this asset as failed
                this.failedAssets.add(file.key);
            });
            
            // Load assets with fallback support
            this.sprites.forEach(s => { 
                if(s.imageUrl) {
                    loadAssetWithFallback('gen_'+s.id, 'assets/'+s.id+'.png', 'image');
                }
            });
            this.uiAssets.forEach(u => { 
                if(u.imageUrl) {
                    loadAssetWithFallback('gen_'+u.id, 'assets/'+u.id+'.png', 'image');
                }
            });
            if(this.logo && this.logo.imageUrl) {
                loadAssetWithFallback('gen_LOGO', 'assets/LOGO.png', 'image');
            }
            if(this.hasMusic) {
                loadAssetWithFallback('bgm', 'assets/music.mp3', 'audio');
            }
            if(this.sfxFlags.spin) loadAssetWithFallback('sfx_spin', 'assets/spin.mp3', 'audio');
            if(this.sfxFlags.stop) loadAssetWithFallback('sfx_stop', 'assets/stop.mp3', 'audio');
            if(this.sfxFlags.win) loadAssetWithFallback('sfx_win', 'assets/win.mp3', 'audio');
            if(this.sfxFlags.bigWin) loadAssetWithFallback('sfx_bigwin', 'assets/bigwin.mp3', 'audio');
            if(this.sfxFlags.click) loadAssetWithFallback('sfx_click', 'assets/click.mp3', 'audio');
            if(this.sfxFlags.scatter) loadAssetWithFallback('sfx_scatter', 'assets/scatter.mp3', 'audio');
            if(this.sfxFlags.bonusTrigger) loadAssetWithFallback('sfx_bonustrigger', 'assets/bonustrigger.mp3', 'audio');
            if(this.sfxFlags.jam) loadAssetWithFallback('sfx_jam', 'assets/jam.mp3', 'audio');
            
            // Helper function to get asset key with fallback
            this.getAssetKey = (key) => {
                // Check if we have a fallback mapping
                if (this.textureFallbacks && this.textureFallbacks[key]) {
                    return this.textureFallbacks[key];
                }
                if (this.audioFallbacks && this.audioFallbacks[key]) {
                    return this.audioFallbacks[key];
                }
                // Check if current machine's asset exists
                if (this.textures.exists(key) || (this.cache.audio && this.cache.audio.exists(key))) {
                    return key;
                }
                // Fall back to default machine's asset
                const defaultKey = key + '_default';
                if (this.textures.exists(defaultKey) || (this.cache.audio && this.cache.audio.exists(defaultKey))) {
                    return defaultKey;
                }
                // If neither exists, return original key (will fail gracefully)
                return key;
            };
            
            // Helper function to get audio key with fallback
            this.getAudioKey = (key) => {
                // Always check if current machine's audio exists first
                // This ensures machines with their own audio files use them
                // even if a fallback was set from a previous machine
                if (this.cache.audio && this.cache.audio.exists(key)) {
                    return key;
                }
                // Check if we have an audio fallback mapping
                if (this.audioFallbacks && this.audioFallbacks[key]) {
                    return this.audioFallbacks[key];
                }
                // Fall back to default machine's audio
                const defaultKey = key + '_default';
                if (this.cache.audio && this.cache.audio.exists(defaultKey)) {
                    return defaultKey;
                }
                // If neither exists, return original key (will fail gracefully)
                return key;
            };
            
            // Start loading assets
            this.load.once('complete', () => {
                // For any assets that failed to load, use default versions
                const assetKeys = [];
                this.sprites.forEach(s => { if(s.imageUrl) assetKeys.push('gen_'+s.id); });
                this.uiAssets.forEach(u => { if(u.imageUrl) assetKeys.push('gen_'+u.id); });
                if(this.logo && this.logo.imageUrl) assetKeys.push('gen_LOGO');
                
                assetKeys.forEach(key => {
                    if (!this.textures.exists(key) && this.textures.exists(key + '_default')) {
                        // Create a reference to the default texture using the original key
                        // Phaser doesn't support aliasing, so we'll use the default key directly
                        // Store mapping for later use
                        if (!this.textureFallbacks) this.textureFallbacks = {};
                        this.textureFallbacks[key] = key + '_default';
                    }
                });
                
                // Handle audio fallbacks - check for failed loads or missing files
                const audioKeys = ['bgm', 'sfx_spin', 'sfx_stop', 'sfx_win', 'sfx_bigwin', 'sfx_click', 'sfx_scatter', 'sfx_bonustrigger', 'sfx_jam'];
                if (!this.audioFallbacks) this.audioFallbacks = {};
                audioKeys.forEach(key => {
                    // Check if the current machine's audio failed to load or doesn't exist
                    const currentExists = this.cache.audio && this.cache.audio.exists(key);
                    const defaultExists = this.cache.audio && this.cache.audio.exists(key + '_default');
                    const failedToLoad = this.failedAssets && this.failedAssets.has(key);
                    
                    // Use default if current doesn't exist or failed to load
                    if ((!currentExists || failedToLoad) && defaultExists) {
                        // For audio, we'll use the default key directly when playing
                        // Store mapping for later use
                        this.audioFallbacks[key] = key + '_default';
                    } else if (!currentExists && !defaultExists) {
                        // If neither exists, try to use default anyway (might load later)
                        // This handles cases where the file doesn't exist but we want to try default
                        console.warn(`Audio file ${key} not found for machine ${this.machineFolder}, will try default if available`);
                    }
                });
                
                if (!this.textures.exists('gen_ICON_COIN')) {
                    const g = this.make.graphics({x:0, y:0, add:false});
                    g.fillStyle(this.COLORS.gold, 1); g.fillCircle(16, 16, 16); g.lineStyle(2, 0xffffff, 0.5); g.strokeCircle(16, 16, 16); g.generateTexture('gen_ICON_COIN', 32, 32);
                }
                
                // Stop any existing music before starting new
                if (this.sound) {
                    this.sound.stopAll();
                }
                
                if (this.hasMusic) {
                    const bgmKey = this.getAudioKey('bgm');
                    try { this.sound.add(bgmKey, { loop: true, volume: this.musicVolume }).play(); } catch(e) {}
                }
                this.initGame();
            });
            this.load.start();
        }
        
        initGame() { this.generateTextures(); this.createBackground(); this.createReels(); this.createOverlayLayers(); this.createControls(); this.createBackButton(); this.createSettingsButton(); this.createSettingsPopup(); }
        

        generateTextures() {
            SYMBOL_DEFS.forEach(s => {
                // Check if texture already exists to avoid "Texture key already in use" errors
                if (this.textures.exists('sym_'+s.id)) {
                    return; // Skip if already exists
                }
                
                const spriteData = this.sprites.find(sd => sd.id === s.id);
                const spriteKey = this.getAssetKey('gen_'+s.id);
                const hasCustomImage = spriteData && spriteData.imageUrl && this.textures.exists(spriteKey);
                const rt = this.add.renderTexture(-1000, -1000, 130, 130);
                
                if (hasCustomImage) {
                   const img = this.make.image({ key: spriteKey, add: false });
                   const scale = Math.min(120 / img.width, 120 / img.height);
                   img.setScale(scale);
                   const bg = this.make.graphics({x:0, y:0, add:false});
                   bg.fillStyle(0x000000, 0.4); bg.fillRoundedRect(5, 5, 120, 120, 15); bg.lineStyle(2, this.COLORS.gold, 0.5); bg.strokeRoundedRect(5, 5, 120, 120, 15);
                   rt.draw(bg, 0, 0); rt.draw(img, 65, 65);
                } else {
                    const g = this.make.graphics({x:0, y:0, add:false});
                    g.fillStyle(0x000000, 0.3); g.fillRoundedRect(5, 5, 120, 120, 15);
                    if(s.type === 'ROYAL') { g.lineStyle(4, parseInt(s.color.replace('#','0x')), 1); g.strokeRoundedRect(10, 10, 110, 110, 15); rt.draw(g); const t = this.make.text({ text: s.id, style: { fontSize: s.id.length > 1 ? '70px' : '85px', fontFamily: 'Righteous', color: s.color, stroke: '#ffffff', strokeThickness: 6 } }).setOrigin(0.5); rt.draw(t, 65, 65); }
                    else { g.fillStyle(0xffd700, 1); g.fillRoundedRect(10, 35, 110, 60, 5); rt.draw(g); }
                }
                rt.saveTexture('sym_'+s.id);
                const tempImg = this.make.image({ key: 'sym_'+s.id, add: false });
                
                // Check if blur texture already exists
                if (!this.textures.exists('sym_blur_'+s.id)) {
                const rtb = this.add.renderTexture(-1000,-1000,130,130);
                for(let i=-20; i<20; i+=8) { rtb.draw(tempImg, 65, 65+i, 0.15); }
                rtb.saveTexture('sym_blur_'+s.id);
                    rtb.destroy();
                }
                rt.destroy();
            });
            
            // Only create sparkle texture if it doesn't exist
            if (!this.textures.exists('sparkle')) {
                const p = this.make.graphics({x:0,y:0,add:false}); p.fillStyle(this.COLORS.accent, 1); p.fillCircle(5,5,5); p.generateTexture('sparkle', 10, 10);
            }
        }

        createBackground() {
            this.bg = this.add.graphics();
            this.setBgColor(false);
            this.bgParticles = this.add.particles(0, 0, 'sparkle', { x: { min: 0, max: 720 }, y: 1300, speedY: { min: -50, max: -100 }, scale: { start: 0.5, end: 0 }, alpha: { start: 0.5, end: 0 }, lifespan: 8000, quantity: 1, frequency: 300 });
            
            const headerGraphics = this.add.graphics();
            const headerColors = this.extractedColors['gen_LOGO'];
            const headerLineY = CONFIG.offsetY - 25;

            if (headerColors) {
                headerGraphics.fillGradientStyle(headerColors.tl, headerColors.tr, headerColors.bl, headerColors.br, 1);
                headerGraphics.fillRect(0, 0, CONFIG.width, headerLineY);
                headerGraphics.lineStyle(4, this.COLORS.accent, 0.8);
                headerGraphics.lineBetween(0, headerLineY, CONFIG.width, headerLineY);
            }
            // Ensure header graphics don't block input
            headerGraphics.setDepth(-1);

            const frame = this.add.graphics();
            frame.lineStyle(16, this.COLORS.frame); frame.strokeRoundedRect(CONFIG.offsetX-8, CONFIG.offsetY-8, CONFIG.reelCount*CONFIG.reelWidth+16, CONFIG.rowCount*CONFIG.symbolSize+16, 20);

            const logoKey = this.getAssetKey('gen_LOGO');
            if (logo.imageUrl && this.textures.exists(logoKey)) {
                const headerCenterY = (CONFIG.offsetY / 2) - 10;
                const titleImg = this.add.image(CONFIG.width/2, headerCenterY, logoKey);
                const targetWidth = (CONFIG.reelCount * CONFIG.reelWidth); 
                const targetHeight = CONFIG.offsetY - 40;
                const scale = Math.min(targetWidth / titleImg.width, targetHeight / titleImg.height);
                titleImg.setScale(scale);
                this.tweens.add({ targets: titleImg, scale: scale*1.02, duration: 2000, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
            }
        }

        setBgColor(isBonus) {
            this.bg.clear();
            if(!this.textures.exists('bgGradient')) {
                const cvs = document.createElement('canvas'); cvs.width=720; cvs.height=1280;
                const ctx = cvs.getContext('2d');
                if (ctx) {
                    const grd = ctx.createRadialGradient(360, 640, 0, 360, 640, 800);
                    grd.addColorStop(0, this.colorScheme.bgTop); grd.addColorStop(1, this.colorScheme.bgBot);
                    ctx.fillStyle = grd; ctx.fillRect(0,0,720,1280);
                    this.textures.addCanvas('bgGradient', cvs);
                }
            }
            if(!this.textures.exists('bgBonus')) {
                const cvs = document.createElement('canvas'); cvs.width=720; cvs.height=1280;
                const ctx = cvs.getContext('2d');
                if (ctx) {
                    const grd = ctx.createRadialGradient(360, 640, 0, 360, 640, 800);
                    grd.addColorStop(0, '#800000'); grd.addColorStop(1, '#1a0000');
                    ctx.fillStyle = grd; ctx.fillRect(0,0,720,1280);
                    this.textures.addCanvas('bgBonus', cvs);
                }
            }
            this.add.image(360, 640, isBonus ? 'bgBonus' : 'bgGradient').setDepth(-10);
        }

        createReels() {
            // Clear any existing reels before creating new ones
            if (this.reels && this.reels.length > 0) {
                this.reels.forEach(r => {
                    if (r.tween) r.tween.stop();
                    if (r.container) r.container.destroy();
                });
                this.reels = [];
            }
            
            this.add.rectangle(CONFIG.width/2, CONFIG.offsetY + (CONFIG.rowCount*CONFIG.symbolSize)/2, CONFIG.reelCount*CONFIG.reelWidth, CONFIG.rowCount*CONFIG.symbolSize, 0x000000, 0.7);
            const maskShape = this.make.graphics({x:0,y:0,add:false}).fillStyle(0xffffff).fillRect(CONFIG.offsetX, CONFIG.offsetY, CONFIG.reelCount*CONFIG.reelWidth, CONFIG.rowCount*CONFIG.symbolSize);
            const mask = maskShape.createGeometryMask();
            for(let i=0; i<CONFIG.reelCount; i++) {
                const container = this.add.container(CONFIG.offsetX + (CONFIG.reelWidth/2) + (i*CONFIG.reelWidth), CONFIG.offsetY);
                container.setMask(mask);
                const sprites = [];
                for(let j=-1; j<CONFIG.rowCount+1; j++) {
                    const s = this.add.sprite(0, (j*CONFIG.symbolSize)+(CONFIG.symbolSize/2), 'sym_9');
                    container.add(s); sprites.push(s);
                }
                this.reels.push({ container, sprites, isTeasing: false });
                if(i>0) this.add.rectangle(CONFIG.offsetX+(i*CONFIG.reelWidth), CONFIG.offsetY+200, 2, CONFIG.rowCount*CONFIG.symbolSize, 0xffffff, 0.1);
            }
            const glass = this.add.graphics();
            glass.fillStyle(0xffffff, 0.08); glass.fillRect(CONFIG.offsetX, CONFIG.offsetY, CONFIG.reelCount*CONFIG.reelWidth, (CONFIG.rowCount*CONFIG.symbolSize)/2);
        }

        createOverlayLayers() {
            this.sparkleEmitter = this.add.particles(0, 0, 'sparkle', { speed: { min: 50, max: 150 }, scale: { start: 1, end: 0 }, blendMode: 'ADD', lifespan: 600, gravityY: 0, emitting: false, rotate: { min: 0, max: 360 } }).setDepth(1001);
            this.coinEmitter = this.add.particles(0, 0, 'gen_ICON_COIN', { speedY: { min: -600, max: -900 }, speedX: { min: -300, max: 300 }, gravityY: 1200, scale: { start: 0.15, end: 0.15 }, rotate: { min: 0, max: 360 }, lifespan: 3000, emitting: false, quantity: 4 }).setDepth(2001);

            this.winLayer = this.add.container(0,0).setDepth(999);
            this.winGraphics = this.add.graphics();
            this.winLayer.add(this.winGraphics);
            this.popupLayer = this.add.container(CONFIG.width/2, CONFIG.height/2).setDepth(3000).setVisible(false);
            this.popBg = this.add.graphics();
            this.popTitle = this.add.text(0,-50, "", { fontSize: '60px', fontFamily:'Righteous', color: '#ffdd00', align:'center', stroke:'#000', strokeThickness:6 }).setOrigin(0.5);
            this.popSub = this.add.text(0, 60, "", { fontSize: '60px', fontFamily:'Rye', color: this.COLORS.text, align:'center', stroke:'#000', strokeThickness:4 }).setOrigin(0.5);
            this.popImage = this.add.image(0, -50, '').setOrigin(0.5).setVisible(false);
            
            this.popupLayer.setInteractive(new Phaser.Geom.Rectangle(-300, -200, 600, 400), Phaser.Geom.Rectangle.Contains).on('pointerdown', () => { if (this.isCelebrating) { this.stopCelebration(true); } });
            this.popupLayer.add([this.popBg, this.popTitle, this.popSub, this.popImage]);
        }
        
        createBackButton() {
            const x = 20;
            const y = 20;
            const iconSize = 32;
            const iconRadius = 14;
            
            // Create container - position it so left edge aligns with x
            // Container position is its center, so we offset by half the width
            const btnBack = this.add.container(x + iconSize / 2, y + iconSize / 2);
            btnBack.setDepth(20001);
            btnBack.setScrollFactor(0);
            
            // Create background circle at container center (0, 0)
            const bgBack = this.add.circle(0, 0, iconRadius, 0x333333, 0.9);
            bgBack.setStrokeStyle(2, 0x888888);
            
            // Create back arrow icon using graphics
            const arrowIcon = this.add.graphics();
            arrowIcon.lineStyle(2.5, 0xffffff, 1);
            arrowIcon.lineCap = 'round';
            arrowIcon.lineJoin = 'round';
            
            // Draw left-pointing arrow (chevron style)
            arrowIcon.beginPath();
            arrowIcon.moveTo(-5, 0);
            arrowIcon.lineTo(2, -5);
            arrowIcon.moveTo(-5, 0);
            arrowIcon.lineTo(2, 5);
            arrowIcon.strokePath();
            
            // Add to container
            btnBack.add([bgBack, arrowIcon]);
            
            // Set size and make interactive
            btnBack.setSize(iconSize, iconSize);
            btnBack.setInteractive({ useHandCursor: true });
            btnBack.on('pointerdown', () => {
                this.playClickSound();
                // Stop all sounds before leaving
                if (this.sound) {
                    this.sound.stopAll();
                }
                // Return to menu
                this.scene.start('MenuScene');
            });
            
            this.btnBack = btnBack;
        }
        
        createSettingsButton() {
            const x = CONFIG.width - 20;
            const y = 20;
            const iconSize = 32;
            const iconRadius = 14;
            
            // Create container - position it so right edge aligns with x
            // Container position is its center, so we offset by half the width
            const btnSettings = this.add.container(x - iconSize / 2, y + iconSize / 2);
            btnSettings.setDepth(20001);
            btnSettings.setScrollFactor(0);
            
            // Create background circle at container center (0, 0)
            const bgSettings = this.add.circle(0, 0, iconRadius, 0x333333, 0.9);
            bgSettings.setStrokeStyle(2, 0x888888);
            
            // Create gear icon using graphics - standard settings gear shape
            const gearIcon = this.add.graphics();
            gearIcon.lineStyle(2.5, 0xffffff, 1);
            
            // Draw gear shape - outer circle with teeth
            const gearRadius = 8;
            const numTeeth = 8;
            const toothDepth = 2;
            
            gearIcon.beginPath();
            for (let i = 0; i <= numTeeth * 2; i++) {
                const angle = (i * Math.PI) / numTeeth;
                let radius;
                if (i % 2 === 0) {
                    radius = gearRadius;
                } else {
                    radius = gearRadius - toothDepth;
                }
                const x = Math.cos(angle) * radius;
                const y = Math.sin(angle) * radius;
                if (i === 0) {
                    gearIcon.moveTo(x, y);
                } else {
                    gearIcon.lineTo(x, y);
                }
            }
            gearIcon.closePath();
            gearIcon.strokePath();
            
            // Draw inner circle
            gearIcon.strokeCircle(0, 0, gearRadius - toothDepth - 1);
            
            // Add to container
            btnSettings.add([bgSettings, gearIcon]);
            
            // Set size and make interactive - exactly like GameBtn
            btnSettings.setSize(iconSize, iconSize);
            btnSettings.setInteractive({ useHandCursor: true });
            btnSettings.on('pointerdown', () => {
                this.playClickSound();
                // Ensure popup exists, if not create it
                if (!this.settingsPopup) {
                    this.createSettingsPopup();
                }
                this.showSettingsPopup();
            });
            
            this.btnSettings = btnSettings;
        }

            const popupWidth = 500;

            const centerY = CONFIG.height / 2;

            this.settingsPopup.setScrollFactor(0);

            settingsBg.fillStyle(0x000000, 0.95);
            settingsBg.fillRoundedRect(-popupWidth/2, -popupHeight/2, popupWidth, popupHeight, 20);
            settingsBg.lineStyle(4, this.COLORS.gold);
            settingsBg.strokeRoundedRect(-popupWidth/2, -popupHeight/2, popupWidth, popupHeight, 20);
            
            // Title
            const title = this.add.text(0, -popupHeight/2 + 30, "SETTINGS", { 
                fontSize: '40px', 
                fontFamily: 'Righteous', 
                color: this.COLORS.text, 
                stroke: '#000', 
                strokeThickness: 4 
            }).setOrigin(0.5);
            
            // Close button
            const closeBtn = this.add.container(popupWidth/2 - 30, -popupHeight/2 + 30);
            const closeBg = this.add.circle(0, 0, 15, 0x666666, 0.9).setStrokeStyle(2, 0xffffff);
            const closeText = this.add.text(0, 0, "×", { fontSize: '24px', color: '#ffffff' }).setOrigin(0.5);
            closeBtn.add([closeBg, closeText]);
            closeBtn.setSize(30, 30);
            closeBtn.setInteractive({ useHandCursor: true }).on('pointerdown', () => {
                this.playClickSound();
                this.hideSettingsPopup();
            });
            
            // Music section
            const musicY = -150;
            const musicLabel = this.add.text(-popupWidth/2 + 30, musicY, "MUSIC", { 
                fontSize: '24px', 
                fontFamily: 'Righteous', 
                color: this.COLORS.text 
            });
            const musicMuteBtn = this.add.container(popupWidth/2 - 80, musicY);
            const musicMuteBg = this.add.circle(0, 0, 12, 0x333333, 0.9).setStrokeStyle(2, this.isMusicOn ? 0x00ff00 : 0x555555);
            const musicMuteIcon = this.add.text(0, 0, this.isMusicOn ? "🔊" : "🔇", { fontSize: '14px' }).setOrigin(0.5);
            musicMuteBtn.add([musicMuteBg, musicMuteIcon]);
            musicMuteBtn.setSize(24, 24);
            musicMuteBtn.setInteractive({ useHandCursor: true }).on('pointerdown', () => {
                this.playClickSound();
                this.isMusicOn = !this.isMusicOn;
                const bgmKey = this.getAudioKey('bgm');
                if (this.sound.get(bgmKey)) {
                    this.sound.get(bgmKey).setVolume(this.isMusicOn ? this.musicVolume : 0);
                }
                musicMuteBg.setStrokeStyle(2, this.isMusicOn ? 0x00ff00 : 0x555555);
                musicMuteIcon.setText(this.isMusicOn ? "🔊" : "🔇");
            });
            
            // Music slider
            const musicSliderWidth = 300;
            const musicSliderHeight = 8;
            const musicSliderY = musicY + 40;
            const musicSliderBg = this.add.rectangle(0, musicSliderY, musicSliderWidth, musicSliderHeight, 0x333333);
            const musicSliderFill = this.add.rectangle(-musicSliderWidth/2, musicSliderY, musicSliderWidth * this.musicVolume, musicSliderHeight - 2, 0x00ff00).setOrigin(0, 0.5);
            const musicSliderHandle = this.add.circle(-musicSliderWidth/2 + (musicSliderWidth * this.musicVolume), musicSliderY, 10, 0xffffff).setInteractive({ useHandCursor: true, draggable: true });
            
            musicSliderHandle.on('drag', (pointer) => {
                const worldX = pointer.worldX;
                const localPoint = this.settingsPopup.getLocalPoint(worldX, pointer.worldY);
                const minX = -musicSliderWidth/2;
                const maxX = musicSliderWidth/2;
                const clampedX = Math.max(minX, Math.min(maxX, localPoint.x));
                musicSliderHandle.x = clampedX;
                this.musicVolume = Math.max(0, Math.min(1, (clampedX + musicSliderWidth/2) / musicSliderWidth));
                musicSliderFill.width = musicSliderWidth * this.musicVolume;
                musicSliderFill.x = -musicSliderWidth/2;
                
                const bgmKey = this.getAudioKey('bgm');
                if (this.sound.get(bgmKey)) {
                    this.sound.get(bgmKey).setVolume(this.musicVolume);
                }
                this.isMusicOn = this.musicVolume > 0;
                musicMuteBg.setStrokeStyle(2, this.isMusicOn ? 0x00ff00 : 0x555555);

        playClickSound() { 
            if(this.isSfxOn) { 
                const clickKey = this.getAudioKey('sfx_click');
                if(sfxFlags.click && this.sound.get(clickKey)) { 
                    try { this.sound.play(clickKey, { volume: this.sfxVolume }); } catch(e){} 
                } else { 
                    this.soundEngine.playClick(); 
                } 
            } 
        }
        playSfx(key, options = {}) { 
            if (!this.isSfxOn) return;
            try { 
                const audioKey = this.getAudioKey(key);
                const sound = this.sound.get(audioKey);
                if (sound) { 
                    this.sound.play(audioKey, { ...options, volume: this.sfxVolume }); 
                }
            } catch(e) {} 
        }
        
        winCounterTween = null;
        winCounterValue = 0;
        
        animateWinCounter(targetAmount) {
            if (this.winCounterTween) { this.winCounterTween.stop(); }
            this.winCounterValue = 0;
            this.txtWin.setText('$0.00');
            const duration = Math.min(2000, Math.max(500, targetAmount / 50));
            this.winCounterTween = this.tweens.add({
                targets: this,
                winCounterValue: targetAmount,
                duration: duration,
                ease: 'Cubic.out',
                onUpdate: () => { this.txtWin.setText("$"+(this.winCounterValue/100).toFixed(2)); },
                onComplete: () => { this.txtWin.setText("$"+(targetAmount/100).toFixed(2)); this.winCounterTween = null; }
            });
            this.tweens.add({ targets: this.txtWin, scale: 1.15, duration: 150, yoyo: true, repeat: 2, ease: 'Sine.inOut' });
        }
        
        bonusWinCounterTween = null;
        bonusWinCounterValue = 0;
        
        animateBonusWinCounter(fromAmount, toAmount) {
            if (this.bonusWinCounterTween) { this.bonusWinCounterTween.stop(); }
            this.bonusWinCounterValue = fromAmount;
            const winDiff = toAmount - fromAmount;
            const duration = Math.min(1500, Math.max(400, winDiff / 50));
            this.bonusWinCounterTween = this.tweens.add({
                targets: this,
                bonusWinCounterValue: toAmount,
                duration: duration,
                ease: 'Cubic.out',
                onUpdate: () => { this.lblBonusWin.setText(["BONUS WIN", "$"+(this.bonusWinCounterValue/100).toFixed(2)]); },
                onComplete: () => { this.lblBonusWin.setText(["BONUS WIN", "$"+(toAmount/100).toFixed(2)]); this.bonusWinCounterTween = null; }
            });
            this.tweens.add({ targets: this.lblBonusWin, scale: 1.1, duration: 100, yoyo: true, repeat: 1, ease: 'Sine.inOut' });
        }
        
        cycleDenom() { if((this.state === 'IDLE' || this.state === 'WIN_SHOW') && !this.isAutoSpinning) { this.denom = [1,5,10,25][([1,5,10,25].indexOf(this.denom)+1)%4]; this.btnDenom.mainText.setText(this.denom<100?this.denom+"¢":"$"+this.denom/100); this.playClickSound(); this.updateText(); } }
        setBet(m) { if((this.state === 'IDLE' || this.state === 'WIN_SHOW') && !this.isAutoSpinning) { this.betMultiplier = m; this.playClickSound(); this.updateText(); this.betBtns.forEach(b=>b.setActiveState(false)); this.betBtns.find(b=>b.mainText.text==m+"x").setActiveState(true); } }
        updateText() { this.txtBet.setText("$"+(CONFIG.fixedLines*this.betMultiplier*this.denom/100).toFixed(2)); this.txtCash.setText("$"+(this.credits/100).toFixed(2)); }
        toggleBonusUI(active) {

            this.lblBonusWin.setVisible(active);
        }
        toggleAuto() { this.isAutoSpinning = !this.isAutoSpinning; this.btnAuto.setActiveState(this.isAutoSpinning); if(this.isAutoSpinning && this.state === 'IDLE') this.handleSpin(); }
        
        updateBonusUI() {

                this.imgFreeSpins.setScale(scale);

        handleSpin() { /* Same logic */
            this.soundEngine.tryResume();
            if(this.state === 'IDLE') {
                const cost = CONFIG.fixedLines * this.betMultiplier * this.denom;
                if(this.credits < cost) { this.isAutoSpinning = false; this.btnAuto.setActiveState(false); return; }
                this.credits -= cost; this.updateText(); this.startSpin(false);
            } else if (this.state === 'SPINNING') { this.instantStop(); } else if (this.state === 'WIN_SHOW') { this.clearWinCycle(); this.state = 'IDLE'; this.handleSpin(); }
        }
        startSpin(isFree) {
            this.state = isFree ? 'BONUS_SPIN' : 'SPINNING';
            if(!isFree) { this.txtWin.setText("$0.00"); this.btnSpin.setText("STOP"); } else { this.updateBonusUI(); }
            this.clearWinCycle(); this.stopTimers.forEach(t => t.remove()); this.stopTimers = [];
            this.grid = [];
            const currentStrip = this.getReelStrip();
            for(let c=0; c<CONFIG.reelCount; c++) {
                const stripIdx = Math.floor(Math.random() * currentStrip.length); let col = [];
                for(let r=0; r<CONFIG.rowCount; r++) { col.push(SYMBOL_DEFS.find(s => s.id === currentStrip[(stripIdx + r) % currentStrip.length])); }
                this.grid.push(col);
            }
            let scatterCount = 0;
            this.reels.forEach((r, i) => {
                let delay = 400 + (i * 200); if (scatterCount >= 2) { delay += 2000; r.isTeasing = true; } else { r.isTeasing = false; }
                if (this.grid[i].some(s => s.isScatter)) scatterCount++;
                r.sprites.forEach(s => {
                    if (s && s.texture && s.texture.key) {
                        const baseKey = s.texture.key.replace('sym_','').replace('blur_','');
                        const blurKey = 'sym_blur_' + baseKey;
                        if (this.textures.exists(blurKey)) {
                            s.setTexture(blurKey);
                        }
                    }
                });
                if(r.tween) r.tween.stop();
                r.tween = this.tweens.add({
                    targets: r.container, y: CONFIG.offsetY + CONFIG.symbolSize, duration: 80, repeat: -1,
                    onRepeat: () => { 
                        r.container.y = CONFIG.offsetY; 
                        r.sprites.forEach(s => { 
                            if(s && s.y !== undefined && (s.y < 0 || s.y > 300)) {
                                const randomSym = SYMBOL_DEFS[Math.floor(Math.random()*SYMBOL_DEFS.length)];
                                const blurKey = 'sym_blur_' + randomSym.id;
                                if (this.textures.exists(blurKey)) {
                                    s.setTexture(blurKey);
                                }
                            }
                        }); 
                    }
                });
                const timer = this.time.delayedCall(delay, () => { if(this.state.includes('SPIN')) { if(r.isTeasing) this.soundEngine.playTease(); this.stopReel(i); } });
                this.stopTimers.push(timer);
            });
            
            // PLAY SPIN SFX
            if (sfxFlags.spin && this.isSfxOn) { 
                try { 
                    const spinKey = this.getAudioKey('sfx_spin');
                    if (this.sound.get(spinKey)) {
                        this.sound.stopByKey(spinKey); 
                        this.sound.play(spinKey, { loop: true, volume: this.sfxVolume }); // Loop
                    }
                } catch(e) {} 
            }
        }
        stopReel(i) {
            const r = this.reels[i]; if(r.tween) r.tween.stop(); r.tween = null;
            r.sprites.forEach(s => {
                if (s && s.texture && s.texture.key) {
                    const baseKey = s.texture.key.replace('blur_', '');
                    if (this.textures.exists(baseKey)) {
                        s.setTexture(baseKey);
                    }
                }
            });
            const sym1 = 'sym_' + this.grid[i][0].id;
            const sym2 = 'sym_' + this.grid[i][1].id;
            const sym3 = 'sym_' + this.grid[i][2].id;
            if (this.textures.exists(sym1) && r.sprites[1]) r.sprites[1].setTexture(sym1);
            if (this.textures.exists(sym2) && r.sprites[2]) r.sprites[2].setTexture(sym2);
            if (this.textures.exists(sym3) && r.sprites[3]) r.sprites[3].setTexture(sym3);
            if (this.grid[i].some(s => s.isScatter)) {
                if (this.isSfxOn) { 
                    const scatterKey = this.getAudioKey('sfx_scatter');
                    if(sfxFlags.scatter && this.sound.get(scatterKey)) { 
                        try { this.sound.play(scatterKey, { volume: this.sfxVolume }); } catch(e){} 
                    } else { 
                        this.soundEngine.playScatter(); 
                    } 
                }
                const scatterSprite = r.sprites[1 + this.grid[i].findIndex(s => s.isScatter)];
                this.tweens.add({ targets: scatterSprite, scale: 1.5, duration: 200, yoyo: true });
            } else { 
                // Play Stop SFX if available, else procedural
                if (sfxFlags.stop && this.isSfxOn) { 
                    const stopKey = this.getAudioKey('sfx_stop');
                    try { this.sound.play(stopKey, { volume: this.sfxVolume }); } catch(e) {} 
                } else if (this.isSfxOn) { 
                    this.soundEngine.playStop(i); 
                }
            }
            
            // STOP SPIN SOUND IF LAST REEL
            if (i === CONFIG.reelCount - 1) {
                try { 
                    const spinKey = this.getAudioKey('sfx_spin');
                    if (this.sound.get(spinKey)) this.sound.stopByKey(spinKey); 
                } catch(e) {}
            }

            r.container.y = CONFIG.offsetY - 50;
            this.tweens.add({ targets: r.container, y: CONFIG.offsetY, duration: 350, ease: 'Back.out', onComplete: () => { if(i===CONFIG.reelCount-1) this.evaluateWin(); } });
        }
        instantStop() {
            this.stopTimers.forEach(t => t.remove()); this.stopTimers = [];
            this.reels.forEach((r, i) => {
                if(r.tween) r.tween.stop(); r.tween = null;
                r.sprites.forEach(s => {
                    if (s && s.texture && s.texture.key) {
                        const baseKey = s.texture.key.replace('blur_', '');
                        if (this.textures.exists(baseKey)) {
                            s.setTexture(baseKey);
                        }
                    }
                });
                const sym1 = 'sym_' + this.grid[i][0].id;
                const sym2 = 'sym_' + this.grid[i][1].id;
                const sym3 = 'sym_' + this.grid[i][2].id;
                if (this.textures.exists(sym1) && r.sprites[1]) r.sprites[1].setTexture(sym1);
                if (this.textures.exists(sym2) && r.sprites[2]) r.sprites[2].setTexture(sym2);
                if (this.textures.exists(sym3) && r.sprites[3]) r.sprites[3].setTexture(sym3);
                r.container.y = CONFIG.offsetY;
            });
            // Stop spin sound immediately
            try { 
                const spinKey = this.getAudioKey('sfx_spin');
                if (this.sound.get(spinKey)) this.sound.stopByKey(spinKey); 
            } catch(e) {}
            
            // Play jam sound when stopping mid-spin
            if (this.isSfxOn) {
                if(sfxFlags.jam && this.sound.get('sfx_jam')) {
                    try { this.sound.play('sfx_jam', { volume: this.sfxVolume }); } catch(e) {}
                }
            }
            
            this.cameras.main.shake(100,0.005); this.evaluateWin();
        }
        evaluateWin() {
            if(this.state === 'SPINNING') this.btnSpin.setText("SPIN");
            this.winLines = []; let roundWin = 0; const multiplier = (this.freeSpinsTotal > 0) ? 3 : 1;
            CONFIG.paylines.forEach((line, lineIdx) => {
                const syms = line.map((row, col) => this.grid[col][row]); const first = syms[0]; let count = 1;
                for(let i=1; i<syms.length; i++) { if((syms[i].id === first.id || syms[i].isWild) && !first.isScatter) count++; else break; }
                if(count >= 3) {
                    const pay = first.val * (count-2) * this.betMultiplier * this.denom * multiplier;
                    roundWin += pay; this.winLines.push({ lineIdx, coords: line, count });
                }
            });
            const scatterCount = this.grid.flat().filter(s => s.isScatter).length;
            if (scatterCount >= 3) {
                if(this.state === 'SPINNING') { this.triggerBonus(); this.isAutoSpinning = false; this.btnAuto.setActiveState(false); return; }
                else { 
                    this.freeSpinsLeft += 10;
                    this.freeSpinsTotal += 10; 
                    this.showPopup("RETRIGGER!", "+10 FREE SPINS", 2000, null, 'gen_FREE_SPINS');
                    if (this.isSfxOn) { 
                        const bonusKey = this.getAudioKey('sfx_bonustrigger');
                        if(sfxFlags.bonusTrigger && this.sound.get(bonusKey)) { 
                            try { this.sound.play(bonusKey, { volume: this.sfxVolume }); } catch(e){} 
                        } else { 
                            this.soundEngine.playBonusStart(); 
                        } 
                    } 
                }
            }
            if (roundWin > 0) { this.state = 'WIN_SHOW'; } else { this.state = 'IDLE'; }
            if(roundWin > 0) {
                if(this.freeSpinsTotal > 0) { 
                    const previousBonusWin = this.totalBonusWin;
                    this.totalBonusWin += roundWin; 
                    this.credits += roundWin;
                    this.animateBonusWinCounter(previousBonusWin, this.totalBonusWin);
                } else { 
                    this.credits += roundWin; 
                }
                this.updateText(); 
                if(!this.state.includes('BONUS')) { this.animateWinCounter(roundWin); }
                this.soundEngine.playWin(); 
                
                // Play Win SFX
                const totalBet = CONFIG.fixedLines * this.betMultiplier * this.denom;
                const isBigWin = roundWin >= totalBet * 20;

                if (this.isSfxOn) {
                    if (isBigWin && sfxFlags.bigWin) { 
                        const bigWinKey = this.getAudioKey('sfx_bigwin');
                        try { this.sound.play(bigWinKey, { volume: this.sfxVolume }); } catch(e) {} 
                    }
                    else if (!isBigWin && sfxFlags.win) { 
                        const winKey = this.getAudioKey('sfx_win');
                        try { this.sound.play(winKey, { volume: this.sfxVolume }); } catch(e) {} 
                    }
                    else { this.soundEngine.playWin(); }
                }

                if (roundWin >= totalBet * 20) this.showPopup("BIG WIN", "$"+(roundWin/100).toFixed(2), 10000, null, 'gen_BIG_WIN');
                this.startWinCycle();
            }
            if(this.freeSpinsTotal > 0) { const delay = (roundWin > 0) ? 2000 : 1000; this.time.delayedCall(delay, () => this.nextFreeSpin()); } 
            else if(this.isAutoSpinning && this.state === 'IDLE') { const delay = (roundWin > 0) ? 2000 : 1000; this.time.delayedCall(delay, () => this.handleSpin()); }
        }
        triggerBonus() {
            this.state = 'BONUS_INTRO'; this.freeSpinsTotal = 10; this.freeSpinsLeft = 10; this.totalBonusWin = 0;
            if (this.isSfxOn) { 
                const bonusKey = this.getAudioKey('sfx_bonustrigger');
                if(sfxFlags.bonusTrigger && this.sound.get(bonusKey)) { 
                    try { this.sound.play(bonusKey, { volume: this.sfxVolume }); } catch(e){} 
                } else { 
                    this.soundEngine.playBonusStart(); 
                } 
            }
            this.applyBonusColors();
            this.toggleBonusUI(true);
            this.showPopup("FREE SPINS", "10 FREE SPINS", 3000, () => { this.setBgColor(true); this.nextFreeSpin(); }, 'gen_FREE_SPINS');
        }
        applyBonusColors() {
            const freeSpinColors = this.extractedColors['gen_FREE_SPINS'];
            if (freeSpinColors) {
                this.bonusOverlay.clear();
                this.bonusOverlay.fillGradientStyle(freeSpinColors.tl, freeSpinColors.tr, freeSpinColors.bl, freeSpinColors.br, 1);
                this.bonusOverlay.fillRect(0, 850, CONFIG.width, CONFIG.height - 850);
            }
        }
        nextFreeSpin() {
            if(this.freeSpinsLeft > 0) { this.startSpin(true); this.freeSpinsLeft--; } else { this.endBonus(); }
        }
        endBonus() {
            this.state = 'IDLE'; this.freeSpinsTotal = 0; this.setBgColor(false);
            this.showPopup("BONUS COMPLETE", "$"+(this.totalBonusWin/100).toFixed(2), 4000, () => {
                this.toggleBonusUI(false); this.txtWin.setText("BONUS: $"+(this.totalBonusWin/100).toFixed(2));
                if(this.isAutoSpinning) { this.time.delayedCall(1000, () => this.handleSpin()); }
            }, 'gen_FREE_SPINS');
        }
        startWinCycle() {
            if(this.winLines.length === 0) return; let idx = 0;
            const show = () => {
                if(this.state !== 'WIN_SHOW' && !this.state.includes('BONUS')) return;
                this.winGraphics.clear(); const win = this.winLines[idx];
                this.reels.forEach(r => r.sprites.forEach(s => { s.clearTint(); }));
                for(let i=0; i<win.count; i++) {
                    const s = this.reels[i].sprites[win.coords[i]+1];
                    this.winGraphics.lineStyle(6, this.COLORS.gold, 1);
                    this.winGraphics.strokeRoundedRect(s.parentContainer.x - 65, s.parentContainer.y + s.y - 65, 130, 130, 10);
                    this.tweens.add({ targets: s, scale: 1.15, duration: 250, yoyo: true });
                    this.sparkleEmitter.explode(10, s.parentContainer.x, s.y + s.parentContainer.y);
                }
                this.winGraphics.beginPath(); this.winGraphics.lineStyle(8, this.COLORS.gold, 0.5); 
                win.coords.forEach((row, col) => {
                    const x = CONFIG.offsetX + (CONFIG.reelWidth/2) + (col * CONFIG.reelWidth);
                    const y = CONFIG.offsetY + (CONFIG.symbolSize/2) + (row * CONFIG.symbolSize);
                    if(col===0) this.winGraphics.moveTo(x, y); else this.winGraphics.lineTo(x, y);
                });
                this.winGraphics.strokePath(); this.winGraphics.lineStyle(4, this.COLORS.accent, 1.0); this.winGraphics.strokePath();
                idx = (idx + 1) % this.winLines.length;
                this.winTimer = this.time.delayedCall(1500, show);
            }; show();
        }
        showPopup(title, sub, duration, onComplete, imageKey) {
            this.popupLayer.setVisible(true).setScale(0); 
            this.isCelebrating = false;
            if (this.coinEmitter) this.coinEmitter.stop();
            this.popBg.clear();
            
            // Use fallback for imageKey if provided
            const actualImageKey = imageKey ? this.getAssetKey(imageKey) : null;
            
            if (actualImageKey && this.extractedColors[imageKey]) {
                const c = this.extractedColors[imageKey];
                this.popBg.fillGradientStyle(c.tl, c.tr, c.bl, c.br, 0.95);
            } else { this.popBg.fillStyle(0x000000, 0.95); }
            this.popBg.fillRoundedRect(-300, -175, 600, 350, 20);
            this.popBg.lineStyle(6, this.COLORS.gold);
            this.popBg.strokeRoundedRect(-300, -175, 600, 350, 20);

            if (actualImageKey && this.textures.exists(actualImageKey)) {
                this.popTitle.setVisible(false);
                this.popImage.setTexture(actualImageKey).setVisible(true);
                let maxW = 500; let maxH = 200;
                if (imageKey === 'gen_BIG_WIN') { maxW = 600; maxH = 300; this.popImage.setY(-80); } else { this.popImage.setY(-50); }
                const scale = Math.min(maxW / this.popImage.width, maxH / this.popImage.height);
                this.popImage.setScale(scale);
            } else {
                this.popImage.setVisible(false);
                this.popTitle.setText(title).setVisible(true);
            }
            if (imageKey === 'gen_BIG_WIN') {
                this.isCelebrating = true;
                this.coinEmitter.setPosition(CONFIG.width/2, CONFIG.height/2 + 100);
                this.coinEmitter.start();
                const targetAmt = parseFloat(sub.replace('$',''));
                this.counterTweenVal = 0;
                this.popSub.setText("$0.00");
                this.popSub.setY(100);
                this.popupLayer.onCompleteCallback = onComplete;
                this.tweens.add({
                    targets: this, counterTweenVal: targetAmt, duration: 3000, ease: 'Cubic.out',
                    onUpdate: () => { this.popSub.setText("$"+this.counterTweenVal.toFixed(2)); },
                    onComplete: () => { this.time.delayedCall(1000, () => this.stopCelebration(false)); }
                });
            } else {
                this.popSub.setText(sub);
                if (imageKey) { this.popSub.setY(140); } else { this.popSub.setY(60); }
                if(duration > 0) { this.time.delayedCall(duration, () => { this.tweens.add({ targets: this.popupLayer, scale: 0, duration: 300, onComplete: () => { this.popupLayer.setVisible(false); if(onComplete) onComplete(); }}); }); }
            }
            this.tweens.add({ targets: this.popupLayer, scale: 1, duration: 500, ease: 'Back.out' });
        }
        stopCelebration(skipped) {
            if (!this.isCelebrating) return;
            this.isCelebrating = false;
            this.coinEmitter.stop();
            this.tweens.killTweensOf(this);
            const cleanup = () => {
                 this.popupLayer.setVisible(false); this.popupLayer.setScale(0);
                 if (this.popupLayer.onCompleteCallback) { this.popupLayer.onCompleteCallback(); this.popupLayer.onCompleteCallback = null; }
            };
            if (skipped) { cleanup(); } else { this.tweens.add({ targets: this.popupLayer, scale: 0, duration: 300, onComplete: cleanup }); }
        }
        clearWinCycle() { if(this.winTimer) this.winTimer.remove(); this.winGraphics.clear(); this.reels.forEach(r => r.sprites.forEach(s => { s.clearTint(); s.setScale(1); })); }
    }
    
    class MenuScene extends Phaser.Scene {
        constructor() {
            super('MenuScene');
            this.machines = [];
        }
        
        preload() {
            this.load.json('machines', 'machines.json');
            this.load.image('menu_logo', 'logo.png');
        }
        
        create() {
            this.machines = this.cache.json.get('machines');
            
            // Background
            this.add.rectangle(CONFIG.width/2, CONFIG.height/2, CONFIG.width, CONFIG.height, 0x000000);
            
            // Top logo - full width
            const topLogo = this.add.image(CONFIG.width/2, 0, 'menu_logo');
            topLogo.setOrigin(0.5, 0);
            topLogo.setDisplaySize(CONFIG.width, topLogo.height * (CONFIG.width / topLogo.width));
            const logoHeight = topLogo.displayHeight;
            
            // Title positioned so half is on logo, half is below
            const title = this.add.text(CONFIG.width/2, logoHeight, "SELECT A MACHINE", {
                fontSize: '48px',
                fontFamily: 'Righteous',
                color: '#ffffff',
                stroke: '#000',
                strokeThickness: 4
            }).setOrigin(0.5, 0.5); // Centered at logo bottom edge so half is above and half is below
            
            // Create machine grid (2 columns, scrollable)
            const cols = 2;
            const cardWidth = 320;
            const cardSpacingX = 20; // Narrower gap between columns
            const cardSpacingY = 10; // Very close together
            const sideMargin = 30; // Margin on left and right sides
            // Calculate total width with margins
            const totalWidth = (cols * cardWidth) + ((cols - 1) * cardSpacingX) + (sideMargin * 2);
            const startX = sideMargin + cardWidth / 2;
            // Start machine list lower to avoid overlapping the title text
            const scrollStartY = logoHeight + 30; // Moved up 10 pixels
            const scrollTopPadding = 10; // Reduced padding inside the scrollable area at the top
            
            // Create scrollable container for machines
            const scrollContainer = this.add.container(0, scrollStartY);
            const scrollHeight = CONFIG.height - scrollStartY;
            const scrollMask = this.make.graphics({x: 0, y: scrollStartY, add: false});
            scrollMask.fillStyle(0xffffff);
            scrollMask.fillRect(0, 0, CONFIG.width, scrollHeight);
            const mask = scrollMask.createGeometryMask();
            scrollContainer.setMask(mask);
            
            // Make container scrollable
            scrollContainer.setInteractive(new Phaser.Geom.Rectangle(0, 0, CONFIG.width, scrollHeight), Phaser.Geom.Rectangle.Contains);
            this.scrollY = 0;
            const scrollSpeed = 1; // Slower scrolling for better control
            
            // Touch/drag scrolling support
            this.isDragging = false;
            this.dragStartY = 0;
            this.dragStartScrollY = 0;
            this.dragThreshold = 5; // Minimum movement to start dragging (prevents accidental drags)
            this.hasDragged = false;
            
            // Touch/drag scrolling - handle at scene level to work with cards
            // We'll start drag detection on pointermove instead to avoid interfering with card clicks
            this.input.on('pointerdown', (pointer) => {
                // Only prepare for dragging if clicking in the scroll area
                if (pointer.y >= scrollStartY && pointer.y <= scrollStartY + scrollHeight) {
                    // Don't start dragging yet - wait for movement
                    this.dragStartY = pointer.y;
                    this.dragStartScrollY = this.scrollY;
                    this.dragPrepared = true;
                }
            });
            
            this.input.on('pointermove', (pointer) => {
                if (this.dragPrepared && pointer.isDown) {
                    const deltaY = pointer.y - this.dragStartY;
                    // Check if we've moved enough to consider it a drag
                    if (Math.abs(deltaY) > this.dragThreshold) {
                        this.isDragging = true;
                        this.hasDragged = true;
                        this.scrollY = this.dragStartScrollY + deltaY;
                        const maxScroll = Math.max(0, (this.totalContentHeight || scrollHeight) - scrollHeight);
                        this.scrollY = Phaser.Math.Clamp(this.scrollY, -maxScroll, 0);
                        scrollContainer.setY(scrollStartY + this.scrollY);
                        // Update scrollbar after content is loaded
                        if (this.scrollbarHandle && this.totalContentHeight) {
                            this.updateScrollbar();
                        }
                    }
                }
            });
            
            this.input.on('pointerup', () => {
                this.isDragging = false;
                this.dragPrepared = false;
                // Reset hasDragged after a short delay to allow clicks
                this.time.delayedCall(50, () => {
                    this.hasDragged = false;
                });
            });
            
            // Create scrollbar
            const scrollbarWidth = 8;
            const scrollbarX = CONFIG.width - scrollbarWidth - 10;
            const scrollbarTrack = this.add.graphics();
            scrollbarTrack.fillStyle(0x333333, 0.5);
            scrollbarTrack.fillRect(scrollbarX, scrollStartY, scrollbarWidth, scrollHeight);
            scrollbarTrack.setDepth(1000);
            
            const scrollbarHandle = this.add.graphics();
            scrollbarHandle.setDepth(1001);
            this.scrollbarHandle = scrollbarHandle;
            this.scrollbarTrack = scrollbarTrack;
            this.scrollbarX = scrollbarX;
            this.scrollbarWidth = scrollbarWidth;
            this.scrollbarHeight = scrollHeight;
            
            // Load all machine logos first
            this.machines.forEach((machine) => {
                this.load.image(`machine_logo_${machine.id}`, machine.logo);
            });
            
            // Track logo heights for spacing calculation
            let currentY = scrollTopPadding; // Start with top padding inside scroll area
            let maxLogoHeight = 0;
            let totalContentHeight = 0;
            
            this.load.once('complete', () => {
                this.machines.forEach((machine, index) => {
                    const col = index % cols;
                    const row = Math.floor(index / cols);
                    
                    // Create machine card - just a border around the logo
                    const x = startX + col * (cardWidth + cardSpacingX);
                    
                    // Card logo - full width of card, centered vertically
                    const logoImg = this.add.image(0, 0, `machine_logo_${machine.id}`);
                    logoImg.setOrigin(0.5);
                    logoImg.setDisplaySize(cardWidth, logoImg.height * (cardWidth / logoImg.width));
                    const logoDisplayHeight = logoImg.displayHeight;
                    const logoDisplayWidth = logoImg.displayWidth;
                    
                    // Update max logo height for this row
                    if (col === 0) {
                        maxLogoHeight = logoDisplayHeight;
                    } else {
                        maxLogoHeight = Math.max(maxLogoHeight, logoDisplayHeight);
                    }
                    
                    // Position based on actual logo heights
                    let y;
                    if (col === 0) {
                        // First column - start new row
                        y = currentY + maxLogoHeight / 2;
                        currentY += maxLogoHeight + cardSpacingY;
                        totalContentHeight = currentY;
                    } else {
                        // Second column - same row as previous
                        y = currentY - maxLogoHeight / 2 - cardSpacingY;
                    }
                    
                    const card = this.add.container(x, y);
                    scrollContainer.add(card);
                    
                    // Simple border around the logo
                    const border = this.add.graphics();
                    border.lineStyle(3, 0x666666, 1);
                    border.strokeRoundedRect(-logoDisplayWidth/2, -logoDisplayHeight/2, logoDisplayWidth, logoDisplayHeight, 5);
                    
                    // Grey line underneath logo (same color as border)
                    const logoLine = this.add.graphics();
                    logoLine.lineStyle(2, 0x666666, 1);
                    logoLine.lineBetween(-logoDisplayWidth/2, logoDisplayHeight/2, logoDisplayWidth/2, logoDisplayHeight/2);
                    
                    card.add([logoImg, border, logoLine]);
                    card.setSize(logoDisplayWidth, logoDisplayHeight);
                    card.setInteractive({ useHandCursor: true });
                    
                    // Store border reference on card for hover effects
                    card.border = border;
                    card.logoDisplayWidth = logoDisplayWidth;
                    card.logoDisplayHeight = logoDisplayHeight;
                    
                    // Store machine reference for click handler
                    card.machine = machine;
                    card.clickStartY = null;
                    card.clickStartX = null;
                    
                    card.on('pointerdown', (pointer) => {
                        // Store click position and prevent scene-level drag from starting
                        card.clickStartY = pointer.y;
                        card.clickStartX = pointer.x;
                        // Stop propagation to prevent scene drag handler
                        pointer.event.stopPropagation();
                    });
                    
                    card.on('pointerup', (pointer) => {
                        // Only trigger if we haven't dragged and pointer hasn't moved much
                        if (card.clickStartY !== null && card.clickStartX !== null) {
                            const deltaY = Math.abs(pointer.y - card.clickStartY);
                            const deltaX = Math.abs(pointer.x - card.clickStartX);
                            if (!this.hasDragged && deltaY < this.dragThreshold && deltaX < this.dragThreshold) {
                                // Find default machine
                                const defaultMachine = this.machines.find(m => m.id === 'Default' || m.id === 'default');
                                this.scene.start('MainScene', { machine: card.machine, defaultMachine: defaultMachine });
                            }
                        }
                        card.clickStartY = null;
                        card.clickStartX = null;
                    });
                    
                    // Hover effect
                    card.on('pointerover', () => {
                        card.border.clear();
                        card.border.lineStyle(3, 0x4EE0E0, 1);
                        card.border.strokeRoundedRect(-card.logoDisplayWidth/2, -card.logoDisplayHeight/2, card.logoDisplayWidth, card.logoDisplayHeight, 5);
                        this.tweens.add({
                            targets: card,
                            scale: 1.05,
                            duration: 200
                        });
                    });
                    card.on('pointerout', () => {
                        card.border.clear();
                        card.border.lineStyle(3, 0x666666, 1);
                        card.border.strokeRoundedRect(-card.logoDisplayWidth/2, -card.logoDisplayHeight/2, card.logoDisplayWidth, card.logoDisplayHeight, 5);
                        this.tweens.add({
                            targets: card,
                            scale: 1,
                            duration: 200
                        });
                    });
                });
                
                // Store references for scrollbar updates
                this.scrollContainer = scrollContainer;
                this.scrollStartY = scrollStartY;
                this.scrollHeight = scrollHeight;
                this.totalContentHeight = totalContentHeight;
                this.scrollY = 0;
                
                // Function to update scrollbar position
                this.updateScrollbar = () => {
                    if (!this.totalContentHeight || this.totalContentHeight <= this.scrollHeight) {
                        // Hide scrollbar if content fits
                        this.scrollbarHandle.clear();
                        return;
                    }
                    
                    const scrollRatio = Math.abs(this.scrollY) / (this.totalContentHeight - this.scrollHeight);
                    const handleHeight = Math.max(20, (this.scrollHeight / this.totalContentHeight) * this.scrollHeight);
                    const handleY = this.scrollStartY + (scrollRatio * (this.scrollHeight - handleHeight));
                    
                    this.scrollbarHandle.clear();
                    this.scrollbarHandle.fillStyle(0x888888, 0.8);
                    this.scrollbarHandle.fillRect(this.scrollbarX, handleY, this.scrollbarWidth, handleHeight);
                };
                
                // Set up wheel scrolling (with reduced sensitivity and correct direction)
                this.input.on('wheel', (pointer, gameObjects, deltaX, deltaY, deltaZ) => {
                    // Invert deltaY to scroll in the correct direction
                    this.scrollY -= deltaY * scrollSpeed;
                    const maxScroll = Math.max(0, this.totalContentHeight - this.scrollHeight);
                    this.scrollY = Phaser.Math.Clamp(this.scrollY, -maxScroll, 0);
                    this.scrollContainer.setY(this.scrollStartY + this.scrollY);
                    this.updateScrollbar();
                });
                
                // Initial scrollbar update
                this.updateScrollbar();
            });
            this.load.start();
        }
    }
    
    // Config
    const config = { type: Phaser.AUTO, width: 720, height: 1280, parent: 'game-container', scene: [MenuScene, MainScene], scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH }, transparent: true, audio: { disableWebAudio: false } };
    
    // Wait for fonts to load before starting the game
    if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(() => {
            new Phaser.Game(config);
        });
    } else {
        // Fallback for older browsers - wait a bit for fonts
        setTimeout(() => { new Phaser.Game(config); }, 500);
    }
</script>
