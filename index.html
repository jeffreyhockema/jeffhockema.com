<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jeff Hockema</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />

  <style>
    :root {
      --bg: #06070a;
      --panel: rgba(255, 255, 255, 0.03);
      --border: rgba(255, 255, 255, 0.08);
      --text: #f5f7fa;
      --muted: rgba(245, 247, 250, 0.62);
      --icon: rgba(245, 247, 250, 0.68);
      --glow-a: rgba(255, 255, 255, 0.05);
      --glow-b: rgba(120, 140, 255, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
    }

    body {
      font-family: "Inter", sans-serif;
      background:
        radial-gradient(circle at 20% 20%, var(--glow-b), transparent 26%),
        radial-gradient(circle at 80% 70%, var(--glow-a), transparent 24%),
        linear-gradient(180deg, #040508 0%, #090b10 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .ambient {
      position: absolute;
      inset: -10%;
      background:
        radial-gradient(circle at 30% 40%, rgba(130, 160, 255, 0.08), transparent 18%),
        radial-gradient(circle at 70% 55%, rgba(255, 255, 255, 0.035), transparent 16%);
      filter: blur(60px);
      animation: breathe 14s ease-in-out infinite alternate;
      pointer-events: none;
    }

    .panel {
      position: relative;
      z-index: 1;
      width: min(88vw, 560px);
      padding: 3.25rem 2.5rem 2.5rem;
      text-align: center;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 32px;
      box-shadow:
        0 20px 80px rgba(0, 0, 0, 0.45),
        inset 0 1px 0 rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .line {
      width: 42px;
      height: 1px;
      margin: 0 auto 1.75rem;
      background: rgba(255, 255, 255, 0.24);
    }

    h1 {
      margin: 0;
      font-size: clamp(2.4rem, 6vw, 4.1rem);
      font-weight: 700;
      letter-spacing: -0.06em;
      line-height: 0.95;
    }

    p {
      margin: 0.95rem 0 0;
      color: var(--muted);
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 0.01em;
    }

    .icons {
      margin-top: 2rem;
      display: flex;
      justify-content: center;
      gap: 1.5rem;
    }

    .icons a {
      color: var(--icon);
      text-decoration: none;
      font-size: 1.18rem;
      transition: transform 0.2s ease, color 0.2s ease, opacity 0.2s ease;
      opacity: 0.9;
    }

    .icons a:hover {
      color: #ffffff;
      transform: translateY(-1px);
      opacity: 1;
    }

    @keyframes breathe {
      0% {
        transform: scale(1) translate3d(0, 0, 0);
      }
      100% {
        transform: scale(1.04) translate3d(1%, -1%, 0);
      }
    }

    @media (max-width: 640px) {
      .panel {
        width: min(92vw, 560px);
        padding: 2.5rem 1.5rem 2rem;
        border-radius: 26px;
      }

      .icons {
        gap: 1.25rem;
      }
    }
  </style>
</head>
<body>
  <div class="ambient" aria-hidden="true"></div>

  <main class="panel">
    <div class="line" aria-hidden="true"></div>
    <h1>Jeff Hockema</h1>
    <p>IT Professional in Eugene, Oregon</p>

    <nav class="icons" aria-label="Social links">
      <a href="https://www.linkedin.com/in/jeffreyhockema/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
        <i class="fa-brands fa-linkedin-in"></i>
      </a>
      <a href="https://github.com/exception386/" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
        <i class="fa-brands fa-github"></i>
      </a>
      <a href="https://www.facebook.com/jeffreyhockema/" target="_blank" rel="noopener noreferrer" aria-label="Facebook">
        <i class="fa-brands fa-facebook-f"></i>
      </a>
    </nav>
  </main>
</body>
</html>
