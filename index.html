<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jeff Hockema</title>

  <!-- Modern font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <!-- Font Awesome (fixes your icon issue) -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      text-align: center;
    }

    .container {
      padding: 2rem;
    }

    .profile {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 1.5rem;
      border: 2px solid rgba(255,255,255,0.2);
    }

    h1 {
      margin: 0;
      font-size: 2.5rem;
      font-weight: 800;
    }

    p {
      margin-top: 0.5rem;
      color: rgba(255,255,255,0.7);
      font-size: 1rem;
    }

    .icons {
      margin-top: 1.5rem;
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      font-size: 1.5rem;
    }

    .icons a {
      color: rgba(255,255,255,0.7);
      transition: 0.2s ease;
    }

    .icons a:hover {
      color: white;
      transform: translateY(-2px);
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- Replace with your image path -->
    <img src="images/profile.jpg" alt="Jeff Hockema" class="profile" />

    <h1>Jeff Hockema</h1>
    <p>IT Professional in Eugene, Oregon</p>

    <div class="icons">
      <a href="https://www.linkedin.com/in/jeffreyhockema/" target="_blank">
        <i class="fa-brands fa-linkedin"></i>
      </a>
      <a href="https://github.com/exception386/" target="_blank">
        <i class="fa-brands fa-github"></i>
      </a>
      <a href="https://www.facebook.com/jeffreyhockema/" target="_blank">
        <i class="fa-brands fa-facebook"></i>
      </a>
    </div>

  </div>
</body>
</html>
