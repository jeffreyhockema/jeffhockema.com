<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jeff Hockema</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    :root {
      --text: #f8fafc;
      --muted: rgba(248, 250, 252, 0.82);
      --icon: rgba(255,255,255,0.75);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
    }

    body {
      font-family: "Inter", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background-color: #1a2419;
    }

    /* Background */
    .background {
      position: fixed;
      inset: 0;
      background: url("bg.jpg") center / cover no-repeat;
      z-index: -1;
    }

    .background::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.15);
    }

    /* TRUE business card ratio */
    .card {
      width: min(90vw, 560px);
      aspect-ratio: 1.75 / 1; /* 👈 magic */

      display: flex;
      flex-direction: column;
      justify-content: center;

      padding: 1.8rem 2rem;
      border-radius: 24px;

      background: rgba(20, 30, 20, 0.18);
      backdrop-filter: blur(20px) saturate(140%);
      -webkit-backdrop-filter: blur(20px) saturate(140%);

      box-shadow:
        0 20px 60px rgba(0,0,0,0.25),
        inset 0 1px 0 rgba(255,255,255,0.06);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.8rem, 3.5vw, 2.8rem); /* smaller = more card-like */
      font-weight: 700;
      letter-spacing: -0.05em;
    }

    p {
      margin: 0.5rem 0 0;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .icons {
      margin-top: 1.2rem;
      display: flex;
      gap: 1.2rem;
    }

    .icons a {
      color: var(--icon);
      font-size: 1.1rem;
      transition: all 0.2s ease;
    }

    .icons a:hover {
      color: white;
      transform: translateY(-2px);
    }

    /* Mobile tweak: allow taller card */
    @media (max-width: 500px) {
      .card {
        aspect-ratio: auto;
        padding: 2rem 1.5rem;
      }

      h1 {
        font-size: 2rem;
      }
    }

  </style>
</head>
<body>

  <div class="background"></div>

  <div class="card">
    <h1>Jeff Hockema</h1>
    <p>IT Professional in Eugene, Oregon</p>

    <div class="icons">
      <a href="https://www.linkedin.com/in/jeffreyhockema/" target="_blank">
        <i class="fa-brands fa-linkedin-in"></i>
      </a>
      <a href="https://github.com/exception386/" target="_blank">
        <i class="fa-brands fa-github"></i>
      </a>
      <a href="https://www.facebook.com/jeffreyhockema/" target="_blank">
        <i class="fa-brands fa-facebook-f"></i>
      </a>
    </div>
  </div>

</body>
</html>
