<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jeff Hockema</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    :root {
      --text: rgba(255,255,255,0.96);
      --muted: rgba(255,255,255,0.72);
      --icon: rgba(255,255,255,0.82);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
    }

    body {
      font-family: "Inter", sans-serif;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #1b2419;
      overflow: hidden;
    }

    /* Background */
    .background {
      position: fixed;
      inset: 0;
      background: url("bg.jpg") center / cover no-repeat;
      transform: scale(1.02);
    }

    .background::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.18);
    }

    /* Card */
    .card {
      position: relative;
      z-index: 1;

      width: min(88vw, 450px);
      aspect-ratio: 1.75 / 1;

      display: flex;
      align-items: center;
      justify-content: center;

      padding: 1.5rem;
      border-radius: 22px;

      background: rgba(18, 24, 16, 0.22);

      backdrop-filter: blur(20px) saturate(135%);
      -webkit-backdrop-filter: blur(20px) saturate(135%);

      box-shadow:
        0 16px 40px rgba(0,0,0,0.25),
        inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4.5vw, 2.8rem); /* +25% */
      font-weight: 700;
      letter-spacing: -0.06em;
      color: var(--text);
    }

    .tagline {
      margin-top: 0.45rem;
      font-size: clamp(0.75rem, 1.5vw, 0.85rem);
      color: var(--muted);
      letter-spacing: 0.12em;
    }

    .icons {
      margin-top: 1.1rem;
      display: flex;
      gap: 1.4rem;
    }

    .icons a {
      color: var(--icon);
      font-size: 2rem; /* 100% bigger */
      transition: all 0.18s ease;
      opacity: 0.85;
    }

    .icons a:hover {
      color: #ffffff;
      transform: translateY(-2px);
      opacity: 1;
    }

    @media (max-width: 480px) {
      .card {
        width: min(92vw, 450px);
      }

      .icons {
        gap: 1.2rem;
      }
    }
  </style>
</head>
<body>

  <div class="background"></div>

  <div class="card">
    <div class="content">
      <h1>Jeff Hockema</h1>
      <div class="tagline">INFRASTRUCTURE • SOFTWARE • AUTOMATION</div>

      <div class="icons">
        <a href="https://www.linkedin.com/in/jeffreyhockema/" target="_blank">
          <i class="fa-brands fa-linkedin-in"></i>
        </a>
        <a href="https://github.com/jeffreyhockema/" target="_blank">
          <i class="fa-brands fa-github"></i>
        </a>
        <a href="https://www.facebook.com/jeffreyhockema/" target="_blank">
          <i class="fa-brands fa-facebook-f"></i>
        </a>
      </div>
    </div>
  </div>

</body>
</html>
