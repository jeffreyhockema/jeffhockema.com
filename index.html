<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jeff Hockema</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    :root {
      --text: #f8fafc;
      --muted: rgba(248, 250, 252, 0.82);
      --icon: rgba(255, 255, 255, 0.75);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
    }

    body {
      font-family: "Inter", sans-serif;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
      position: relative;
      background-color: #1a2419;
    }

    /* Background image */
    .background {
      position: fixed;
      inset: 0;
      background-image: url("bg.jpg");
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      transform: scale(1.02);
    }

    /* Subtle dark overlay for readability */
    .background::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.18),
        rgba(0,0,0,0.15)
      );
    }

    /* Premium glass card */
    .card {
      position: relative;
      z-index: 1;
      width: min(92vw, 520px);
      padding: 2.75rem 2.25rem;
      text-align: center;
      border-radius: 28px;

      /* Neutral glass (key change) */
      background: rgba(20, 30, 20, 0.18);

      backdrop-filter: blur(22px) saturate(140%);
      -webkit-backdrop-filter: blur(22px) saturate(140%);

      /* No border */
      border: none;

      /* Soft premium depth */
      box-shadow:
        0 20px 60px rgba(0, 0, 0, 0.25),
        inset 0 1px 0 rgba(255,255,255,0.06),
        inset 0 -1px 0 rgba(0,0,0,0.2);
    }

    h1 {
      margin: 0;
      font-size: clamp(2.3rem, 6vw, 4rem);
      line-height: 0.95;
      letter-spacing: -0.06em;
      font-weight: 700;
      text-shadow: 0 2px 18px rgba(0, 0, 0, 0.2);
    }

    p {
      margin: 0.85rem 0 0;
      font-size: 1rem;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.01em;
      text-shadow: 0 2px 14px rgba(0, 0, 0, 0.18);
    }

    .icons {
      margin-top: 1.9rem;
      display: flex;
      justify-content: center;
      gap: 1.4rem;
    }

    /* Clean icon style (no circles) */
    .icons a {
      color: var(--icon);
      text-decoration: none;
      font-size: 1.3rem;
      transition: transform 0.2s ease, color 0.2s ease, opacity 0.2s ease;
      opacity: 0.85;
    }

    .icons a:hover {
      color: white;
      transform: translateY(-2px);
      opacity: 1;
    }

    @media (max-width: 640px) {
      body {
        padding: 18px;
      }

      .card {
        padding: 2.2rem 1.4rem;
        border-radius: 24px;
      }

      p {
        font-size: 0.96rem;
      }

      .icons {
        gap: 1.1rem;
      }
    }
  </style>
</head>
<body>
  <div class="background"></div>

  <main class="card">
    <h1>Jeff Hockema</h1>
    <p>IT Professional in Eugene, Oregon</p>

    <nav class="icons">
      <a href="https://www.linkedin.com/in/jeffreyhockema/" target="_blank" rel="noopener noreferrer">
        <i class="fa-brands fa-linkedin-in"></i>
      </a>
      <a href="https://github.com/exception386/" target="_blank" rel="noopener noreferrer">
        <i class="fa-brands fa-github"></i>
      </a>
      <a href="https://www.facebook.com/jeffreyhockema/" target="_blank" rel="noopener noreferrer">
        <i class="fa-brands fa-facebook-f"></i>
      </a>
    </nav>
  </main>
</body>
</html>
