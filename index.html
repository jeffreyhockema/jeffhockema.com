<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jeff Hockema</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />

  <style>
    :root {
      --text: #f8fafc;
      --muted: rgba(248, 250, 252, 0.82);
      --card-bg: rgba(20, 24, 18, 0.22);
      --card-border: rgba(255, 255, 255, 0.18);
      --icon: rgba(255, 255, 255, 0.82);
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
    }

    body {
      font-family: "Inter", sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
      position: relative;
      background-color: #1a2419;
    }

    /* Full-screen background image */
    .background {
      position: fixed;
      inset: 0;
      background-image: url("bg.jpg");
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      transform: scale(1.02);
    }

    /* Soft darkening layer for readability */
    .background::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.18),
          rgba(0, 0, 0, 0.16)
        );
    }

    /* Floating business card */
    .card {
      position: relative;
      z-index: 1;
      width: min(92vw, 500px);
      padding: 2.75rem 2.25rem;
      text-align: center;
      border-radius: 28px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px) saturate(130%);
      -webkit-backdrop-filter: blur(18px) saturate(130%);
    }

    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 6vw, 4rem);
      line-height: 0.95;
      letter-spacing: -0.05em;
      font-weight: 700;
      text-shadow: 0 2px 18px rgba(0, 0, 0, 0.18);
    }

    p {
      margin: 0.9rem 0 0;
      font-size: 1rem;
      line-height: 1.5;
      font-weight: 500;
      color: var(--muted);
      text-shadow: 0 2px 14px rgba(0, 0, 0, 0.14);
    }

    .icons {
      margin-top: 1.9rem;
      display: flex;
      justify-content: center;
      gap: 1.35rem;
    }

    .icons a {
      width: 46px;
      height: 46px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      text-decoration: none;
      color: var(--icon);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.14);
      transition:
        transform 0.2s ease,
        background 0.2s ease,
        border-color 0.2s ease,
        color 0.2s ease;
    }

    .icons a:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.14);
      border-color: rgba(255, 255, 255, 0.22);
      color: #ffffff;
    }

    .icons i {
      font-size: 1.1rem;
    }

    /* Mobile portrait: keep image full height and crop sides naturally */
    @media (max-width: 640px) {
      body {
        padding: 18px;
      }

      .card {
        width: min(100%, 520px);
        padding: 2.15rem 1.35rem;
        border-radius: 24px;
      }

      p {
        font-size: 0.96rem;
      }

      .icons {
        gap: 1rem;
      }

      .icons a {
        width: 44px;
        height: 44px;
      }

      .background {
        background-position: center center;
      }
    }

    /* Optional: slightly favor the center-left if your subject matter looks best there */
    @media (min-aspect-ratio: 16/9) {
      .background {
        background-position: center center;
      }
    }
  </style>
</head>
<body>
  <div class="background" aria-hidden="true"></div>

  <main class="card">
    <h1>Jeff Hockema</h1>
    <p>IT Professional in Eugene, Oregon</p>

    <nav class="icons" aria-label="Social links">
      <a
        href="https://www.linkedin.com/in/jeffreyhockema/"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="LinkedIn"
      >
        <i class="fa-brands fa-linkedin-in"></i>
      </a>

      <a
        href="https://github.com/exception386/"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="GitHub"
      >
        <i class="fa-brands fa-github"></i>
      </a>

      <a
        href="https://www.facebook.com/jeffreyhockema/"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Facebook"
      >
        <i class="fa-brands fa-facebook-f"></i>
      </a>
    </nav>
  </main>
</body>
</html>
