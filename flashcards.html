<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sight Word Flash Cards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Comic Neue', cursive;
        }
        .card {
            perspective: 1000px;
        }
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 1.5rem;
        }
        .card-back {
            transform: rotateY(180deg);
        }
        .btn-level {
            transition: transform 0.2s;
            padding: 1rem;
            font-size: 1.5rem;
        }
        .btn-level:hover {
            transform: scale(1.05);
        }
        #fireworks-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 9999;
        }
        #progress-bar {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .progress-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #cbd5e1; /* gray-300 */
            transition: background-color 0.3s ease;
        }
        .dot-green { background-color: #4ade80; } /* green-400 */
        .dot-red { background-color: #f87171; } /* red-400 */
        .dot-yellow { background-color: #facc15; } /* yellow-400 */

        /* Styles for Learning Summary */
        .summary-tag {
            padding: 4px 8px;
            border-radius: 8px;
            font-weight: bold;
            color: white;
            margin: 2px;
            cursor: pointer;
        }
        .word-mastered, .letter-mastered { background-color: #22c55e; } /* green-600 */
        .word-practicing, .letter-practicing { background-color: #f59e0b; } /* amber-500 */
        .word-untested, .letter-untested { background-color: #94a3b8; } /* slate-400 */
    </style>
</head>
<body class="bg-blue-100 flex items-center justify-center min-h-screen">
    <canvas id="fireworks-canvas"></canvas>

    <div id="app" class="w-full max-w-2xl mx-auto p-4 z-10">
        
        <!-- Level Selection Screen -->
        <div id="level-selection" class="text-center">
            <h1 class="text-5xl font-bold text-blue-800 mb-2">Sight Word Flash Cards</h1>
            <p class="text-xl text-gray-600 mb-8">A Fun Reading Game</p>
            <div id="level-buttons-container" class="grid grid-cols-4 md:grid-cols-5 gap-3">
                <!-- Level buttons will be generated by JS -->
            </div>
            <button id="show-summary-btn" class="mt-6 w-full bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-4 rounded-lg text-2xl shadow-lg">Learning Summary</button>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="hidden text-center">
            <button id="back-to-levels" class="absolute top-4 left-4 bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-2 px-4 rounded-lg shadow-md">&larr; Levels</button>
            <div id="card-container" class="card w-full h-64 sm:h-80 my-8">
                <div class="card-inner">
                    <div id="flashcard" class="card-front bg-white shadow-2xl flex items-center justify-center p-6 rounded-3xl">
                        <p id="word-display" class="text-6xl sm:text-8xl font-bold text-gray-800"></p>
                    </div>
                     <div class="card-back bg-blue-500 shadow-2xl flex items-center justify-center p-6 rounded-3xl">
                        <p id="next-word-message" class="text-4xl text-white">Next Word!</p>
                    </div>
                </div>
            </div>
            <p class="text-xl text-blue-700 mb-6">Did you get it right?</p>
            <div class="flex justify-center space-x-4">
                <button id="no-btn" class="bg-red-500 hover:bg-red-600 text-white font-bold py-4 px-8 text-2xl rounded-full shadow-lg transition-transform transform hover:scale-110">No 😟</button>
                <button id="letters-btn" class="bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-4 px-8 text-2xl rounded-full shadow-lg transition-transform transform hover:scale-110">Letters 🤔</button>
                <button id="yes-btn" class="bg-green-500 hover:bg-green-600 text-white font-bold py-4 px-8 text-2xl rounded-full shadow-lg transition-transform transform hover:scale-110">Yes 😊</button>
            </div>
            <div id="progress-bar"></div>
        </div>
        
        <!-- Session Summary Screen -->
        <div id="session-summary-screen" class="hidden bg-white p-8 rounded-2xl shadow-2xl text-center">
            <h2 id="session-summary-title" class="text-3xl font-bold text-blue-800 mb-4">Level Complete!</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <h3 class="text-2xl font-bold text-green-600 mb-2">Perfect Words (This Session)</h3>
                    <ul id="perfect-words-list" class="text-lg"></ul>
                </div>
                <div>
                    <h3 class="text-2xl font-bold text-amber-500 mb-2">Practice Words (This Session)</h3>
                    <ul id="practice-words-list" class="text-lg"></ul>
                </div>
            </div>
            <button id="return-to-levels" class="mt-8 bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-6 rounded-lg text-xl shadow-lg">Play Again</button>
        </div>

        <!-- Overall Learning Summary Screen -->
        <div id="learning-summary-screen" class="hidden bg-white p-6 rounded-2xl shadow-2xl text-center">
            <h2 class="text-3xl font-bold text-blue-800 mb-4">Overall Progress</h2>
            <div class="border-b border-gray-200 mb-4">
                <nav class="-mb-px flex justify-center space-x-8" aria-label="Tabs">
                    <button id="tab-word-mastery" class="whitespace-nowrap py-4 px-1 border-b-2 font-medium text-lg border-indigo-500 text-indigo-600">Word Mastery</button>
                    <button id="tab-letter-knowledge" class="whitespace-nowrap py-4 px-1 border-b-2 font-medium text-lg border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300">Letter Knowledge</button>
                </nav>
            </div>

            <div id="summary-content-words">
                <div id="word-status-counts" class="flex justify-around space-x-4 mb-4 text-lg"></div>
                <div id="full-word-list" class="flex flex-wrap justify-center gap-2 max-h-80 overflow-y-auto p-2 bg-gray-100 rounded-lg"></div>
            </div>
            <div id="summary-content-letters" class="hidden">
                 <div id="letter-status-counts" class="flex justify-around space-x-4 mb-4 text-lg"></div>
                <div id="full-letter-list" class="flex flex-wrap justify-center gap-2 max-h-80 overflow-y-auto p-2 bg-gray-100 rounded-lg"></div>
            </div>
            <div class="flex justify-center mt-6 space-x-4">
                 <button id="summary-back-btn" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-6 rounded-lg text-xl shadow-lg">Back</button>
                 <button id="reset-progress-btn" class="bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-6 rounded-lg text-xl shadow-lg">Reset All Progress</button>
            </div>
        </div>

        <!-- Confirmation Modal -->
        <div id="confirm-modal" class="hidden fixed inset-0 bg-gray-900 bg-opacity-50 z-[10000] flex items-center justify-center">
             <div class="bg-white p-8 rounded-xl shadow-2xl text-center w-full max-w-sm">
                <h3 class="text-2xl font-bold mb-4">Are you sure?</h3>
                <p class="text-gray-600 mb-6">This will erase all learning progress. This action cannot be undone.</p>
                <div class="flex justify-center space-x-4">
                    <button id="confirm-reset-btn" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-6 rounded-lg">Yes, Reset</button>
                    <button id="cancel-reset-btn" class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-2 px-6 rounded-lg">Cancel</button>
                </div>
            </div>
        </div>
        
        <!-- Stats Detail Modal -->
        <div id="stats-modal" class="hidden fixed inset-0 bg-gray-900 bg-opacity-50 z-[10000] flex items-center justify-center p-4">
             <div class="bg-white p-8 rounded-xl shadow-2xl text-center w-full max-w-sm relative">
                <button id="close-stats-modal" class="absolute top-2 right-4 text-3xl font-bold text-gray-500 hover:text-gray-800">&times;</button>
                <h3 id="stats-modal-title" class="text-4xl font-bold mb-4"></h3>
                <p id="stats-modal-content" class="text-xl text-gray-700"></p>
            </div>
        </div>
    </div>

    <script>
        // --- Word Data ---
        const ALL_WORDS = ["the", "of", "and", "a", "to", "in", "is", "you", "that", "it", "he", "was", "for", "on", "are", "as", "with", "his", "they", "i", "at", "be", "this", "have", "from", "or", "one", "had", "by", "word", "but", "not", "what", "all", "were", "we", "when", "your", "can", "said", "there", "use", "an", "each", "which", "she", "do", "how", "their", "if", "will", "up", "other", "about", "out", "many", "then", "them", "these", "so", "some", "her", "would", "make", "like", "him", "into", "time", "has", "look", "two", "more", "write", "go", "see", "number", "no", "way", "could", "people", "my", "than", "first", "water", "been", "call", "who", "oil", "its", "now", "find", "long", "down", "day", "did", "get", "come", "made", "may", "part"];
        const ALPHABET = 'abcdefghijklmnopqrstuvwxyz'.split('');
        const WORD_MASTERY_THRESHOLD = 3; 
        const LETTER_MASTERY_THRESHOLD = 5;
        const WORDS_PER_LEVEL_INCREMENT = 5;
        const TOTAL_LEVELS = 20;
        const PROMPTS_PER_SESSION = 20;

        // --- Game State ---
        let wordMasteryData = {};
        let letterMasteryData = {};
        let currentLevelWords = [];
        let sessionCorrectWords = new Set();
        let sessionNonPerfectWords = new Set();
        let currentWord = '';
        let lastWord = '';
        let promptCount = 0;

        // --- DOM Elements ---
        const levelSelection = document.getElementById('level-selection');
        const gameScreen = document.getElementById('game-screen');
        const sessionSummaryScreen = document.getElementById('session-summary-screen');
        const learningSummaryScreen = document.getElementById('learning-summary-screen');
        const wordDisplay = document.getElementById('word-display');
        const yesBtn = document.getElementById('yes-btn');
        const noBtn = document.getElementById('no-btn');
        const lettersBtn = document.getElementById('letters-btn');
        const backBtn = document.getElementById('back-to-levels');
        const levelButtonsContainer = document.getElementById('level-buttons-container');
        const cardContainer = document.getElementById('card-container');
        const returnToLevelsBtn = document.getElementById('return-to-levels');
        const showSummaryBtn = document.getElementById('show-summary-btn');
        const summaryBackBtn = document.getElementById('summary-back-btn');
        const fullWordListContainer = document.getElementById('full-word-list');
        const fullLetterListContainer = document.getElementById('full-letter-list');
        const perfectWordsList = document.getElementById('perfect-words-list');
        const practiceWordsList = document.getElementById('practice-words-list');
        const progressBar = document.getElementById('progress-bar');
        const sessionSummaryTitle = document.getElementById('session-summary-title');
        const nextWordMessage = document.getElementById('next-word-message');
        const resetProgressBtn = document.getElementById('reset-progress-btn');
        const confirmModal = document.getElementById('confirm-modal');
        const confirmResetBtn = document.getElementById('confirm-reset-btn');
        const cancelResetBtn = document.getElementById('cancel-reset-btn');
        const wordStatusCounts = document.getElementById('word-status-counts');
        const letterStatusCounts = document.getElementById('letter-status-counts');
        const tabWordMastery = document.getElementById('tab-word-mastery');
        const tabLetterKnowledge = document.getElementById('tab-letter-knowledge');
        const summaryContentWords = document.getElementById('summary-content-words');
        const summaryContentLetters = document.getElementById('summary-content-letters');
        const statsModal = document.getElementById('stats-modal');
        const statsModalTitle = document.getElementById('stats-modal-title');
        const statsModalContent = document.getElementById('stats-modal-content');
        const closeStatsModalBtn = document.getElementById('close-stats-modal');
        
        // --- Sound Synthesis ---
        let synth;
        function setupSound() { if(Tone.context.state !== 'running') Tone.start(); synth = new Tone.Synth().toDestination(); }
        function playCorrectSound() { if (!synth) setupSound(); synth.triggerAttackRelease("C5", "8n", Tone.now()); synth.triggerAttackRelease("G5", "8n", Tone.now() + 0.1); }
        function playPartialSound() { if (!synth) setupSound(); synth.triggerAttackRelease("E4", "8n", Tone.now()); }
        function playIncorrectSound() { if (!synth) setupSound(); const lowSynth = new Tone.Synth({ oscillator: { type: 'square' }, envelope: { attack: 0.01, decay: 0.2, sustain: 0, release: 0.1 } }).toDestination(); lowSynth.triggerAttackRelease("A2", "8n"); }
        
        // --- Local Storage & Data Initialization ---
        function initializeWordData() { return { consecutiveCorrect: 0, correct: 0, incorrect: 0, status: 'untested' }; }
        function initializeLetterData() { return { correct: 0, incorrect: 0 }; }
        function loadMasteryData() {
            const savedWordData = localStorage.getItem('sightWordMastery');
            wordMasteryData = savedWordData ? JSON.parse(savedWordData) : {};
            ALL_WORDS.forEach(word => {
                if (!wordMasteryData[word] || !wordMasteryData[word].hasOwnProperty('consecutiveCorrect')) {
                     wordMasteryData[word] = initializeWordData();
                }
            });

            const savedLetterData = localStorage.getItem('sightWordLetterMastery');
            letterMasteryData = savedLetterData ? JSON.parse(savedLetterData) : {};
            ALPHABET.forEach(letter => {
                if (!letterMasteryData[letter] || !letterMasteryData[letter].hasOwnProperty('correct')) {
                    letterMasteryData[letter] = initializeLetterData();
                }
            });
        }
        function saveMasteryData() { 
            localStorage.setItem('sightWordMastery', JSON.stringify(wordMasteryData)); 
            localStorage.setItem('sightWordLetterMastery', JSON.stringify(letterMasteryData));
        }
        function resetProgress() {
            localStorage.removeItem('sightWordMastery');
            localStorage.removeItem('sightWordLetterMastery');
            loadMasteryData();
            showLearningSummary();
            confirmModal.classList.add('hidden');
        }

        // --- Fireworks Animation ---
        const canvas = document.getElementById('fireworks-canvas'); const ctx = canvas.getContext('2d'); canvas.width = window.innerWidth; canvas.height = window.innerHeight; let fireworks = [];
        class Firework { constructor(startX, startY) { this.x = startX; this.y = startY; this.sx = (Math.random() - 0.5) * 6; this.sy = Math.random() * -5 - 10; this.size = Math.random() * 2 + 2; this.color = `hsl(${Math.random() * 360}, 100%, 70%)`; this.particles = []; this.exploded = false; } update() { if (!this.exploded) { this.x += this.sx; this.y += this.sy; this.sy += 0.2; if (this.sy >= -2) { this.explode(); } } else { this.particles.forEach((p, i) => { p.update(); if (p.alpha <= 0) this.particles.splice(i, 1); }); } } draw() { ctx.save(); ctx.globalCompositeOperation = 'lighter'; if (!this.exploded) { ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); } else { this.particles.forEach(p => p.draw()); } ctx.restore(); } explode() { this.exploded = true; for (let i = 0; i < 150; i++) { this.particles.push(new Particle(this.x, this.y, this.color)); } } }
        class Particle { constructor(x, y, color) { this.x = x; this.y = y; this.color = color; this.angle = Math.random() * Math.PI * 2; this.speed = Math.random() * 8 + 2; this.friction = 0.96; this.gravity = 0.8; this.alpha = 1; this.decay = Math.random() * 0.02 + 0.01; } update() { this.speed *= this.friction; this.x += Math.cos(this.angle) * this.speed; this.y += Math.sin(this.angle) * this.speed + this.gravity; this.alpha -= this.decay; } draw() { ctx.globalAlpha = this.alpha; ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, 2, 0, Math.PI * 2); ctx.fill(); } }
        function animateFireworks() { ctx.clearRect(0, 0, canvas.width, canvas.height); fireworks.forEach((f, i) => { f.update(); f.draw(); if (f.exploded && f.particles.length === 0) fireworks.splice(i, 1); }); requestAnimationFrame(animateFireworks); }
        function triggerFireworks() { const rect = yesBtn.getBoundingClientRect(); const startX = rect.left + rect.width / 2; const startY = rect.top + rect.height / 2; for(let i=0; i<8; i++){ fireworks.push(new Firework(startX, startY)); } }

        // --- Game Setup ---
        function generateLevelButtons() {
            const colors = ['bg-green-400', 'bg-yellow-400', 'bg-orange-400', 'bg-red-400', 'bg-purple-400', 'bg-pink-400', 'bg-teal-400', 'bg-cyan-400'];
            levelButtonsContainer.innerHTML = Array.from({ length: TOTAL_LEVELS }, (_, i) => {
                const level = i + 1;
                const colorClass = colors[i % colors.length];
                return `<button data-level="${level}" class="btn-level ${colorClass} hover:${colorClass.replace('400', '500')} text-white font-bold rounded-lg shadow-lg">Level ${level}</button>`;
            }).join('');
        }
        
        function startGame(level) {
            currentLevelWords = ALL_WORDS.slice(0, level * WORDS_PER_LEVEL_INCREMENT);
            sessionCorrectWords.clear();
            sessionNonPerfectWords.clear();
            promptCount = 0;
            lastWord = '';
            renderProgressBar();
            levelSelection.classList.add('hidden');
            gameScreen.classList.remove('hidden');
            yesBtn.disabled = false; noBtn.disabled = false; lettersBtn.disabled = false;
            nextWord();
        }

        function renderProgressBar() { progressBar.innerHTML = ''; for(let i = 0; i < PROMPTS_PER_SESSION; i++) { const dot = document.createElement('div'); dot.classList.add('progress-dot'); progressBar.appendChild(dot); } }
        function updateProgressBar(status) { const dots = progressBar.children; if (dots[promptCount]) { dots[promptCount].classList.add(`dot-${status}`); } }

        // --- Core Gameplay Loop ---
        function getNextWord() {
            let practiceWords = currentLevelWords.filter(word => wordMasteryData[word]?.status !== 'mastered');
            if (practiceWords.length > 1 && lastWord) {
                 practiceWords = practiceWords.filter(word => word !== lastWord);
            }
            if (practiceWords.length === 0) return null;
            
            const weightedList = practiceWords.flatMap(word => Array(sessionNonPerfectWords.has(word) ? 4 : 1).fill(word));
            return weightedList[Math.floor(Math.random() * weightedList.length)];
        }

        function nextWord() {
            if (promptCount >= PROMPTS_PER_SESSION) { endLevel(); return; }
            lastWord = currentWord;
            currentWord = getNextWord();
            if (currentWord === null) { endLevel(true); return; }
            if (wordMasteryData[currentWord]?.status === 'untested') { wordMasteryData[currentWord].status = 'practicing'; }
            wordDisplay.textContent = currentWord;
            cardContainer.classList.remove('flipped');
        }
        
        function handleResponse(responseType) {
            const wordData = wordMasteryData[currentWord];
            let barStatus = '';
            if (responseType === 'correct') {
                playCorrectSound();
                triggerFireworks();
                sessionCorrectWords.add(currentWord);
                wordData.consecutiveCorrect++;
                wordData.correct++;
                if (wordData.consecutiveCorrect >= WORD_MASTERY_THRESHOLD) { wordData.status = 'mastered'; }
                barStatus = 'green';
            } else {
                 wordData.consecutiveCorrect = 0;
                 wordData.status = 'practicing';
                 sessionNonPerfectWords.add(currentWord);
                 const uniqueLetters = [...new Set(currentWord.split(''))];
                 if (responseType === 'incorrect') {
                    playIncorrectSound();
                    wordData.incorrect++;
                    uniqueLetters.forEach(letter => {
                        if (letterMasteryData[letter]) letterMasteryData[letter].incorrect++;
                    });
                    barStatus = 'red';
                } else if (responseType === 'partial') {
                    playPartialSound();
                     uniqueLetters.forEach(letter => {
                        if (letterMasteryData[letter]) letterMasteryData[letter].correct++;
                    });
                    barStatus = 'yellow';
                }
            }
            updateProgressBar(barStatus);
            promptCount++;
            saveMasteryData();
            cardContainer.classList.add('flipped');
            setTimeout(nextWord, 700);
        }

        function endLevel(allMastered = false) {
            yesBtn.disabled = true; noBtn.disabled = true; lettersBtn.disabled = true;
            sessionSummaryTitle.textContent = allMastered ? "Amazing!" : "Level Complete!";
            nextWordMessage.textContent = allMastered ? "All words mastered! 🎉" : "Next Word!";
            
            const perfectSessionWords = [...sessionCorrectWords].filter(word => !sessionNonPerfectWords.has(word));
            const practiceSessionWords = [...sessionNonPerfectWords];
            
            perfectWordsList.innerHTML = perfectSessionWords.map(w => `<li>${w}</li>`).join('') || '<li>No words were perfect this round.</li>';
            practiceWordsList.innerHTML = practiceSessionWords.map(w => `<li>${w}</li>`).join('') || '<li>No words needed practice this round!</li>';

            gameScreen.classList.add('hidden');
            sessionSummaryScreen.classList.remove('hidden');
        }

        function showLearningSummary() {
            renderWordSummaryView();
            levelSelection.classList.add('hidden');
            learningSummaryScreen.classList.remove('hidden');
        }

        function renderWordSummaryView() {
            let mastered = 0, practicing = 0, untested = 0;
            const wordElements = ALL_WORDS.map(word => {
                const wordData = wordMasteryData[word];
                if (wordData.status === 'mastered') mastered++;
                else if (wordData.status === 'practicing') practicing++;
                else untested++;
                return `<div class="summary-tag word-${wordData.status}" title="Correct: ${wordData.correct} | Incorrect: ${wordData.incorrect}" data-word="${word}">${word}</div>`;
            }).join('');
            fullWordListContainer.innerHTML = wordElements;
            wordStatusCounts.innerHTML = `<span class="font-bold">Mastered: <span class="text-green-600">${mastered}</span></span> <span class="font-bold">Practicing: <span class="text-amber-500">${practicing}</span></span> <span class="font-bold">Untested: <span class="text-slate-500">${untested}</span></span>`;
        }
        
        function renderLetterSummaryView() {
            let mastered = 0, practicing = 0, untested = 0;
            const letterElements = ALPHABET.map(letter => {
                const letterData = letterMasteryData[letter];
                let statusClass = 'letter-untested';
                if (letterData.correct > 0 || letterData.incorrect > 0) {
                    statusClass = 'letter-practicing';
                    practicing++;
                } else {
                    untested++;
                }
                if (letterData.correct >= LETTER_MASTERY_THRESHOLD && letterData.incorrect === 0) {
                    statusClass = 'letter-mastered';
                    practicing--;
                    mastered++;
                }
                return `<div class="summary-tag text-2xl ${statusClass}" title="Correct: ${letterData.correct} | Incorrect: ${letterData.incorrect}" data-letter="${letter}">${letter.toUpperCase()}</div>`;
            }).join('');
            fullLetterListContainer.innerHTML = letterElements;
            letterStatusCounts.innerHTML = `<span class="font-bold">Mastered: <span class="text-green-600">${mastered}</span></span> <span class="font-bold">Practicing: <span class="text-amber-500">${practicing}</span></span> <span class="font-bold">Untested: <span class="text-slate-500">${untested}</span></span>`;
        }

        // --- Event Listeners ---
        yesBtn.addEventListener('click', () => handleResponse('correct'));
        lettersBtn.addEventListener('click', () => handleResponse('partial'));
        noBtn.addEventListener('click', () => handleResponse('incorrect'));
        backBtn.addEventListener('click', () => { gameScreen.classList.add('hidden'); levelSelection.classList.remove('hidden'); });
        returnToLevelsBtn.addEventListener('click', () => { sessionSummaryScreen.classList.add('hidden'); levelSelection.classList.remove('hidden'); });
        showSummaryBtn.addEventListener('click', showLearningSummary);
        summaryBackBtn.addEventListener('click', () => { learningSummaryScreen.classList.add('hidden'); levelSelection.classList.remove('hidden'); });
        resetProgressBtn.addEventListener('click', () => confirmModal.classList.remove('hidden'));
        cancelResetBtn.addEventListener('click', () => confirmModal.classList.add('hidden'));
        confirmResetBtn.addEventListener('click', resetProgress);
        levelButtonsContainer.addEventListener('click', e => { if (e.target.matches('[data-level]')) { startGame(parseInt(e.target.dataset.level)); } });
        
        fullWordListContainer.addEventListener('click', e => {
            if(e.target.matches('[data-word]')) {
                const word = e.target.dataset.word;
                const wordData = wordMasteryData[word];
                statsModalTitle.textContent = `"${word}"`;
                statsModalContent.innerHTML = `Correct: <span class="text-green-600 font-bold">${wordData.correct}</span><br>Incorrect: <span class="text-red-500 font-bold">${wordData.incorrect}</span>`;
                statsModal.classList.remove('hidden');
            }
        });

        fullLetterListContainer.addEventListener('click', e => {
             if(e.target.matches('[data-letter]')) {
                const letter = e.target.dataset.letter;
                const letterData = letterMasteryData[letter];
                statsModalTitle.textContent = letter.toUpperCase();
                statsModalContent.innerHTML = `Correct: <span class="text-green-600 font-bold">${letterData.correct}</span><br>Incorrect: <span class="text-red-500 font-bold">${letterData.incorrect}</span>`;
                statsModal.classList.remove('hidden');
            }
        });

        closeStatsModalBtn.addEventListener('click', () => statsModal.classList.add('hidden'));
        statsModal.addEventListener('click', (e) => {
            if (e.target.id === 'stats-modal') {
                statsModal.classList.add('hidden');
            }
        });
        
        tabWordMastery.addEventListener('click', () => {
            summaryContentWords.classList.remove('hidden'); summaryContentLetters.classList.add('hidden');
            tabWordMastery.className = "whitespace-nowrap py-4 px-1 border-b-2 font-medium text-lg border-indigo-500 text-indigo-600";
            tabLetterKnowledge.className = "whitespace-nowrap py-4 px-1 border-b-2 font-medium text-lg border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300";
            renderWordSummaryView();
        });
        tabLetterKnowledge.addEventListener('click', () => {
            summaryContentWords.classList.add('hidden'); summaryContentLetters.classList.remove('hidden');
            tabLetterKnowledge.className = "whitespace-nowrap py-4 px-1 border-b-2 font-medium text-lg border-indigo-500 text-indigo-600";
            tabWordMastery.className = "whitespace-nowrap py-4 px-1 border-b-2 font-medium text-lg border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300";
            renderLetterSummaryView();
        });
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

        // --- Initialize App ---
        function initializeApp() {
            loadMasteryData();
            generateLevelButtons();
            animateFireworks();
            document.body.addEventListener('click', setupSound, { once: true });
        }

        initializeApp();
    </script>
</body>
</html>
