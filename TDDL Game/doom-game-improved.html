<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Top-Down Doom Game - Improved</title>
    <link rel="stylesheet" href="styles.css">
    <meta name="description" content="A top-down Doom-style game with modern performance optimizations">
    <meta name="theme-color" content="#000000">
</head>
<body>
    <div class="level-info">Level 1</div>
    <div class="score-info">Score: 0</div>
    
    <canvas id="gameCanvas" tabindex="0" role="application" aria-label="Game canvas"></canvas>
    
    <!-- HUD -->
    <div class="doom-hud">
        <div class="hud-left">
            <div class="doom-face" id="doomFace" role="img" aria-label="Player status">:D</div>
            <div class="health-display">
                <span id="health" aria-label="Health">100</span>%
            </div>
        </div>
        
        <div class="hud-center">
            <div class="keys-display" aria-label="Collected keys">
                <div class="key-indicator key-red" id="redKey" style="opacity: 0.3;" aria-label="Red key">R</div>
                <div class="key-indicator key-yellow" id="yellowKey" style="opacity: 0.3;" aria-label="Yellow key">Y</div>
                <div class="key-indicator key-blue" id="blueKey" style="opacity: 0.3;" aria-label="Blue key">B</div>
            </div>
            <div class="weapon-display" id="weaponName" aria-label="Current weapon">PISTOL</div>
            <div class="ammo-display">
                <span id="ammo" aria-label="Ammunition">∞</span>
            </div>
        </div>
        
        <div class="hud-right">
            <div class="weapons-grid" id="weaponsGrid" aria-label="Available weapons">
                <!-- Weapon grid will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <!-- Loading screen -->
    <div id="loadingScreen" style="
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: #000;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Courier New', monospace;
        font-size: 24px;
        z-index: 3000;
    ">
        Loading...
    </div>

    <!-- Error display container -->
    <div id="errorContainer" aria-live="polite"></div>

    <script type="module">
        import { GameEngine } from './game-engine.js';
        import { MobileControls, SettingsManager } from './mobile-controls.js';
        import { ErrorHandler } from './error-handler.js';
        import { GAME_CONFIG } from './constants.js';

        class Game {
            constructor() {
                this.canvas = null;
                this.gameEngine = null;
                this.mobileControls = null;
                this.settingsManager = null;
                this.errorHandler = null;
                this.isInitialized = false;
            }

            async init() {
                try {
                    // Get canvas element
                    this.canvas = document.getElementById('gameCanvas');
                    if (!this.canvas) {
                        throw new Error('Canvas element not found');
                    }

                    // Check for required browser features
                    this.checkBrowserSupport();

                    // Initialize game engine
                    this.gameEngine = new GameEngine(this.canvas);
                    
                    // Initialize error handler
                    this.errorHandler = new ErrorHandler(this.gameEngine);
                    
                    // Initialize settings manager
                    this.settingsManager = new SettingsManager(this.gameEngine);
                    
                    // Initialize mobile controls if needed
                    this.mobileControls = new MobileControls(this.gameEngine);
                    
                    // Set up weapon grid
                    this.setupWeaponGrid();
                    
                    // Set up keyboard shortcuts
                    this.setupKeyboardShortcuts();
                    
                    // Hide loading screen
                    this.hideLoadingScreen();
                    
                    // Start periodic health checks
                    this.startHealthChecks();
                    
                    this.isInitialized = true;
                    console.log('Game initialized successfully');

                } catch (error) {
                    this.handleInitializationError(error);
                }
            }

            checkBrowserSupport() {
                const required = {
                    canvas: !!this.canvas.getContext,
                    audioContext: !!(window.AudioContext || window.webkitAudioContext),
                    requestAnimationFrame: !!window.requestAnimationFrame,
                    localStorage: !!window.localStorage
                };

                const missing = Object.keys(required).filter(key => !required[key]);
                
                if (missing.length > 0) {
                    throw new Error(`Browser missing required features: ${missing.join(', ')}`);
                }

                // Check for touch support
                const hasTouch = 'ontouchstart' in window;
                console.log('Touch support:', hasTouch ? 'Available' : 'Not available');
            }

            setupWeaponGrid() {
                const weaponsGrid = document.getElementById('weaponsGrid');
                if (!weaponsGrid) return;

                const weapons = [
                    { name: 'FIST', key: '1', icon: '✊' },
                    { name: 'PISTOL', key: '2', icon: '🔫' },
                    { name: 'SHOTGUN', key: '3', icon: '💥' },
                    { name: 'CHAINGUN', key: '4', icon: '🔥' },
                    { name: 'ROCKET', key: '5', icon: '🚀' },
                    { name: 'PLASMA', key: '6', icon: '⚡' }
                ];

                weaponsGrid.innerHTML = weapons.map((weapon, index) => `
                    <div class="weapon-slot ${index < 2 ? 'owned' : 'not-owned'}" 
                         data-weapon="${index}" 
                         title="${weapon.name} (${weapon.key})">
                        <div class="weapon-info">
                            <span class="weapon-number">${weapon.key}</span>
                            <span class="weapon-icon">${weapon.icon}</span>
                            <span class="weapon-name">${weapon.name}</span>
                        </div>
                        <span class="weapon-ammo">∞</span>
                    </div>
                `).join('');

                // Add click handlers for weapon switching
                weaponsGrid.addEventListener('click', (e) => {
                    const slot = e.target.closest('.weapon-slot');
                    if (slot && slot.classList.contains('owned')) {
                        const weaponIndex = parseInt(slot.dataset.weapon);
                        this.gameEngine.switchWeapon(weaponIndex);
                    }
                });
            }

            setupKeyboardShortcuts() {
                document.addEventListener('keydown', (e) => {
                    // Debug shortcuts (only in development)
                    if (this.errorHandler.isDevelopment()) {
                        switch (e.key) {
                            case 'F1':
                                e.preventDefault();
                                console.log('Error Report:', this.errorHandler.getErrorReport());
                                break;
                            case 'F2':
                                e.preventDefault();
                                this.errorHandler.exportErrorLog();
                                break;
                            case 'F3':
                                e.preventDefault();
                                this.toggleDebugMode();
                                break;
                        }
                    }

                    // Settings shortcut
                    if (e.key === 'F10' || (e.key === 'm' && e.ctrlKey)) {
                        e.preventDefault();
                        this.settingsManager.showSettings();
                    }
                });
            }

            toggleDebugMode() {
                const current = this.gameEngine.gameState.settings.graphics;
                this.gameEngine.gameState.settings.graphics = current === 'debug' ? 'high' : 'debug';
                console.log('Debug mode:', current === 'debug' ? 'OFF' : 'ON');
            }

            hideLoadingScreen() {
                const loadingScreen = document.getElementById('loadingScreen');
                if (loadingScreen) {
                    loadingScreen.style.opacity = '0';
                    loadingScreen.style.transition = 'opacity 0.5s';
                    setTimeout(() => {
                        loadingScreen.style.display = 'none';
                    }, 500);
                }
            }

            startHealthChecks() {
                // Check memory and performance every 10 seconds
                setInterval(() => {
                    if (this.isInitialized && this.errorHandler) {
                        this.errorHandler.checkMemoryUsage();
                        this.errorHandler.checkPerformance();
                    }
                }, 10000);
            }

            handleInitializationError(error) {
                console.error('Game initialization failed:', error);
                
                const loadingScreen = document.getElementById('loadingScreen');
                if (loadingScreen) {
                    loadingScreen.innerHTML = `
                        <div style="text-align: center;">
                            <h2 style="color: #ff0000;">Error Loading Game</h2>
                            <p>${error.message}</p>
                            <button onclick="location.reload()" style="
                                padding: 10px 20px;
                                background: #333;
                                border: 1px solid #666;
                                color: #fff;
                                cursor: pointer;
                                font-family: 'Courier New', monospace;
                            ">Try Again</button>
                        </div>
                    `;
                }
            }

            // Public API for debugging and external access
            getGameState() {
                return this.gameEngine?.gameState || null;
            }

            getErrorLog() {
                return this.errorHandler?.errorLog || [];
            }

            exportSave() {
                // Implement save game functionality
                const saveData = {
                    level: this.gameEngine.gameState.level,
                    score: this.gameEngine.gameState.score,
                    playerHealth: this.gameEngine.player.health,
                    weapons: this.gameEngine.player.weapons,
                    ammo: this.gameEngine.player.ammo,
                    keys: this.gameEngine.player.keys,
                    timestamp: new Date().toISOString()
                };

                try {
                    localStorage.setItem('doomGameSave', JSON.stringify(saveData));
                    console.log('Game saved successfully');
                } catch (error) {
                    console.error('Failed to save game:', error);
                }
            }

            loadSave() {
                try {
                    const saveData = localStorage.getItem('doomGameSave');
                    if (saveData) {
                        const data = JSON.parse(saveData);
                        // Implement load logic
                        console.log('Save data found:', data);
                        return data;
                    }
                } catch (error) {
                    console.error('Failed to load save:', error);
                }
                return null;
            }
        }

        // Global game instance for debugging
        window.game = new Game();
        
        // Initialize game when DOM is loaded
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => window.game.init());
        } else {
            window.game.init();
        }

        // Handle page visibility changes to pause/resume game
        document.addEventListener('visibilitychange', () => {
            if (window.game.gameEngine) {
                if (document.hidden) {
                    window.game.gameEngine.gameState.setState('paused');
                } else {
                    // Resume only if not in game over state
                    const state = window.game.gameEngine.gameState.current;
                    if (state === 'paused') {
                        window.game.gameEngine.gameState.setState('playing');
                    }
                }
            }
        });

        // Prevent context menu on right-click for better game experience
        document.addEventListener('contextmenu', (e) => e.preventDefault());
        
        // Disable text selection for better mobile experience
        document.addEventListener('selectstart', (e) => e.preventDefault());
    </script>

    <!-- Service Worker for offline support -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => {
                        console.log('SW registered: ', registration);
                    })
                    .catch(registrationError => {
                        console.log('SW registration failed: ', registrationError);
                    });
            });
        }
    </script>
</body>
</html>
