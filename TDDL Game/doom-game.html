                        filterNode.frequency.setValueAtTime(800, audioContext.currentTime);
                        break;
                    case 'rocket':
                        oscillator.type = 'triangle';
                        oscillator.frequency.setValueAtTime(100, audioContext.currentTime);
                        oscillator.frequency.exponentialRampToValueAtTime(300, audioContext.currentTime + 0.2);
                        filterNode.frequency.setValueAtTime(600, audioContext.currentTime);
                        break;
                    case 'plasma':
                        oscillator.type = 'sine';
                        oscillator.frequency.setValueAtTime(1200, audioContext.currentTime);
                        oscillator.frequency.exponentialRampToValueAtTime(800, audioContext.currentTime + 0.1);
                        filterNode.frequency.setValueAtTime(2000, audioContext.currentTime);
                        break;
                    case 'explosion':
                        oscillator.type = 'square';
                        oscillator.frequency.setValueAtTime(80, audioContext.currentTime);
                        oscillator.frequency.exponentialRampToValueAtTime(20, audioContext.currentTime + 0.3);
                        filterNode.frequency.setValueAtTime(200, audioContext.currentTime);
                        filterNode.Q.setValueAtTime(15, audioContext.currentTime);
                        break;
                    case 'enemyHit':
                        oscillator.type = 'sawtooth';
                        oscillator.frequency.setValueAtTime(300, audioContext.currentTime);
                        oscillator.frequency.exponentialRampToValueAtTime(150, audioContext.currentTime + 0.1);
                        break;
                    case 'enemyDeath':
                        oscillator.type = 'triangle';
                        oscillator.frequency.setValueAtTime(200, audioContext.currentTime);
                        oscillator.frequency.exponentialRampToValueAtTime(50, audioContext.currentTime + 0.4);
                        break;
                    case 'keyPickup':
                        oscillator.type = 'sine';
                        oscillator.frequency.setValueAtTime(1000, audioContext.currentTime);
                        oscillator.frequency.exponentialRampToValueAtTime(1500, audioContext.currentTime + 0.1);
                        break;
                    case 'doorOpen':
                        oscillator.type = 'sawtooth';
                        oscillator.frequency.setValueAtTime(200, audioContext.currentTime);
                        oscillator.frequency.linearRampToValueAtTime(600, audioContext.currentTime + 0.3);
                        break;
                    case 'playerHurt':
                        oscillator.type = 'square';
                        oscillator.frequency.setValueAtTime(150, audioContext.currentTime);
                        oscillator.frequency.exponentialRampToValueAtTime(100, audioContext.currentTime + 0.15);
                        filterNode.frequency.setValueAtTime(300, audioContext.currentTime);
                        break;
                    default:
                        oscillator.type = 'square';
                        oscillator.frequency.setValueAtTime(soundConfig.freq, audioContext.currentTime);
                        break;
                }
                
                // Dynamic volume based on sound type
                const baseVolume = soundName === 'explosion' || soundName === 'rocket' ? 0.15 : 0.1;
                gainNode.gain.setValueAtTime(baseVolume, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + soundConfig.duration);
                
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + soundConfig.duration);
            } catch (e) {
                // Audio not supported or blocked
            }
        }
        
        function switchWeapon(weaponIndex) {
            if (weaponIndex < player.weapons.length) {
                player.currentWeapon = weaponIndex;
                updateUI();
            }
        }

        function shoot() {
            const now = Date.now();
            const currentWeaponName = player.weapons[player.currentWeapon];
            const weapon = weapons[currentWeaponName];
            
            console.log(`Shooting with ${currentWeaponName}, weapon:`, weapon);
            
            if (now - player.lastShot < weapon.fireRate) return;
            
            // Check ammo
            if (weapon.ammo !== -1 && player.ammo[currentWeaponName] <= 0) return;
            
            player.lastShot = now;
            
            // Consume ammo
            if (weapon.ammo !== -1) {
                player.ammo[currentWeaponName]--;
            }
            
            // Handle melee weapons
            if (weapon.meleeWeapon) {
                // Melee attack - check for nearby enemies
                enemies.forEach((enemy, index) => {
                    const dist = Math.sqrt((enemy.x - player.x) ** 2 + (enemy.y - player.y) ** 2);
                    if (dist < weapon.range) {
                        enemy.health -= weapon.damage;
                        playSound('enemyHit');
                        
                        if (enemy.health <= 0) {
                            game.score += enemy.points;
                            playSound('enemyDeath');
                            enemies.splice(index, 1);
                        }
                    }
                });
                updateUI();
                return;
            }
            
            // Create projectile(s)
            if (weapon.projectileType === 'shotgun') {
                // Shotgun creates multiple pellets
                for (let i = 0; i < weapon.pellets; i++) {
                    const spread = (Math.random() - 0.5) * 0.3; // 0.3 radian spread
                    const bullet = {
                        x: player.x,
                        y: player.y,
                        angle: player.angle + spread,
                        speed: 8,
                        damage: weapon.damage / weapon.pellets,
                        range: weapon.range,
                        traveled: 0,
                        owner: 'player',
                        type: weapon.projectileType
                    };
                    bullets.push(bullet);
                }
            } else {
                // Single projectile
                const bullet = {
                    x: player.x,
                    y: player.y,
                    angle: player.angle,
                    speed: weapon.projectileType === 'rocket' ? 6 : 8,
                    damage: weapon.damage,
                    range: weapon.range,
                    traveled: 0,
                    owner: 'player',
                    type: weapon.projectileType
                };
                bullets.push(bullet);
                console.log(`Created bullet:`, bullet);
            }
            
            // Play weapon sound
            playSound(currentWeaponName);
            
            updateUI();
        }

        function updateCamera() {
            // Set camera target to follow player
            camera.targetX = player.x - canvas.width / 2;
            camera.targetY = player.y - canvas.height / 2;
            
            // Smooth camera movement
            camera.x += (camera.targetX - camera.x) * camera.smoothing;
            camera.y += (camera.targetY - camera.y) * camera.smoothing;
            
            // Clamp camera to level boundaries
            const maxCameraX = LEVEL_WIDTH * CELL_SIZE - canvas.width;
            const maxCameraY = LEVEL_HEIGHT * CELL_SIZE - canvas.height;
            
            camera.x = Math.max(0, Math.min(maxCameraX, camera.x));
            camera.y = Math.max(0, Math.min(maxCameraY, camera.y));
        }
        
        function updatePlayer() {
            // Prevent movement during door opening
            if (player.doorOpening !== null) {
                return;
            }
            
            let dx = 0;
            let dy = 0;
            
            if (keys['KeyW']) dy -= 1;
            if (keys['KeyS']) dy += 1;
            if (keys['KeyA']) dx -= 1;
            if (keys['KeyD']) dx += 1;
            
            // Normalize diagonal movement
            if (dx !== 0 && dy !== 0) {
                dx *= 0.707;
                dy *= 0.707;
            }
            
            // Check special floor effects before movement
            const currentCellX = Math.floor(player.x / CELL_SIZE);
            const currentCellY = Math.floor(player.y / CELL_SIZE);
            let speedModifier = 1;
            
            if (currentCellX >= 0 && currentCellX < LEVEL_WIDTH && currentCellY >= 0 && currentCellY < LEVEL_HEIGHT) {
                const currentCell = levelData[currentCellY][currentCellX];
                
                // Handle special floor effects
                if (currentCell === WATER) {
                    speedModifier = 0.5; // Slow movement in water
                } else if (currentCell === LAVA) {
                    if (!player.invulnerable) {
                        player.health -= 1; // Damage from lava
                        if (Math.random() < 0.1) playSound('playerHurt');
                        if (player.health <= 0) {
                            game.gameOver = true;
                        }
                    }
                    speedModifier = 0.7; // Slightly slow in lava
                }
            }
            
            // Apply movement with collision checking and speed modifiers
            let runMultiplier = 1;
            if (keys['ShiftLeft'] || keys['ShiftRight']) {
                runMultiplier = 1.8; // 80% speed boost when running
            }
            
            const effectiveSpeed = player.speed * speedModifier * runMultiplier;
            const newX = player.x + dx * effectiveSpeed;
            const newY = player.y + dy * effectiveSpeed;
            
            if (!checkWallCollision(newX, player.y, player.size)) {
                player.x = newX;
            }
            if (!checkWallCollision(player.x, newY, player.size)) {
                player.y = newY;
            }
            
            // Keep player in level bounds (not canvas bounds)
            const levelPixelWidth = LEVEL_WIDTH * CELL_SIZE;
            const levelPixelHeight = LEVEL_HEIGHT * CELL_SIZE;
            player.x = Math.max(player.size, Math.min(levelPixelWidth - player.size, player.x));
            player.y = Math.max(player.size, Math.min(levelPixelHeight - player.size, player.y));
            
            // Check item collection
            checkItemCollection();
            
            // Debug: Show total items every 60 frames (once per second at 60fps)
            if (Math.random() < 0.016) { // ~1/60 chance each frame
                const keyItems = items.filter(i => i.type === 'key' && !i.collected);
                if (keyItems.length > 0) {
                    console.log(`🔑 Available keys in level:`, keyItems.map(k => `${k.keyType} at (${k.x.toFixed(0)}, ${k.y.toFixed(0)})`));
                }
            }
            
            // Check door interaction
            checkDoorInteraction();
            
            // Check secret wall interaction
            checkSecretWallInteraction();
            
            // Check exit
            checkExit();
        }

        function checkWallCollision(x, y, size) {
            const cellX = Math.floor(x / CELL_SIZE);
            const cellY = Math.floor(y / CELL_SIZE);
            
            // Check the four corners of the entity
            const corners = [
                { x: x - size, y: y - size },
                { x: x + size, y: y - size },
                { x: x - size, y: y + size },
                { x: x + size, y: y + size }
            ];
            
            for (const corner of corners) {
                const cX = Math.floor(corner.x / CELL_SIZE);
                const cY = Math.floor(corner.y / CELL_SIZE);
                
                // Check boundaries
                if (cX < 0 || cX >= LEVEL_WIDTH || cY < 0 || cY >= LEVEL_HEIGHT) return true;
                
                const cellType = levelData[cY][cX];
                
                // Check all solid wall types (secret walls are not solid)
                if (isSolidWallType(cellType)) return true;
                
                // Check locked doors
                if (isDoorType(cellType)) {
                    const door = doors.find(d => 
                        Math.abs(d.x - (cX * CELL_SIZE + CELL_SIZE/2)) < CELL_SIZE/2 &&
                        Math.abs(d.y - (cY * CELL_SIZE + CELL_SIZE/2)) < CELL_SIZE/2
                    );
                    if (door && door.locked) return true;
                }
            }
            
            return false;
        }

        function checkItemCollection() {
            items.forEach(item => {
                if (!item.collected) {
                    const dist = Math.sqrt((item.x - player.x) ** 2 + (item.y - player.y) ** 2);
                    if (item.type === 'key' && dist < 30) {
                        console.log(`🔍 Near ${item.keyType} key at distance ${dist.toFixed(1)}`);
                    }
                    if (dist < 20) {
                        console.log(`📦 Collecting item: ${item.type} (${item.keyType || item.weapon || 'unknown'})`);
                        item.collected = true;
                        
                        switch (item.type) {
                            case 'key':
                                console.log(`🔑 Collected ${item.keyType} key! Keys before:`, JSON.parse(JSON.stringify(player.keys)));
                                player.keys[item.keyType]++;
                                console.log(`🔑 Keys after:`, player.keys);
                                playSound('keyPickup');
                                break;
                            case 'weapon':
                                if (!player.weapons.includes(item.weapon)) {
                                    player.weapons.push(item.weapon);
                                    // Sort weapons in proper order
                                    const weaponOrder = ['fist', 'pistol', 'shotgun', 'chaingun', 'rocket', 'plasma'];
                                    player.weapons.sort((a, b) => weaponOrder.indexOf(a) - weaponOrder.indexOf(b));
                                    player.ammo[item.weapon] = weapons[item.weapon].ammo;
                                } else {
                                    player.ammo[item.weapon] += Math.floor(weapons[item.weapon].ammo / 2);
                                }
                                playSound('keyPickup');
                                break;
                            case 'ammo':
                                const ammoAmount = Math.floor(weapons[item.weapon].ammo / 3);
                                player.ammo[item.weapon] += ammoAmount;
                                playSound('keyPickup');
                                break;
                            case 'health':
                                player.health = Math.min(100, player.health + 25);
                                playSound('keyPickup');
                                break;
                        }
                        updateUI();
                    }
                }
            });
        }

        function checkDoorInteraction() {
            // Don't check for new door interactions if already opening a door
            if (player.doorOpening) return;
            
            doors.forEach(door => {
                // Skip doors that are already opened
                if (door.opened) return;
                
                const dist = Math.sqrt((door.x - player.x) ** 2 + (door.y - player.y) ** 2);
                
                // Debug: Show doors we're getting close to (but not spamming)
                if (dist < 80 && Math.random() < 0.05) {
                    console.log(`🚪 Near ${door.type} door at distance ${dist.toFixed(1)} - need to be within 50`);
                }
                
                // More lenient interaction distance
                if (dist < 50) {
                    console.log(`=== DOOR INTERACTION ===`);
                    console.log(`Door type: "${door.type}"`);
                    console.log(`Door locked: ${door.locked}`);
                    console.log(`Door opened: ${door.opened}`);
                    console.log(`Current keys:`, player.keys);
                    console.log(`Key for this door: player.keys["${door.type}"] = ${player.keys[door.type]}`);
                    
                    let canOpen = false;
                    
                    if (door.locked) {
                        // Locked door - requires key
                        if (player.keys[door.type] > 0) {
                            canOpen = true;
                            console.log(`✅ Can open ${door.type} door, have ${player.keys[door.type]} keys`);
                        } else {
                            console.log(`❌ Cannot open ${door.type} door, have ${player.keys[door.type] || 0} keys`);
                        }
                    } else {
                        // Unlocked door - can always open
                        canOpen = true;
                        console.log(`✅ Opening unlocked door`);
                    }
                    
                    if (canOpen) {
                        // Start door opening process
                        player.doorOpening = door;
                        player.doorOpeningTime = 400; // 400ms delay for both types
                        playSound('doorOpen');
                        console.log(`Starting to open ${door.type} door at (${door.cellX}, ${door.cellY})`);
                        
                        // If it was locked, unlock it now
                        if (door.locked) {
                            door.locked = false;
                            updateUI();
                        }
                    }
                }
            });
        }

        function checkExit() {
            const cellX = Math.floor(player.x / CELL_SIZE);
            const cellY = Math.floor(player.y / CELL_SIZE);
            
            if (cellX >= 0 && cellX < LEVEL_WIDTH && cellY >= 0 && cellY < LEVEL_HEIGHT) {
                if (levelData[cellY][cellX] === EXIT) {
                    game.levelComplete = true;
                    setTimeout(nextLevel, 1000);
                }
            }
        }

        function checkSecretWallInteraction() {
            // Check if the player is standing on or very close to a secret wall
            const playerCellX = Math.floor(player.x / CELL_SIZE);
            const playerCellY = Math.floor(player.y / CELL_SIZE);
            
            // Only log occasionally to avoid spam
            if (Math.random() < 0.01) {
                console.log(`🔍 Checking secret walls - Player at cell (${playerCellX}, ${playerCellY})`);
            }
            
            // Check the player's current cell and adjacent cells
            for (let dy = -1; dy <= 1; dy++) {
                for (let dx = -1; dx <= 1; dx++) {
                    const cellX = playerCellX + dx;
                    const cellY = playerCellY + dy;
                    
                    if (cellX >= 0 && cellX < LEVEL_WIDTH && cellY >= 0 && cellY < LEVEL_HEIGHT) {
                        if (levelData[cellY][cellX] === SECRET_WALL) {
                            // Check if player is close enough to activate (more lenient distance)
                            const wallCenterX = cellX * CELL_SIZE + CELL_SIZE / 2;
                            const wallCenterY = cellY * CELL_SIZE + CELL_SIZE / 2;
                            const dist = Math.sqrt((player.x - wallCenterX) ** 2 + (player.y - wallCenterY) ** 2);
                            
                            console.log(`🕳️ Found secret wall at (${cellX}, ${cellY}), distance: ${dist.toFixed(1)}`);
                            
                            // More lenient activation distance since players can now walk into secret walls
                            if (dist < 40) {
                                // Reveal the secret passage
                                levelData[cellY][cellX] = FLOOR;
                                playSound('doorOpen'); // Reuse door opening sound
                                console.log(`✨ Secret wall revealed at (${cellX}, ${cellY})!`);
                                
                                // Add a visual effect
                                explosions.push({
                                    x: wallCenterX,
                                    y: wallCenterY,
                                    radius: 30,
                                    life: 20,
                                    maxLife: 20
                                });
                                return; // Only reveal one at a time
                            }
                        }
                    }
                }
            }
        }

        function nextLevel() {
            game.level++;
            game.levelComplete = false;
            // Keep keys across levels - don't reset them
            bullets = [];
            explosions = [];
            exploredMap = []; // Reset explored areas for new level
            generateLevel();
            updateUI();
        }

        function updateEnemies() {
            enemies.forEach((enemy, enemyIndex) => {
                // AI behavior with line of sight
                const distToPlayer = Math.sqrt((enemy.x - player.x) ** 2 + (enemy.y - player.y) ** 2);
                
                // Only chase if close AND can see player
                if (distToPlayer < 200 && hasLineOfSight(enemy.x, enemy.y, player.x, player.y)) {
                    enemy.ai.state = 'chase';
                    enemy.ai.lastSeen = Date.now();
                } else if (Date.now() - enemy.ai.lastSeen > 3000) {
                    enemy.ai.state = 'patrol';
                }
                
                // Improved movement with obstacle avoidance
                let dx = 0;
                let dy = 0;
                
                if (enemy.ai.state === 'chase') {
                    // Try to path towards player, but with obstacle avoidance
                    const directDx = player.x - enemy.x;
                    const directDy = player.y - enemy.y;
                    const directDist = Math.sqrt(directDx ** 2 + directDy ** 2);
                    
                    if (directDist > 0) {
                        dx = directDx / directDist;
                        dy = directDy / directDist;
                        
                        // Check if direct path is blocked
                        const testX = enemy.x + dx * enemy.speed * 2;
                        const testY = enemy.y + dy * enemy.speed * 2;
                        
                        if (checkWallCollision(testX, testY, enemy.size)) {
                            // Path is blocked, try obstacle avoidance
                            // Try moving perpendicular to the blocking direction
                            const perpDx = -dy;
                            const perpDy = dx;
                            
                            // Try both perpendicular directions
                            const leftX = enemy.x + perpDx * enemy.speed;
                            const leftY = enemy.y + perpDy * enemy.speed;
                            const rightX = enemy.x - perpDx * enemy.speed;
                            const rightY = enemy.y - perpDy * enemy.speed;
                            
                            if (!checkWallCollision(leftX, leftY, enemy.size)) {
                                dx = perpDx;
                                dy = perpDy;
                            } else if (!checkWallCollision(rightX, rightY, enemy.size)) {
                                dx = -perpDx;
                                dy = -perpDy;
                            } else {
                                // Try diagonal movement
                                if (!checkWallCollision(enemy.x + dx * 0.5 + perpDx * 0.5, enemy.y + dy * 0.5 + perpDy * 0.5, enemy.size)) {
                                    dx = dx * 0.5 + perpDx * 0.5;
                                    dy = dy * 0.5 + perpDy * 0.5;
                                } else {
                                    // Last resort: stop moving to avoid getting stuck
                                    dx = 0;
                                    dy = 0;
                                }
                            }
                        }
                    }
                } else {
                    // Patrol behavior - choose valid floor positions
                    if (Math.abs(enemy.x - enemy.ai.targetX) < 15 && Math.abs(enemy.y - enemy.ai.targetY) < 15) {
                        let validTarget = false;
                        let attempts = 0;
                        while (!validTarget && attempts < 50) {
                            // Stay within a reasonable range instead of going anywhere on canvas
                            const range = 200;
                            const targetX = enemy.x + (Math.random() - 0.5) * range;
                            const targetY = enemy.y + (Math.random() - 0.5) * range;
                            
                            if (isValidPosition(targetX, targetY, enemy.size)) {
                                enemy.ai.targetX = targetX;
                                enemy.ai.targetY = targetY;
                                validTarget = true;
                            }
                            attempts++;
                        }
                        // If no valid position found, stay put for a bit longer
                        if (!validTarget) {
                            enemy.ai.targetX = enemy.x;
                            enemy.ai.targetY = enemy.y;
                        }
                    }
                    
                    const patrolDx = enemy.ai.targetX - enemy.x;
                    const patrolDy = enemy.ai.targetY - enemy.y;
                    const patrolDist = Math.sqrt(patrolDx ** 2 + patrolDy ** 2);
                    
                    if (patrolDist > 0) {
                        dx = patrolDx / patrolDist;
                        dy = patrolDy / patrolDist;
                    }
                }
                
                // Apply movement with improved collision checking
                const moveSpeed = enemy.speed * 0.8; // Slightly slower for better control
                const newX = enemy.x + dx * moveSpeed;
                const newY = enemy.y + dy * moveSpeed;
                
                // Try X movement first
                if (!checkWallCollision(newX, enemy.y, enemy.size)) {
                    enemy.x = newX;
                } else if (enemy.ai.state === 'chase') {
                    // If blocked horizontally, try slight vertical adjustment to slide along walls
                    const slideAmount = 5;
                    if (!checkWallCollision(enemy.x, enemy.y + slideAmount, enemy.size)) {
                        enemy.y += slideAmount;
                    } else if (!checkWallCollision(enemy.x, enemy.y - slideAmount, enemy.size)) {
                        enemy.y -= slideAmount;
                    }
                }
                
                // Try Y movement
                if (!checkWallCollision(enemy.x, newY, enemy.size)) {
                    enemy.y = newY;
                } else if (enemy.ai.state === 'chase') {
                    // If blocked vertically, try slight horizontal adjustment to slide along walls
                    const slideAmount = 5;
                    if (!checkWallCollision(enemy.x + slideAmount, enemy.y, enemy.size)) {
                        enemy.x += slideAmount;
                    } else if (!checkWallCollision(enemy.x - slideAmount, enemy.y, enemy.size)) {
                        enemy.x -= slideAmount;
                    }
                }
                
                enemy.angle = Math.atan2(dy, dx);
                
                // Attack player if close enough
                if (distToPlayer < 40 && Date.now() - enemy.lastAttack > 1000) {
                    if (!player.invulnerable) {
                        player.health -= enemy.damage;
                        playSound('playerHurt');
                        updateUI();
                        
                        if (player.health <= 0) {
                            game.gameOver = true;
                        }
                    }
                    enemy.lastAttack = Date.now();
                }
                
                // Update health bar for bosses
                if (enemy.isBoss) {
                    enemy.healthBarWidth = (enemy.health / enemy.maxHealth) * 40;
                }
            });
        }

        function createExplosion(x, y, radius, damage) {
            explosions.push({
                x: x,
                y: y,
                radius: radius,
                maxRadius: radius,
                life: 0.5,
                maxLife: 0.5
            });
            
            playSound('explosion');
            
            // Damage enemies in radius
            enemies.forEach((enemy, index) => {
                const dist = Math.sqrt((enemy.x - x) ** 2 + (enemy.y - y) ** 2);
                if (dist < radius) {
                    const damageAmount = damage * (1 - (dist / radius)); // Damage falls off with distance
                    enemy.health -= damageAmount;
                    playSound('enemyHit');
                    
                    if (enemy.health <= 0) {
                        game.score += enemy.points;
                        playSound('enemyDeath');
                        enemies.splice(index, 1);
                    }
                }
            });
            
            // Damage player if in radius
            const playerDist = Math.sqrt((player.x - x) ** 2 + (player.y - y) ** 2);
            if (playerDist < radius && !player.invulnerable) {
                const damageAmount = damage * 0.5 * (1 - (playerDist / radius));
                player.health -= damageAmount;
                playSound('playerHurt');
                if (player.health <= 0) {
                    game.gameOver = true;
                }
            }
        }
        
        function updateExplosions() {
            explosions.forEach((explosion, index) => {
                explosion.life -= 1/60; // Assume 60 FPS
                explosion.radius = explosion.maxRadius * (explosion.life / explosion.maxLife);
                
                if (explosion.life <= 0) {
                    explosions.splice(index, 1);
                }
            });
        }
        
        function updateBullets() {
            bullets.forEach((bullet, bulletIndex) => {
                // Move bullet
                bullet.x += Math.cos(bullet.angle) * bullet.speed;
                bullet.y += Math.sin(bullet.angle) * bullet.speed;
                bullet.traveled += bullet.speed;
                
                // Remove if out of range or level bounds
                const levelPixelWidth = LEVEL_WIDTH * CELL_SIZE;
                const levelPixelHeight = LEVEL_HEIGHT * CELL_SIZE;
                
                if (bullet.traveled > bullet.range || 
                    bullet.x < 0 || bullet.x > levelPixelWidth || 
                    bullet.y < 0 || bullet.y > levelPixelHeight) {
                    bullets.splice(bulletIndex, 1);
                    return;
                }
                
                // Check wall collision
                if (checkWallCollision(bullet.x, bullet.y, 2)) {
                    // Rockets explode on wall impact
                    if (bullet.type === 'rocket') {
                        createExplosion(bullet.x, bullet.y, 60, bullet.damage);
                    }
                    bullets.splice(bulletIndex, 1);
                    return;
                }
                
                // Check collision with enemies (player bullets only)
                if (bullet.owner === 'player') {
                    enemies.forEach((enemy, enemyIndex) => {
                        const dist = Math.sqrt((bullet.x - enemy.x) ** 2 + (bullet.y - enemy.y) ** 2);
                        if (dist < enemy.size) {
                            console.log(`Bullet hit enemy! Distance: ${dist}, Enemy size: ${enemy.size}`);
                            // Handle rocket explosions
                            if (bullet.type === 'rocket') {
                                createExplosion(bullet.x, bullet.y, 60, bullet.damage);
                                bullets.splice(bulletIndex, 1);
                                return;
                            }
                            
                            enemy.health -= bullet.damage;
                            bullets.splice(bulletIndex, 1);
                            playSound('enemyHit');
                            
                            if (enemy.health <= 0) {
                                game.score += enemy.points;
                                playSound('enemyDeath');
                                
                                // Boss death spawns exit
                                if (enemy.isBoss) {
                                    const cellX = Math.floor(enemy.x / CELL_SIZE);
                                    const cellY = Math.floor(enemy.y / CELL_SIZE);
                                    if (cellX >= 0 && cellX < LEVEL_WIDTH && cellY >= 0 && cellY < LEVEL_HEIGHT) {
                                        levelData[cellY][cellX] = EXIT;
                                    }
                                }
                                
                                enemies.splice(enemyIndex, 1);
                                updateUI();
                            }
                        }
                    });
                }
            });
        }

        function render() {
            // Clear canvas
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Save context for camera transformation
            ctx.save();
            ctx.translate(-camera.x, -camera.y);
            
            // Calculate visible area for optimization
            const startX = Math.max(0, Math.floor(camera.x / CELL_SIZE));
            const endX = Math.min(LEVEL_WIDTH, Math.ceil((camera.x + canvas.width) / CELL_SIZE));
            const startY = Math.max(0, Math.floor(camera.y / CELL_SIZE));
            const endY = Math.min(LEVEL_HEIGHT, Math.ceil((camera.y + canvas.height) / CELL_SIZE));
            
            // Draw level with proper visibility and exploration
            for (let y = startY; y < endY; y++) {
                for (let x = startX; x < endX; x++) {
                    const cellType = levelData[y][x];
                    const drawX = x * CELL_SIZE;
                    const drawY = y * CELL_SIZE;
                    
                    const isCurrentlyVisible = visibilityMap.length === 0 || visibilityMap[y][x];
                    const hasBeenExplored = exploredMap.length === 0 || exploredMap[y][x];
                    const isWall = isWallType(cellType);
                    
                    // For walls and doors: show if adjacent to explored areas OR if explored
                    let shouldDraw = hasBeenExplored;
                    if ((isWall || isDoorType(cellType)) && !hasBeenExplored) {
                        // Check if this wall/door is adjacent to any explored floor area
                        for (let dy = -1; dy <= 1; dy++) {
                            for (let dx = -1; dx <= 1; dx++) {
                                const adjX = x + dx;
                                const adjY = y + dy;
                                if (adjX >= 0 && adjX < LEVEL_WIDTH && adjY >= 0 && adjY < LEVEL_HEIGHT) {
                                    if (exploredMap.length === 0 || exploredMap[adjY][adjX]) {
                                        const adjCellType = levelData[adjY][adjX];
                                        if (isFloorType(adjCellType) || isDoorType(adjCellType)) {
                                            shouldDraw = true;
                                            break;
                                        }
                                    }
                                }
                            }
                            if (shouldDraw) break;
                        }
                    }
                    
                    // If shouldn't draw, show fog of war
                    if (!shouldDraw) {
                        ctx.fillStyle = '#111';
                        ctx.fillRect(drawX, drawY, CELL_SIZE, CELL_SIZE);
                        continue;
                    }
                    
                    // Draw the actual cell
                    let dimmed = !isCurrentlyVisible && !isWall; // Don't dim walls
                    
                    switch (cellType) {
                        case WALL:
                            ctx.fillStyle = '#666';
                            ctx.fillRect(drawX, drawY, CELL_SIZE, CELL_SIZE);
                            ctx.strokeStyle = '#888';
                            ctx.strokeRect(drawX, drawY, CELL_SIZE, CELL_SIZE);
                            break;
                        case WALL_STONE:
                            ctx.fillStyle = '#8B7355';
                            ctx.fillRect(drawX, drawY, CELL_SIZE, CELL_SIZE);
                            ctx.strokeStyle = '#696969';
                            ctx.strokeRect(drawX, drawY, CELL_SIZE, CELL_SIZE);
                            break;
                        case WALL_METAL:
                            ctx.fillStyle = '#708090';
                            ctx.fillRect(drawX, drawY, CELL_SIZE, CELL_SIZE);
                            ctx.strokeStyle = '#2F4F4F';
                            ctx.strokeRect(drawX, drawY, CELL_SIZE, CELL_SIZE);
                            break;
                        case WALL_BRICK:
                            ctx.fillStyle = '#8B4513';
                            ctx.fillRect(drawX, drawY, CELL_SIZE, CELL_SIZE);
                            ctx.strokeStyle = '#654321';
                            ctx.strokeRect(drawX, drawY, CELL_SIZE, CELL_SIZE);
                            break;
                        case WALL_TECH:
                            ctx.fillStyle = '#2F4F4F';
                            ctx.fillRect(drawX, drawY, CELL_SIZE, CELL_SIZE);
                            // Add tech panel lines
                            ctx.strokeStyle = '#00FFFF';
                            ctx.lineWidth = 1;
                            ctx.strokeRect(drawX + 2, drawY + 2, CELL_SIZE - 4, CELL_SIZE - 4);
                            ctx.strokeRect(drawX + 8, drawY + 8, CELL_SIZE - 16, CELL_SIZE - 16);
                            break;
                        case WALL_MARBLE:
                            ctx.fillStyle = '#F8F8FF';
                            ctx.fillRect(drawX, drawY, CELL_SIZE, CELL_SIZE);
                            // Add marble veining
                            ctx.strokeStyle = '#E0E0E0';
                            ctx.beginPath();
                            ctx.moveTo(drawX, drawY + CELL_SIZE/4);
                            ctx.quadraticCurveTo(drawX + CELL_SIZE/2, drawY + CELL_SIZE/2, drawX + CELL_SIZE, drawY + 3*CELL_SIZE/4);
                            ctx.stroke();
                            break;
                        case WALL_WOOD:
                            ctx.fillStyle = '#DEB887';
                            ctx.fillRect(drawX, drawY, CELL_SIZE, CELL_SIZE);
                            // Add wood grain
                            ctx.strokeStyle = '#8B7355';
                            for(let i = 0; i < 3; i++) {
                                ctx.beginPath();
                                ctx.moveTo(drawX, drawY + i * CELL_SIZE/3);
                                ctx.lineTo(drawX + CELL_SIZE, drawY + i * CELL_SIZE/3);
                                ctx.stroke();
                            }
                            break;
                        case SECRET_WALL:
                            // Looks like a normal wall but with subtle differences
                            ctx.fillStyle = '#666';
                            ctx.fillRect(drawX, drawY, CELL_SIZE, CELL_SIZE);
                            ctx.strokeStyle = '#888';
                            ctx.strokeRect(drawX, drawY, CELL_SIZE, CELL_SIZE);
                            // Add very subtle visual hint (slightly different color edge)
                            ctx.strokeStyle = '#999';
                            ctx.strokeRect(drawX + 1, drawY + 1, CELL_SIZE - 2, CELL_SIZE - 2);
                            break;
                        case FLOOR:
                            ctx.fillStyle = '#333';
                            ctx.fillRect(drawX, drawY, CELL_SIZE, CELL_SIZE);
                            break;
                        case FLOOR_STONE:
                            ctx.fillStyle = '#696969';
                            ctx.fillRect(drawX, drawY, CELL_SIZE, CELL_SIZE);
                            break;
                        case FLOOR_METAL:
                            ctx.fillStyle = '#4F4F4F';
                            ctx.fillRect(drawX, drawY, CELL_SIZE, CELL_SIZE);
                            break;
                        case FLOOR_DIRT:
                            ctx.fillStyle = '#8B7355';
                            ctx.fillRect(drawX, drawY, CELL_SIZE, CELL_SIZE);
                            break;
                        case FLOOR_CARPET:
                            ctx.fillStyle = '#800020';
                            ctx.fillRect(drawX, drawY, CELL_SIZE, CELL_SIZE);
                            // Add carpet pattern
                            ctx.strokeStyle = '#4B0000';
                            ctx.strokeRect(drawX + 4, drawY + 4, CELL_SIZE - 8, CELL_SIZE - 8);
                            break;
                        case FLOOR_TILE:
                            ctx.fillStyle = '#E6E6FA';
                            ctx.fillRect(drawX, drawY, CELL_SIZE, CELL_SIZE);
                            // Add tile grout lines
                            ctx.strokeStyle = '#D3D3D3';
                            ctx.strokeRect(drawX, drawY, CELL_SIZE, CELL_SIZE);
                            break;
                        case FLOOR_MARBLE:
                            ctx.fillStyle = '#F0F0F0';
                            ctx.fillRect(drawX, drawY, CELL_SIZE, CELL_SIZE);
                            // Add marble veining
                            ctx.strokeStyle = '#C0C0C0';
                            ctx.beginPath();
                            ctx.moveTo(drawX, drawY + CELL_SIZE/3);
                            ctx.quadraticCurveTo(drawX + CELL_SIZE/2, drawY + CELL_SIZE/2, drawX + CELL_SIZE, drawY + 2*CELL_SIZE/3);
                            ctx.stroke();
                            break;
                        case WATER:
                            const time = Date.now() * 0.003;
                            ctx.fillStyle = `rgba(65, 105, 225, ${0.7 + 0.3 * Math.sin(time + drawX * 0.01)})`;
                            ctx.fillRect(drawX, drawY, CELL_SIZE, CELL_SIZE);
                            break;
                        case LAVA:
                            const lavaTime = Date.now() * 0.005;
                            ctx.fillStyle = `rgba(255, 69, 0, ${0.8 + 0.2 * Math.sin(lavaTime + drawY * 0.02)})`;
                            ctx.fillRect(drawX, drawY, CELL_SIZE, CELL_SIZE);
                            break;
                        case DOOR:
                        case DOOR_RED:
                        case DOOR_YELLOW:
                        case DOOR_BLUE:
                            const doorColor = cellType === DOOR_RED ? '#8B0000' : 
                                            cellType === DOOR_YELLOW ? '#FFD700' : 
                                            cellType === DOOR_BLUE ? '#0000FF' : '#654321';
                            ctx.fillStyle = doorColor;
                            ctx.fillRect(drawX, drawY, CELL_SIZE, CELL_SIZE);
                            // Add door frame
                            ctx.strokeStyle = '#000';
                            ctx.lineWidth = 2;
                            ctx.strokeRect(drawX + 2, drawY + 2, CELL_SIZE - 4, CELL_SIZE - 4);
                            break;
                        case EXIT:
                            ctx.fillStyle = '#00FF00';
                            ctx.fillRect(drawX + 5, drawY + 5, CELL_SIZE - 10, CELL_SIZE - 10);
                            break;
                    }
                    
                    // Add dimming overlay for explored but not currently visible areas
                    if (dimmed) {
                        ctx.fillStyle = 'rgba(0, 0, 0, 0.3)'; // Lighter dimming - was 0.6
                        ctx.fillRect(drawX, drawY, CELL_SIZE, CELL_SIZE);
                    }
                }
            }
            
            // Draw doors (only if visible or explored AND not opened)
            doors.forEach(door => {
                // Don't draw opened doors
                if (door.opened) return;
                
                const doorCellX = Math.floor(door.x / CELL_SIZE);
                const doorCellY = Math.floor(door.y / CELL_SIZE);
                const isDoorExplored = exploredMap.length === 0 || exploredMap[doorCellY][doorCellX];
                const isDoorVisible = visibilityMap.length === 0 || visibilityMap[doorCellY][doorCellX];
                
                // Only draw doors that have been explored
                if (!isDoorExplored) return;
                
                if (door.locked) {
                    // Locked doors with bright colors and lock symbols
                    const doorColor = door.type === 'red' ? '#8B0000' : 
                                    door.type === 'yellow' ? '#FFD700' : '#0000FF';
                    ctx.fillStyle = doorColor;
                    ctx.fillRect(door.x - 18, door.y - 18, 36, 36);
                    
                    // Add lock symbol
                    ctx.fillStyle = '#000';
                    ctx.fillRect(door.x - 6, door.y - 8, 12, 8);
                    ctx.fillStyle = doorColor;
                    ctx.fillRect(door.x - 4, door.y - 6, 8, 4);
                } else if (door.type === 'normal') {
                    // Normal unlocked doors that match wall theme
                    let doorColor = '#8B4513'; // Default brown
                    
                    switch(door.themeType) {
                        case WALL_STONE:
                            doorColor = '#696969';
                            break;
                        case WALL_METAL:
                            doorColor = '#2F4F4F';
                            break;
                        case WALL_BRICK:
                            doorColor = '#8B4513';
                            break;
                        case WALL_TECH:
                            doorColor = '#1C1C1C';
                            break;
                        case WALL_MARBLE:
                            doorColor = '#E0E0E0';
                            break;
                        case WALL_WOOD:
                            doorColor = '#DEB887';
                            break;
                        default:
                            doorColor = '#654321';
                            break;
                    }
                    
                    ctx.fillStyle = doorColor;
                    ctx.fillRect(door.x - 18, door.y - 18, 36, 36);
                    
                    // Add door panels/details
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(door.x - 16, door.y - 16, 32, 32);
                    ctx.strokeRect(door.x - 12, door.y - 12, 24, 24);
                    
                    // Door handle
                    ctx.fillStyle = '#FFD700';
                    ctx.beginPath();
                    ctx.arc(door.x + 10, door.y, 2, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                // Add dimming overlay for explored but not currently visible doors
                if (!isDoorVisible) {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.3)'; // Lighter dimming - was 0.6
                    ctx.fillRect(door.x - 18, door.y - 18, 36, 36);
                }
            });
            
            // Draw items with labels (only if visible)
            items.forEach(item => {
                if (!item.collected) {
                    const itemCellX = Math.floor(item.x / CELL_SIZE);
                    const itemCellY = Math.floor(item.y / CELL_SIZE);
                    
                    // Only draw if visible
                    if (visibilityMap.length === 0 || visibilityMap[itemCellY][itemCellX]) {
                    ctx.textAlign = 'center';
                    ctx.font = '12px Courier New';
                    
                    switch (item.type) {
                        case 'key':
                            const keyColor = item.keyType === 'red' ? '#FF0000' : 
                                           item.keyType === 'yellow' ? '#FFD700' : '#0000FF';
                            ctx.fillStyle = keyColor;
                            ctx.fillRect(item.x - 5, item.y - 8, 10, 16);
                            ctx.fillRect(item.x + 3, item.y - 5, 8, 6);
                            
                            // Label
                            ctx.fillStyle = '#FFF';
                            ctx.fillText(item.keyType.charAt(0).toUpperCase(), item.x, item.y + 20);
                            break;
                        case 'weapon':
                            ctx.fillStyle = '#C0C0C0';
                            ctx.fillRect(item.x - 8, item.y - 3, 16, 6);
                            
                            // Different weapon shapes
                            if (item.weapon === 'shotgun') {
                                ctx.fillRect(item.x - 10, item.y - 2, 20, 4);
                            } else if (item.weapon === 'rocket') {
                                ctx.fillStyle = '#8B4513';
                                ctx.fillRect(item.x - 6, item.y - 4, 12, 8);
                            }
                            
                            // Label
                            ctx.fillStyle = '#FFF';
                            const weaponLabel = item.weapon === 'shotgun' ? 'S' : 
                                              item.weapon === 'chaingun' ? 'C' : 
                                              item.weapon === 'rocket' ? 'R' : 'P';
                            ctx.fillText(weaponLabel, item.x, item.y + 20);
                            break;
                        case 'ammo':
                            ctx.fillStyle = '#808080';
                            ctx.fillRect(item.x - 6, item.y - 4, 12, 8);
                            
                            // Label
                            ctx.fillStyle = '#FFF';
                            const ammoLabel = item.weapon === 'shotgun' ? 'SA' : 
                                            item.weapon === 'chaingun' ? 'CA' : 
                                            item.weapon === 'rocket' ? 'RA' : 'PA';
                            ctx.fillText(ammoLabel, item.x, item.y + 20);
                            break;
                        case 'health':
                            ctx.fillStyle = '#FF0000';
                            ctx.fillRect(item.x - 8, item.y - 2, 16, 4);
                            ctx.fillRect(item.x - 2, item.y - 8, 4, 16);
                            
                            // Label
                            ctx.fillStyle = '#FFF';
                            ctx.fillText('H', item.x, item.y + 20);
                            break;
                    }
                    }
                }
            });
            
            // Draw bullets with different visuals
            bullets.forEach(bullet => {
                switch (bullet.type) {
                    case 'bullet':
                        ctx.fillStyle = '#FFFF00';
                        ctx.beginPath();
                        ctx.arc(bullet.x, bullet.y, 2, 0, Math.PI * 2);
                        ctx.fill();
                        break;
                    case 'shotgun':
                        ctx.fillStyle = '#FF8C00';
                        ctx.beginPath();
                        ctx.arc(bullet.x, bullet.y, 1.5, 0, Math.PI * 2);
                        ctx.fill();
                        break;
                    case 'rocket':
                        ctx.fillStyle = '#FF0000';
                        ctx.fillRect(bullet.x - 3, bullet.y - 2, 6, 4);
                        // Flame trail
                        ctx.fillStyle = '#FF4500';
                        ctx.fillRect(bullet.x - 6, bullet.y - 1, 3, 2);
                        break;
                    case 'plasma':
                        ctx.fillStyle = '#00FFFF';
                        ctx.beginPath();
                        ctx.arc(bullet.x, bullet.y, 3, 0, Math.PI * 2);
                        ctx.fill();
                        // Glow effect
                        ctx.fillStyle = 'rgba(0, 255, 255, 0.3)';
                        ctx.beginPath();
                        ctx.arc(bullet.x, bullet.y, 6, 0, Math.PI * 2);
                        ctx.fill();
                        break;
                }
            });
            
            // Draw explosions
            explosions.forEach(explosion => {
                const alpha = explosion.life / explosion.maxLife;
                ctx.fillStyle = `rgba(255, 100, 0, ${alpha})`;
                ctx.beginPath();
                ctx.arc(explosion.x, explosion.y, explosion.radius, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = `rgba(255, 255, 0, ${alpha * 0.5})`;
                ctx.beginPath();
                ctx.arc(explosion.x, explosion.y, explosion.radius * 0.5, 0, Math.PI * 2);
                ctx.fill();
            });
            
            // Draw enemies with 1994 Doom-style sprites (only if visible)
            enemies.forEach(enemy => {
                const enemyCellX = Math.floor(enemy.x / CELL_SIZE);
                const enemyCellY = Math.floor(enemy.y / CELL_SIZE);
                
                // Only draw if visible
                if (visibilityMap.length === 0 || visibilityMap[enemyCellY][enemyCellX]) {
                ctx.save();
                ctx.translate(enemy.x, enemy.y);
                
                // Different sprite designs based on enemy type
                switch(enemy.type) {
                    case 'zombie':
                        // Zombie body (brownish uniform)
                        ctx.fillStyle = '#8B4513';
                        ctx.fillRect(-enemy.size/2, -enemy.size/2, enemy.size, enemy.size);
                        // Head
                        ctx.fillStyle = '#DEB887';
                        ctx.fillRect(-enemy.size/3, -enemy.size, enemy.size*0.6, enemy.size*0.4);
                        // Eyes (red)
                        ctx.fillStyle = '#FF0000';
                        ctx.fillRect(-enemy.size/4, -enemy.size*0.8, 3, 3);
                        ctx.fillRect(enemy.size/6, -enemy.size*0.8, 3, 3);
                        // Weapon
                        ctx.fillStyle = '#654321';
                        ctx.fillRect(enemy.size/2, -enemy.size/4, 4, enemy.size/2);
                        break;
                    case 'demon':
                        // Pink demon body
                        ctx.fillStyle = '#FF69B4';
                        ctx.fillRect(-enemy.size/2, -enemy.size/2, enemy.size, enemy.size);
                        // Horns
                        ctx.fillStyle = '#8B0000';
                        ctx.fillRect(-enemy.size/3, -enemy.size, 4, 8);
                        ctx.fillRect(enemy.size/4, -enemy.size, 4, 8);
                        // Claws
                        ctx.fillStyle = '#000';
                        ctx.fillRect(-enemy.size*0.7, 0, 6, 4);
                        ctx.fillRect(enemy.size*0.4, 0, 6, 4);
                        break;
                    case 'cacodemon':
                        // Red floating sphere
                        ctx.fillStyle = '#8B0000';
                        ctx.beginPath();
                        ctx.arc(0, 0, enemy.size, 0, Math.PI * 2);
                        ctx.fill();
                        // Eye
                        ctx.fillStyle = '#FFFF00';
                        ctx.beginPath();
                        ctx.arc(0, -enemy.size/3, enemy.size/3, 0, Math.PI * 2);
                        ctx.fill();
                        // Pupil
                        ctx.fillStyle = '#000';
                        ctx.beginPath();
                        ctx.arc(0, -enemy.size/3, enemy.size/6, 0, Math.PI * 2);
                        ctx.fill();
                        // Teeth
                        ctx.fillStyle = '#FFF';
                        for(let i = -3; i <= 3; i++) {
                            ctx.fillRect(i * 4, enemy.size/2, 3, 8);
                        }
                        break;
                    case 'baron':
                        // Large green demon
                        ctx.fillStyle = '#228B22';
                        ctx.fillRect(-enemy.size/2, -enemy.size/2, enemy.size, enemy.size);
                        // Horns (larger)
                        ctx.fillStyle = '#8B0000';
                        ctx.fillRect(-enemy.size/2.5, -enemy.size, 6, 12);
                        ctx.fillRect(enemy.size/3, -enemy.size, 6, 12);
                        // Claws (larger)
                        ctx.fillStyle = '#000';
                        ctx.fillRect(-enemy.size*0.8, -enemy.size/4, 8, 6);
                        ctx.fillRect(enemy.size*0.5, -enemy.size/4, 8, 6);
                        // Glowing eyes
                        ctx.fillStyle = '#FF4500';
                        ctx.beginPath();
                        ctx.arc(-enemy.size/4, -enemy.size*0.7, 4, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(enemy.size/4, -enemy.size*0.7, 4, 0, Math.PI * 2);
                        ctx.fill();
                        break;
                    case 'cyberdemon':
                        // Large metallic body
                        ctx.fillStyle = '#696969';
                        ctx.fillRect(-enemy.size/2, -enemy.size/2, enemy.size, enemy.size);
                        // Rocket launcher
                        ctx.fillStyle = '#2F4F4F';
                        ctx.fillRect(enemy.size/2, -enemy.size/3, 8, enemy.size/2);
                        // Red visor
                        ctx.fillStyle = '#FF0000';
                        ctx.fillRect(-enemy.size/2, -enemy.size*0.8, enemy.size, 6);
                        // Mechanical legs
                        ctx.fillStyle = '#4B4B4B';
                        ctx.fillRect(-enemy.size/3, enemy.size/2, 6, 10);
                        ctx.fillRect(enemy.size/4, enemy.size/2, 6, 10);
                        break;
                    default:
                        // Fallback to original circle
                        ctx.fillStyle = enemy.color;
                        ctx.beginPath();
                        ctx.arc(0, 0, enemy.size, 0, Math.PI * 2);
                        ctx.fill();
                        break;
                }
                
                ctx.restore();
                
                // Draw direction indicator (smaller and more subtle)
                ctx.strokeStyle = enemy.color;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(enemy.x, enemy.y);
                ctx.lineTo(enemy.x + Math.cos(enemy.angle) * enemy.size * 1.2, 
                          enemy.y + Math.sin(enemy.angle) * enemy.size * 1.2);
                ctx.stroke();
                
                // Draw boss health bar
                if (enemy.isBoss) {
                    ctx.fillStyle = '#FF0000';
                    ctx.fillRect(enemy.x - 20, enemy.y - enemy.size - 10, 40, 4);
                    ctx.fillStyle = '#00FF00';
                    ctx.fillRect(enemy.x - 20, enemy.y - enemy.size - 10, enemy.healthBarWidth, 4);
                }
                }
            });
            
            // Draw player with 1994 Doom marine style
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(player.angle);
            
            // Marine body (olive green armor)
            ctx.fillStyle = '#556B2F';
            ctx.fillRect(-player.size/2, -player.size/2, player.size, player.size);
            
            // Helmet (darker)
            ctx.fillStyle = '#2F4F2F';
            ctx.fillRect(-player.size/3, -player.size, player.size*0.6, player.size*0.4);
            
            // Visor (reflective)
            ctx.fillStyle = '#87CEEB';
            ctx.fillRect(-player.size/4, -player.size*0.85, player.size/2, player.size*0.2);
            
            // Chest plate highlight
            ctx.fillStyle = '#6B7D3F';
            ctx.fillRect(-player.size/3, -player.size/3, player.size*0.6, 4);
            
            // Weapon (current weapon visualization)
            ctx.fillStyle = '#654321';
            switch(player.weapon) {
                case 'pistol':
                    ctx.fillRect(player.size/2, -2, 8, 4);
                    break;
                case 'shotgun':
                    ctx.fillRect(player.size/2, -3, 12, 6);
                    break;
                case 'chaingun':
                    ctx.fillRect(player.size/2, -4, 10, 8);
                    // Multiple barrels
                    ctx.fillStyle = '#2F4F4F';
                    ctx.fillRect(player.size/2 + 10, -3, 6, 2);
                    ctx.fillRect(player.size/2 + 10, 1, 6, 2);
                    break;
                case 'rocket':
                    ctx.fillStyle = '#8B4513';
                    ctx.fillRect(player.size/2, -4, 14, 8);
                    // Rocket tip
                    ctx.fillStyle = '#FF4500';
                    ctx.fillRect(player.size/2 + 14, -2, 4, 4);
                    break;
                case 'plasma':
                    ctx.fillStyle = '#4169E1';
                    ctx.fillRect(player.size/2, -3, 12, 6);
                    // Energy core
                    ctx.fillStyle = '#00FFFF';
                    ctx.fillRect(player.size/2 + 4, -1, 4, 2);
                    break;
            }
            
            ctx.restore();
            
            // Status effects
            if (player.invulnerable && player.invulnerableTime > 0) {
                // Glowing aura for invulnerability
                ctx.fillStyle = 'rgba(255, 255, 0, 0.3)';
                ctx.beginPath();
                ctx.arc(player.x, player.y, player.size * 1.5, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Restore context for UI elements
            ctx.restore();
            
            // Draw crosshair (in screen coordinates)
            ctx.strokeStyle = '#FFFFFF';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(mouse.x - 10, mouse.y);
            ctx.lineTo(mouse.x + 10, mouse.y);
            ctx.moveTo(mouse.x, mouse.y - 10);
            ctx.lineTo(mouse.x, mouse.y + 10);
            ctx.stroke();
            
            // Game over screen (in screen coordinates)
            if (game.gameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#FF0000';
                ctx.font = '48px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2);
                ctx.font = '24px Courier New';
                ctx.fillText('Score: ' + game.score, canvas.width / 2, canvas.height / 2 + 50);
                ctx.fillText('Press F5 to restart', canvas.width / 2, canvas.height / 2 + 80);
            }
            
            // Level complete screen (in screen coordinates)
            if (game.levelComplete) {
                ctx.fillStyle = 'rgba(0, 100, 0, 0.8)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#00FF00';
                ctx.font = '36px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText('LEVEL COMPLETE!', canvas.width / 2, canvas.height / 2);
            }
        }

        function updateUI() {
            // Update basic info
            document.getElementById('level').textContent = game.level;
            document.getElementById('score').textContent = game.score;
            document.getElementById('health').textContent = Math.max(0, Math.floor(player.health));
            
            // Update doom face based on health
            const face = document.getElementById('doomFace');
            const healthPercent = player.health / 100;
            if (healthPercent > 0.8) {
                face.textContent = ':D';
                face.style.background = '#8B4513';
            } else if (healthPercent > 0.6) {
                face.textContent = ':)';
                face.style.background = '#8B4513';
            } else if (healthPercent > 0.4) {
                face.textContent = ':|';
                face.style.background = '#8B6914';
            } else if (healthPercent > 0.2) {
                face.textContent = ':(';
                face.style.background = '#8B4513';
            } else {
                face.textContent = 'X(';
                face.style.background = '#8B0000';
            }
            
            // Update key indicators
            document.getElementById('redKey').style.opacity = player.keys.red > 0 ? '1.0' : '0.3';
            document.getElementById('yellowKey').style.opacity = player.keys.yellow > 0 ? '1.0' : '0.3';
            document.getElementById('blueKey').style.opacity = player.keys.blue > 0 ? '1.0' : '0.3';
            
            // Update current weapon
            const currentWeaponName = player.weapons[player.currentWeapon];
            const weapon = weapons[currentWeaponName];
            document.getElementById('weaponName').textContent = weapon.name.toUpperCase();
            
            const ammo = player.ammo[currentWeaponName];
            document.getElementById('ammo').textContent = ammo === -1 ? '∞' : ammo;
            
            // Update weapons grid with icons
            const weaponsGrid = document.getElementById('weaponsGrid');
            weaponsGrid.innerHTML = '';
            
            // Define all weapons in order with their icons
            const allWeapons = ['fist', 'pistol', 'shotgun', 'chaingun', 'rocket', 'plasma'];
            const weaponIcons = {
                fist: '✊',
                pistol: '🔫',
                shotgun: '▬▬',
                chaingun: '═══',
                rocket: '🚀',
                plasma: '◉◉'
            };
            
            allWeapons.forEach((weaponName, index) => {
                const weapon = weapons[weaponName];
                const isOwned = player.weapons.includes(weaponName);
                const isActive = isOwned && player.weapons[player.currentWeapon] === weaponName;
                const ammo = player.ammo[weaponName] || 0;
                
                const weaponSlot = document.createElement('div');
                weaponSlot.className = `weapon-slot ${isActive ? 'active' : isOwned ? 'owned' : 'not-owned'}`;
                
                const weaponIcon = document.createElement('div');
                weaponIcon.className = 'weapon-icon';
                weaponIcon.textContent = weaponIcons[weaponName] || '?';
                
                const weaponInfo = document.createElement('div');
                weaponInfo.style.flex = '1';
                weaponInfo.style.fontSize = '9px';
                
                if (isOwned) {
                    const ammoText = ammo === -1 ? '∞' : ammo.toString();
                    weaponInfo.innerHTML = `<div>${index + 1}. ${weapon.name}</div><div>Ammo: ${ammoText}</div>`;
                } else {
                    // Show 0 ammo for weapons not yet acquired
                    weaponInfo.innerHTML = `<div>${index + 1}. ${weapon.name}</div><div style="color: #666;">Ammo: 0</div>`;
                }
                
                weaponSlot.appendChild(weaponIcon);
                weaponSlot.appendChild(weaponInfo);
                weaponsGrid.appendChild(weaponSlot);
            });
        }

        function gameLoop() {
            if (!game.gameOver && !game.levelComplete) {
                updatePlayer();
                updateCamera();
                updateEnemies();
                updateBullets();
                updateExplosions();
                updateVisibility();
                
                // Update invulnerability timer
                if (player.invulnerable && player.invulnerableTime > 0) {
                    player.invulnerableTime -= 16; // Assuming 60 FPS
                    if (player.invulnerableTime <= 0) {
                        player.invulnerable = false;
                        console.log('Invulnerability ended');
                    }
                }
                
                // Update door opening timer
                if (player.doorOpening && player.doorOpeningTime > 0) {
                    player.doorOpeningTime -= 16; // Assuming 60 FPS
                    if (player.doorOpeningTime <= 0) {
                        // Open the door
                        const door = player.doorOpening;
                        door.opened = true;
                        
                        // Convert door cell to appropriate floor type
                        const themeNames = Object.keys(levelThemes);
                        const currentTheme = levelThemes[themeNames[Math.floor(game.level / 3) % themeNames.length]];
                        levelData[door.cellY][door.cellX] = currentTheme.floorType || FLOOR;
                        
                        // Reset door opening state
                        player.doorOpening = null;
                        
                        console.log(`Door opened at (${door.cellX}, ${door.cellY})`);
                    }
                }
                
                // Continuous firing
                if (mouse.down) {
                    shoot();
                }
            }
            
            render();
            requestAnimationFrame(gameLoop);
        }

        // Initialize game
        generateLevel();
        updateUI();
        gameLoop();
    </script>
</body>
</html>
