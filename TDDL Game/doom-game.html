<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top-Down Doom Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }
        canvas {
            display: block;
            cursor: crosshair;
            width: 100vw;
            height: calc(100vh - 140px); /* Full height minus HUD */
        }
        
        /* Doom-style HUD */
        .doom-hud {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 140px;
            background: linear-gradient(to bottom, #4a4a4a 0%, #2a2a2a 50%, #1a1a1a 100%);
            border-top: 3px solid #8B7D6B;
            z-index: 1000;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            padding: 10px 20px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
            overflow: visible;
        }
        
        .hud-left {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .hud-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }
        
        .hud-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            min-width: 200px;
        }
        
        .weapons-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 3px;
            margin-top: 5px;
            font-size: 9px;
            max-height: 100px;
            overflow-y: auto;
        }
        
        .weapon-slot {
            display: flex;
            align-items: center;
            padding: 3px;
            border: 1px solid #444;
            background: rgba(0,0,0,0.3);
            min-height: 20px;
        }
        
        .weapon-slot.owned {
            border-color: #0f0;
            color: #0f0;
        }
        
        .weapon-slot.active {
            border-color: #ff0;
            background: rgba(255,255,0,0.1);
            color: #ff0;
        }
        
        .weapon-slot.not-owned {
            border-color: #666;
            color: #666;
        }
        
        .weapon-icon {
            width: 16px;
            height: 12px;
            margin-right: 4px;
            text-align: center;
            font-family: monospace;
            font-size: 8px;
            line-height: 12px;
        }
        
        .doom-face {
            width: 60px;
            height: 60px;
            background: #8B4513;
            border: 2px solid #654321;
            margin: 10px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }
        
        .health-display {
            color: #ff0;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px #000;
            margin: 5px 0;
        }
        
        .ammo-display {
            color: #ff0;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 2px 2px 4px #000;
            margin: 5px 0;
        }
        
        .weapon-display {
            color: #0f0;
            font-size: 16px;
            font-weight: bold;
            text-shadow: 2px 2px 4px #000;
            margin: 5px 0;
        }
        
        .keys-display {
            display: flex;
            gap: 10px;
            margin: 5px 0;
        }
        
        .key-indicator {
            width: 20px;
            height: 20px;
            border: 2px solid #666;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }
        
        .key-red { background: #8B0000; color: #fff; }
        .key-yellow { background: #FFD700; color: #000; }
        .key-blue { background: #0000FF; color: #fff; }
        
        .level-info {
            position: fixed;
            top: 10px;
            left: 10px;
            color: #ff0;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 2px 2px 4px #000;
            z-index: 1001;
        }
        
        .score-info {
            position: fixed;
            top: 10px;
            right: 10px;
            color: #ff0;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 2px 2px 4px #000;
            z-index: 1001;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div class="level-info">
        LEVEL <span id="level">1</span>
    </div>
    
    <div class="score-info">
        SCORE: <span id="score">0</span>
    </div>
    
    <div class="doom-hud">
        <div class="hud-left">
            <div class="doom-face" id="doomFace">
                :D
            </div>
            <div class="health-display">
                <span id="health">100</span>%
            </div>
        </div>
        
        <div class="hud-center">
            <div class="keys-display">
                <div class="key-indicator key-red" id="redKey" style="opacity: 0.3;">R</div>
                <div class="key-indicator key-yellow" id="yellowKey" style="opacity: 0.3;">Y</div>
                <div class="key-indicator key-blue" id="blueKey" style="opacity: 0.3;">B</div>
            </div>
            <div class="weapon-display" id="weaponName">
                PISTOL
            </div>
            <div class="ammo-display">
                <span id="ammo">∞</span>
            </div>
        </div>
        
        <div class="hud-right">
            <div class="weapons-grid" id="weaponsGrid">
                <!-- Weapon grid will go here -->
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Set canvas to full viewport size
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight - 140; // Account for HUD height
        }
        
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        // Game state
        const game = {
            level: 1,
            score: 0,
            keys: 0,
            health: 100,
            maxHealth: 100,
            isPaused: false,
            gameOver: false,
            levelComplete: false
        };

        // Player object
        const player = {
            x: 400,
            y: 300,
            angle: 0,
            size: 16,
            speed: 3,
            health: 100,
            weapons: ['fist', 'pistol'],
            currentWeapon: 1,
            ammo: { fist: -1, pistol: -1, shotgun: 0, chaingun: 0, rocket: 0, plasma: 0 },
            lastShot: 0,
            keys: { red: 0, yellow: 0, blue: 0 },
            invulnerable: false,
            invulnerableTime: 0,
            doorOpening: null, // Door object being opened
            doorOpeningTime: 0
        };
        
        // Camera system
        const camera = {
            x: 0,
            y: 0,
            targetX: 0,
            targetY: 0,
            smoothing: 0.1
        };

        // Input handling
        const keys = {};
        const mouse = { x: 0, y: 0, down: false };

        // Game objects arrays
        let bullets = [];
        let enemies = [];
        let items = [];
        let doors = [];
        let levelData = [];
        let explosions = [];
        let visibilityMap = [];
        let exploredMap = [];
        
        // Audio system
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const sounds = {
            pistol: { freq: 800, duration: 0.1 },
            shotgun: { freq: 300, duration: 0.3 },
            chaingun: { freq: 600, duration: 0.08 },
            rocket: { freq: 150, duration: 0.4 },
            plasma: { freq: 1200, duration: 0.2 },
            explosion: { freq: 100, duration: 0.6 },
            enemyHit: { freq: 200, duration: 0.15 },
            enemyDeath: { freq: 100, duration: 0.5 },
            keyPickup: { freq: 1000, duration: 0.2 },
            doorOpen: { freq: 400, duration: 0.3 },
            playerHurt: { freq: 150, duration: 0.2 }
        };

        // Weapon definitions with level requirements
        const weapons = {
            fist: { name: 'Fist', damage: 8, fireRate: 400, range: 25, ammo: -1, sound: 'pistol', minLevel: 1, meleeWeapon: true },
            pistol: { name: 'Pistol', damage: 15, fireRate: 300, range: 300, ammo: -1, sound: 'pistol', minLevel: 1, projectileType: 'bullet' },
            shotgun: { name: 'Shotgun', damage: 35, fireRate: 800, range: 150, ammo: 8, sound: 'shotgun', minLevel: 2, projectileType: 'shotgun', pellets: 5 },
            chaingun: { name: 'Chaingun', damage: 8, fireRate: 100, range: 250, ammo: 200, sound: 'chaingun', minLevel: 4, projectileType: 'bullet' },
            rocket: { name: 'Rocket', damage: 80, fireRate: 1200, range: 400, ammo: 5, sound: 'rocket', minLevel: 6, projectileType: 'rocket' },
            plasma: { name: 'Plasma', damage: 25, fireRate: 200, range: 350, ammo: 40, sound: 'plasma', minLevel: 8, projectileType: 'plasma' }
        };

        // Enemy definitions
        const enemyTypes = {
            zombie: { health: 30, speed: 0.5, damage: 10, color: '#8B4513', size: 14, points: 50 },
            demon: { health: 60, speed: 1.2, damage: 20, color: '#8B0000', size: 16, points: 100 },
            cacodemon: { health: 80, speed: 0.8, damage: 15, color: '#FF4500', size: 18, points: 150 },
            baron: { health: 120, speed: 1, damage: 30, color: '#800080', size: 20, points: 200 },
            cyberdemon: { health: 200, speed: 0.6, damage: 50, color: '#FF0000', size: 24, points: 500 }
        };

        // Level generation constants - much larger levels
        const CELL_SIZE = 40;
        const LEVEL_WIDTH = 60;
        const LEVEL_HEIGHT = 45;
        const WALL = 1;
        const FLOOR = 0;
        const DOOR = 2;
        const EXIT = 3;
        const DOOR_RED = 4;
        const DOOR_YELLOW = 5;
        const DOOR_BLUE = 6;
        const WATER = 7;
        const LAVA = 8;
        const FLOOR_STONE = 9;
        const FLOOR_METAL = 10;
        const FLOOR_DIRT = 11;
        const WALL_STONE = 12;
        const WALL_METAL = 13;
        const WALL_BRICK = 14;
        const WALL_TECH = 15;
        const WALL_MARBLE = 16;
        const WALL_WOOD = 17;
        const FLOOR_CARPET = 18;
        const FLOOR_TILE = 19;
        const FLOOR_MARBLE = 20;
        const SECRET_WALL = 21;

        // Event listeners
        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            
            // Cheat codes
            if (e.key === 'k' || e.key === 'K') {
                // All keys cheat
                player.keys.red = 1;
                player.keys.yellow = 1;
                player.keys.blue = 1;
                updateUI();
                console.log('Cheat activated: All keys obtained!');
            }
            
            if (e.key === 'g' || e.key === 'G') {
                // All guns cheat
                player.weapons = ['fist', 'pistol', 'shotgun', 'chaingun', 'rocket', 'plasma'];
                player.ammo = { 
                    fist: -1, 
                    pistol: -1, 
                    shotgun: 999, 
                    chaingun: 999, 
                    rocket: 999, 
                    plasma: 999 
                };
                updateUI();
                console.log('Cheat activated: All weapons obtained!');
            }
            
            if (e.key === 'i' || e.key === 'I') {
                // Invulnerability cheat
                player.invulnerable = true;
                player.invulnerableTime = 30000; // 30 seconds
                player.health = 100; // Also restore health
                updateUI();
                console.log('Cheat activated: Invulnerability for 30 seconds!');
            }
            
            // Weapon switching
            const num = parseInt(e.key);
            if (num >= 1 && num <= 6) {
                switchWeapon(num - 1);
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouse.x = e.clientX - rect.left;
            mouse.y = e.clientY - rect.top;
            
            // Update player angle based on mouse position (accounting for camera)
            const worldMouseX = mouse.x + camera.x;
            const worldMouseY = mouse.y + camera.y;
            const dx = worldMouseX - player.x;
            const dy = worldMouseY - player.y;
            player.angle = Math.atan2(dy, dx);
        });

        canvas.addEventListener('mousedown', (e) => {
            mouse.down = true;
            shoot();
        });

        canvas.addEventListener('mouseup', (e) => {
            mouse.down = false;
        });

        // Level themes with different textures and properties
        const levelThemes = {
            dungeon: { wallType: WALL_STONE, floorType: FLOOR_STONE, specialFloors: [WATER] },
            tech: { wallType: WALL_METAL, floorType: FLOOR_METAL, specialFloors: [LAVA] },
            cave: { wallType: WALL, floorType: FLOOR_DIRT, specialFloors: [WATER, LAVA] },
            hell: { wallType: WALL_BRICK, floorType: FLOOR, specialFloors: [LAVA] }
        };
        
        // Generate random level with varied room sizes
        function generateLevel() {
            // Choose theme based on level
            const themeNames = Object.keys(levelThemes);
            const currentTheme = levelThemes[themeNames[Math.floor(game.level / 3) % themeNames.length]];
            
            levelData = Array(LEVEL_HEIGHT).fill().map(() => Array(LEVEL_WIDTH).fill(currentTheme.wallType));
            
            const rooms = [];
            const corridors = [];
            const hallways = [];
            const numRooms = 5 + Math.floor(Math.random() * 6); // 5-10 rooms for larger levels
            
            // Define room size categories - reduced by 50%
            const roomSizes = [
                { name: 'small', minW: 4, maxW: 8, minH: 3, maxH: 6 },
                { name: 'medium', minW: 6, maxW: 10, minH: 4, maxH: 8 },
                { name: 'large', minW: 8, maxW: 13, minH: 5, maxH: 9 },
                { name: 'huge', minW: 10, maxW: 15, minH: 6, maxH: 11 }
            ];
            
            // Generate rooms with varied sizes and irregular shapes
            let attempts = 0;
            console.log('Starting room generation...');
            while (rooms.length < numRooms && attempts < 300) {
                const sizeType = roomSizes[Math.floor(Math.random() * roomSizes.length)];
                const baseW = sizeType.minW + Math.floor(Math.random() * (sizeType.maxW - sizeType.minW + 1));
                const baseH = sizeType.minH + Math.floor(Math.random() * (sizeType.maxH - sizeType.minH + 1));
                
                const room = {
                    x: Math.floor(Math.random() * (LEVEL_WIDTH - baseW - 2)) + 1,
                    y: Math.floor(Math.random() * (LEVEL_HEIGHT - baseH - 2)) + 1,
                    w: baseW,
                    h: baseH,
                    size: sizeType.name,
                    shape: Math.random() < 0.2 ? 'irregular' : 'rectangular' // 20% chance irregular
                };
                
                // Check if room fits and doesn't overlap
                if (room.x + room.w < LEVEL_WIDTH - 1 && room.y + room.h < LEVEL_HEIGHT - 1) {
                    let overlaps = false;
                    for (const existingRoom of rooms) {
                        if (room.x < existingRoom.x + existingRoom.w + 2 &&
                            room.x + room.w + 2 > existingRoom.x &&
                            room.y < existingRoom.y + existingRoom.h + 2 &&
                            room.y + room.h + 2 > existingRoom.y) {
                            overlaps = true;
                            break;
                        }
                    }
                    
                    if (!overlaps) {
                        console.log(`Created room ${rooms.length + 1}: ${room.w}x${room.h} at (${room.x},${room.y})`);
                        rooms.push(room);
                        
                        // Carve out room based on shape
                        if (room.shape === 'irregular') {
                            carveIrregularRoom(room, currentTheme.floorType);
                        } else {
                            carveRectangularRoom(room, currentTheme.floorType);
                        }
                    }
                }
                attempts++;
            }
            
            console.log(`Generated ${rooms.length} rooms after ${attempts} attempts`);
            
            // Create strategic room connections for key-based progression
            if (rooms.length >= 4) {
                console.log(`Creating strategic connections for ${rooms.length} rooms`);
                
                // Divide rooms into zones: starting area (1-2 rooms), red zone (2-3 rooms), yellow zone (2-3 rooms), blue zone (rest)
                const startingRooms = rooms.slice(0, Math.min(2, Math.floor(rooms.length * 0.25)));
                const redZoneStart = startingRooms.length;
                const redZoneSize = Math.min(3, Math.floor(rooms.length * 0.3));
                const redZoneRooms = rooms.slice(redZoneStart, redZoneStart + redZoneSize);
                
                const yellowZoneStart = redZoneStart + redZoneSize;
                const yellowZoneSize = Math.min(3, Math.floor(rooms.length * 0.3));
                const yellowZoneRooms = rooms.slice(yellowZoneStart, yellowZoneStart + yellowZoneSize);
                
                const blueZoneRooms = rooms.slice(yellowZoneStart + yellowZoneSize);
                
                // Connect within starting area
                for (let i = 0; i < startingRooms.length - 1; i++) {
                    const connection = createHallway(startingRooms[i], startingRooms[i + 1], currentTheme.floorType);
                    hallways.push(connection);
                    corridors.push(...connection.cells);
                }
                
                // Connect within red zone
                for (let i = 0; i < redZoneRooms.length - 1; i++) {
                    const connection = createHallway(redZoneRooms[i], redZoneRooms[i + 1], currentTheme.floorType);
                    hallways.push(connection);
                    corridors.push(...connection.cells);
                }
                
                // Connect within yellow zone
                for (let i = 0; i < yellowZoneRooms.length - 1; i++) {
                    const connection = createHallway(yellowZoneRooms[i], yellowZoneRooms[i + 1], currentTheme.floorType);
                    hallways.push(connection);
                    corridors.push(...connection.cells);
                }
                
                // Connect within blue zone
                for (let i = 0; i < blueZoneRooms.length - 1; i++) {
                    const connection = createHallway(blueZoneRooms[i], blueZoneRooms[i + 1], currentTheme.floorType);
                    hallways.push(connection);
                    corridors.push(...connection.cells);
                }
                
                // Create strategic connections between zones (these will have doors)
                if (redZoneRooms.length > 0) {
                    // Connect starting area to red zone
                    const startRoom = startingRooms[startingRooms.length - 1];
                    const redRoom = redZoneRooms[0];
                    const connection = createHallway(startRoom, redRoom, currentTheme.floorType);
                    connection.doorType = 'red';
                    hallways.push(connection);
                    corridors.push(...connection.cells);
                }
                
                if (yellowZoneRooms.length > 0 && redZoneRooms.length > 0) {
                    // Connect red zone to yellow zone
                    const redRoom = redZoneRooms[redZoneRooms.length - 1];
                    const yellowRoom = yellowZoneRooms[0];
                    const connection = createHallway(redRoom, yellowRoom, currentTheme.floorType);
                    connection.doorType = 'yellow';
                    hallways.push(connection);
                    corridors.push(...connection.cells);
                }
                
                if (blueZoneRooms.length > 0 && yellowZoneRooms.length > 0) {
                    // Connect yellow zone to blue zone
                    const yellowRoom = yellowZoneRooms[yellowZoneRooms.length - 1];
                    const blueRoom = blueZoneRooms[0];
                    const connection = createHallway(yellowRoom, blueRoom, currentTheme.floorType);
                    connection.doorType = 'blue';
                    hallways.push(connection);
                    corridors.push(...connection.cells);
                }
                
                console.log(`Created strategic zones: Starting(${startingRooms.length}), Red(${redZoneRooms.length}), Yellow(${yellowZoneRooms.length}), Blue(${blueZoneRooms.length})`);
            } else {
                // Fallback for smaller levels
                console.log(`Connecting ${rooms.length} rooms (fallback mode)`);
                for (let i = 0; i < rooms.length - 1; i++) {
                    const connection = createHallway(rooms[i], rooms[i + 1], currentTheme.floorType);
                    hallways.push(connection);
                    corridors.push(...connection.cells);
                }
            }
            
            // Place doors strategically in hallway segments only
            doors = [];
            const doorTypes = ['red', 'yellow', 'blue'];
            console.log(`Have ${hallways.length} hallways for door placement`);
            
            // Get valid hallway segments for door placement
            const validSegments = [];
            hallways.forEach((hallway, hallwayIndex) => {
                if (hallway.segments && hallway.segments.length > 0) {
                    // Use all segments but prefer middle ones
                    hallway.segments.forEach((segment, segmentIndex) => {
                        // Verify this segment is actually in a hallway by checking distance from rooms
                        const centerX = segment.centerX;
                        const centerY = segment.centerY;
                        
                        // Check if this position is reasonably far from room interiors
                        let isInHallway = true;
                        let minDistanceFromRoom = Infinity;
                        
                        rooms.forEach(room => {
                            // Check distance from room interior (not just center)
                            const closestX = Math.max(room.x + 1, Math.min(centerX, room.x + room.w - 1));
                            const closestY = Math.max(room.y + 1, Math.min(centerY, room.y + room.h - 1));
                            const distFromRoom = Math.sqrt((centerX - closestX) ** 2 + (centerY - closestY) ** 2);
                            
                            minDistanceFromRoom = Math.min(minDistanceFromRoom, distFromRoom);
                            
                            // If inside a room, don't place door here
                            if (centerX >= room.x && centerX < room.x + room.w && 
                                centerY >= room.y && centerY < room.y + room.h) {
                                isInHallway = false;
                            }
                        });
                        
                        // Only add if it's in a hallway and reasonably far from rooms
                        if (isInHallway && minDistanceFromRoom >= 2) {
                            validSegments.push({...segment, hallwayIndex, segmentIndex, priority: segmentIndex > 0 && segmentIndex < hallway.segments.length - 1 ? 1 : 0});
                        }
                    });
                }
            });
            
            // Sort by priority (middle segments first)
            validSegments.sort((a, b) => b.priority - a.priority);
            
            let numDoors = Math.min(doorTypes.length, validSegments.length);
            console.log(`Placing ${numDoors} doors in ${validSegments.length} valid hallway segments`);
            
            // Fallback: if no valid segments found, use any hallway cells
            if (validSegments.length === 0 && corridors.length > 0) {
                console.log('No valid segments found, using fallback corridor placement');
                const fallbackPositions = corridors.filter((cell, index) => 
                    index > 0 && index < corridors.length - 1 && // Not first or last
                    Math.random() < 0.1 // Only 10% chance for each corridor cell
                ).slice(0, 3); // Max 3 doors
                
                fallbackPositions.forEach((cell, index) => {
                    if (index < doorTypes.length) {
                        validSegments.push({
                            type: 'fallback',
                            centerX: cell.x,
                            centerY: cell.y,
                            hallwayIndex: 0,
                            segmentIndex: index
                        });
                    }
                });
                numDoors = Math.min(doorTypes.length, validSegments.length);
                console.log(`Using ${numDoors} fallback door positions`);
            }
            
            // Place doors in valid hallway segments only
            for (let i = 0; i < numDoors; i++) {
                if (i >= validSegments.length) break;
                
                const segment = validSegments[i];
                const doorType = doorTypes[i % doorTypes.length];
                const doorCellType = doorType === 'red' ? DOOR_RED : 
                                   doorType === 'yellow' ? DOOR_YELLOW : DOOR_BLUE;
                
                console.log(`Placing ${doorType} door in ${segment.type} hallway segment`);
                
                const segmentWidth = segment.width || 2; // Default to 2 if width not set
                
                if (segment.type === 'horizontal') {
                    // Block horizontal hallway - place doors vertically across the path
                    const doorX = segment.centerX;
                    
                    // Place doors matching hallway width
                    for (let w = 0; w < segmentWidth; w++) {
                        const doorY = segment.centerY + w;
                        
                        if (doorX >= 0 && doorX < LEVEL_WIDTH && doorY >= 0 && doorY < LEVEL_HEIGHT &&
                            isFloorType(levelData[doorY][doorX])) {
                            doors.push({
                                x: doorX * CELL_SIZE + CELL_SIZE/2,
                                y: doorY * CELL_SIZE + CELL_SIZE/2,
                                locked: true,
                                type: doorType,
                                cellX: doorX,
                                cellY: doorY,
                                segmentIndex: i,
                                opened: false, // Make sure opened is initialized
                                companion: w > 0
                            });
                            console.log(`🚪 Created ${doorType} door at (${doorX}, ${doorY})`);
                            levelData[doorY][doorX] = doorCellType;
                        }
                    }
                } else if (segment.type === 'vertical') {
                    // Block vertical hallway - place doors horizontally across the path
                    const doorY = segment.centerY;
                    
                    // Place doors matching hallway width
                    for (let w = 0; w < segmentWidth; w++) {
                        const doorX = segment.centerX + w;
                        
                        if (doorX >= 0 && doorX < LEVEL_WIDTH && doorY >= 0 && doorY < LEVEL_HEIGHT &&
                            isFloorType(levelData[doorY][doorX])) {
                            doors.push({
                                x: doorX * CELL_SIZE + CELL_SIZE/2,
                                y: doorY * CELL_SIZE + CELL_SIZE/2,
                                locked: true,
                                type: doorType,
                                cellX: doorX,
                                cellY: doorY,
                                segmentIndex: i,
                                opened: false, // Make sure opened is initialized
                                companion: w > 0
                            });
                            console.log(`🚪 Created ${doorType} door at (${doorX}, ${doorY})`);
                            levelData[doorY][doorX] = doorCellType;
                        }
                    }
                } else if (segment.type === 'fallback') {
                    // Fallback placement for single door
                    const doorX = segment.centerX;
                    const doorY = segment.centerY;
                    
                    if (doorX >= 0 && doorX < LEVEL_WIDTH && doorY >= 0 && doorY < LEVEL_HEIGHT &&
                        isFloorType(levelData[doorY][doorX])) {
                        doors.push({
                            x: doorX * CELL_SIZE + CELL_SIZE/2,
                            y: doorY * CELL_SIZE + CELL_SIZE/2,
                            locked: true,
                            type: doorType,
                            cellX: doorX,
                            cellY: doorY,
                            segmentIndex: i
                        });
                        levelData[doorY][doorX] = doorCellType;
                    }
                }
            }
            
            // Generate keys - always place at least one of each color in starting room for accessibility
            if (doors.length > 0) {
                const startRoom = rooms[0];
                const requiredKeys = new Set();
                
                // First, identify all required key types
                doors.forEach(door => {
                    if (!door.companion && door.locked) {
                        requiredKeys.add(door.type);
                    }
                });
                
                // Place one key of each required type in the starting room to ensure accessibility
                let keyOffset = 0;
                requiredKeys.forEach(keyType => {
                    const keyX = (startRoom.x + 2 + keyOffset) * CELL_SIZE + CELL_SIZE/2;
                    const keyY = (startRoom.y + 2) * CELL_SIZE + CELL_SIZE/2;
                    
                    items.push({ 
                        x: keyX, 
                        y: keyY, 
                        type: 'key', 
                        keyType: keyType, 
                        collected: false 
                    });
                    console.log(`Placed ${keyType} key in starting room at (${keyX}, ${keyY}) for accessibility`);
                    keyOffset += 1;
                });
                
                // Also try to place additional keys in accessible areas for variety
                doors.forEach((door, index) => {
                    // Only place additional keys for primary doors, not companion doors
                    if (door.companion || !door.locked) return;
                    
                    // Get accessible areas before this door is unlocked
                    const previousDoors = doors.slice(0, index).filter(d => !d.companion);
                    const accessibleCells = getAccessibleRooms(rooms[0], [door, ...previousDoors]);
                    
                    let additionalKeyPlaced = false;
                    let attempts = 0;
                    
                    while (!additionalKeyPlaced && attempts < 100 && accessibleCells.length > 0) {
                        // Choose random accessible cell
                        const cell = accessibleCells[Math.floor(Math.random() * accessibleCells.length)];
                        const x = cell.x * CELL_SIZE + CELL_SIZE / 2;
                        const y = cell.y * CELL_SIZE + CELL_SIZE / 2;
                        
                        if (isValidPosition(x, y, 10)) {
                            items.push({ x, y, type: 'key', keyType: door.type, collected: false });
                            additionalKeyPlaced = true;
                            console.log(`Placed additional ${door.type} key at accessible position (${cell.x}, ${cell.y})`);
                        }
                        attempts++;
                    }
                });
            }
            
            // Add special floors (water/lava pools)
            if (currentTheme.specialFloors.length > 0) {
                const numPools = 2 + Math.floor(Math.random() * 3);
                for (let i = 0; i < numPools; i++) {
                    const poolType = currentTheme.specialFloors[Math.floor(Math.random() * currentTheme.specialFloors.length)];
                    const poolSize = 2 + Math.floor(Math.random() * 3);
                    
                    // Find a room to place the pool
                    if (rooms.length > 0) {
                        const room = rooms[Math.floor(Math.random() * rooms.length)];
                        const poolX = room.x + 1 + Math.floor(Math.random() * Math.max(1, room.w - poolSize - 1));
                        const poolY = room.y + 1 + Math.floor(Math.random() * Math.max(1, room.h - poolSize - 1));
                        
                        // Create pool
                        for (let py = poolY; py < poolY + poolSize && py < room.y + room.h - 1; py++) {
                            for (let px = poolX; px < poolX + poolSize && px < room.x + room.w - 1; px++) {
                                if (px >= 0 && px < LEVEL_WIDTH && py >= 0 && py < LEVEL_HEIGHT) {
                                    levelData[py][px] = poolType;
                                }
                            }
                        }
                    }
                }
            }
            
            // Place exit in a room that requires going through at least one door
            if (rooms.length > 1 && doors.length > 0) {
                // Place exit in the room that's furthest from the starting room
                const startRoom = rooms[0];
                let furthestRoom = rooms[1];
                let maxDistance = 0;
                
                for (let i = 1; i < rooms.length; i++) {
                    const room = rooms[i];
                    const distance = Math.sqrt(
                        (room.x - startRoom.x) ** 2 + (room.y - startRoom.y) ** 2
                    );
                    if (distance > maxDistance) {
                        maxDistance = distance;
                        furthestRoom = room;
                    }
                }
                
                const exitX = furthestRoom.x + Math.floor(furthestRoom.w / 2);
                const exitY = furthestRoom.y + Math.floor(furthestRoom.h / 2);
                levelData[exitY][exitX] = EXIT;
                console.log(`Exit placed in furthest room at (${exitX}, ${exitY})`);
            } else if (rooms.length > 1) {
                // Fallback: place in last room if no doors
                const lastRoom = rooms[rooms.length - 1];
                const exitX = lastRoom.x + Math.floor(lastRoom.w / 2);
                const exitY = lastRoom.y + Math.floor(lastRoom.h / 2);
                levelData[exitY][exitX] = EXIT;
            } else if (rooms.length === 1) {
                // If only one room, place exit at far corner
                const room = rooms[0];
                const exitX = room.x + room.w - 2;
                const exitY = room.y + room.h - 2;
                levelData[exitY][exitX] = EXIT;
            }
            
            // Set player starting position in first room - ensure it's on floor
            if (rooms.length > 0) {
                const firstRoom = rooms[0];
                let playerPlaced = false;
                let attempts = 0;
                
                while (!playerPlaced && attempts < 100) {
                    const x = (firstRoom.x + 2 + Math.floor(Math.random() * Math.max(1, firstRoom.w - 4))) * CELL_SIZE + CELL_SIZE/2;
                    const y = (firstRoom.y + 2 + Math.floor(Math.random() * Math.max(1, firstRoom.h - 4))) * CELL_SIZE + CELL_SIZE/2;
                    
                    const cellX = Math.floor(x / CELL_SIZE);
                    const cellY = Math.floor(y / CELL_SIZE);
                    
                    if (cellX >= 0 && cellX < LEVEL_WIDTH && cellY >= 0 && cellY < LEVEL_HEIGHT &&
                        isFloorType(levelData[cellY][cellX])) {
                        player.x = x;
                        player.y = y;
                        playerPlaced = true;
                        console.log(`Player placed at (${x}, ${y}) in room at (${firstRoom.x}, ${firstRoom.y})`);
                    }
                    attempts++;
                }
                
                if (!playerPlaced) {
                    // Fallback: place in center of first room
                    player.x = (firstRoom.x + Math.floor(firstRoom.w / 2)) * CELL_SIZE + CELL_SIZE/2;
                    player.y = (firstRoom.y + Math.floor(firstRoom.h / 2)) * CELL_SIZE + CELL_SIZE/2;
                    console.log('Fallback player placement used');
                }
            }
            
            // Generate normal unlocked doors that match wall themes
            generateNormalDoors(currentTheme);
            
            // Generate secret rooms with subtle hints
            generateSecretRooms(currentTheme);
            
            // Add obstacles and details to rooms
            generateRoomObstacles(currentTheme, rooms);
            
            // Generate enemies based on level
            generateEnemies();
            generateItems();
            
            // Debug: Show door and key locations
            console.log('=== LEVEL SUMMARY ===');
            console.log(`Doors:`, doors.map(d => `${d.type} at (${d.x.toFixed(0)}, ${d.y.toFixed(0)}) locked:${d.locked}`));
            console.log(`Keys:`, items.filter(i => i.type === 'key').map(k => `${k.keyType} at (${k.x.toFixed(0)}, ${k.y.toFixed(0)})`));
        }

        function generateNormalDoors(currentTheme) {
            // Add normal unlocked doors to random room entrances and hallway connections
            const numNormalDoors = 3 + Math.floor(Math.random() * 4); // 3-6 normal doors
            
            for (let i = 0; i < numNormalDoors; i++) {
                let doorPlaced = false;
                let attempts = 0;
                
                while (!doorPlaced && attempts < 100) {
                    // Find a random floor cell that's adjacent to walls
                    const x = 1 + Math.floor(Math.random() * (LEVEL_WIDTH - 2));
                    const y = 1 + Math.floor(Math.random() * (LEVEL_HEIGHT - 2));
                    
                    if (isFloorType(levelData[y][x])) {
                        // Check if this position would make a good door
                        // (has walls on opposite sides)
                        const hasVerticalWalls = (isWallType(levelData[y-1][x]) && isWallType(levelData[y+1][x])) ||
                                               (isWallType(levelData[y][x-1]) && isWallType(levelData[y][x+1]));
                        
                        if (hasVerticalWalls) {
                            // Make sure it's not blocking a critical path
                            let isValidDoorPosition = true;
                            
                            // Check if there are no existing doors too close
                            for (const existingDoor of doors) {
                                const dist = Math.abs(existingDoor.cellX - x) + Math.abs(existingDoor.cellY - y);
                                if (dist < 3) {
                                    isValidDoorPosition = false;
                                    break;
                                }
                            }
                            
                            if (isValidDoorPosition) {
                                // Create a normal door that matches the current theme
                                const doorType = currentTheme.wallType;
                                
                                doors.push({
                                    x: x * CELL_SIZE + CELL_SIZE/2,
                                    y: y * CELL_SIZE + CELL_SIZE/2,
                                    locked: false, // Normal doors are unlocked
                                    type: 'normal',
                                    cellX: x,
                                    cellY: y,
                                    themeType: doorType,
                                    opened: false
                                });
                                
                                // Set the cell to a normal door type
                                levelData[y][x] = DOOR;
                                doorPlaced = true;
                            }
                        }
                    }
                    attempts++;
                }
            }
        }

        function generateSecretRooms(currentTheme) {
            // Generate 1-2 secret rooms per level
            const numSecretRooms = 1 + Math.floor(Math.random() * 2);
            
            for (let roomIndex = 0; roomIndex < numSecretRooms; roomIndex++) {
                let secretRoomCreated = false;
                let attempts = 0;
                
                while (!secretRoomCreated && attempts < 150) {
                    // Find a location for a secret room (3x3 minimum)
                    const roomW = 3 + Math.floor(Math.random() * 3); // 3-5 wide
                    const roomH = 3 + Math.floor(Math.random() * 3); // 3-5 high
                    const roomX = 2 + Math.floor(Math.random() * (LEVEL_WIDTH - roomW - 4));
                    const roomY = 2 + Math.floor(Math.random() * (LEVEL_HEIGHT - roomH - 4));
                    
                    // Check if this area is all walls (good for secret room)
                    let allWalls = true;
                    for (let y = roomY - 1; y <= roomY + roomH; y++) {
                        for (let x = roomX - 1; x <= roomX + roomW; x++) {
                            if (!isWallType(levelData[y][x])) {
                                allWalls = false;
                                break;
                            }
                        }
                        if (!allWalls) break;
                    }
                    
                    if (allWalls) {
                        // Create the secret room
                        for (let y = roomY; y < roomY + roomH; y++) {
                            for (let x = roomX; x < roomX + roomW; x++) {
                                levelData[y][x] = currentTheme.floorType;
                            }
                        }
                        
                        // Find a wall adjacent to an existing floor area for the secret entrance
                        const secretEntrances = [];
                        
                        // Check all walls around the secret room
                        for (let y = roomY - 1; y <= roomY + roomH; y++) {
                            // Left wall
                            if (roomX - 2 >= 0 && isFloorType(levelData[y][roomX - 2])) {
                                secretEntrances.push({x: roomX - 1, y: y});
                            }
                            // Right wall
                            if (roomX + roomW + 1 < LEVEL_WIDTH && isFloorType(levelData[y][roomX + roomW + 1])) {
                                secretEntrances.push({x: roomX + roomW, y: y});
                            }
                        }
                        
                        for (let x = roomX - 1; x <= roomX + roomW; x++) {
                            // Top wall
                            if (roomY - 2 >= 0 && isFloorType(levelData[roomY - 2][x])) {
                                secretEntrances.push({x: x, y: roomY - 1});
                            }
                            // Bottom wall
                            if (roomY + roomH + 1 < LEVEL_HEIGHT && isFloorType(levelData[roomY + roomH + 1][x])) {
                                secretEntrances.push({x: x, y: roomY + roomH});
                            }
                        }
                        
                        if (secretEntrances.length > 0) {
                            // Pick a random entrance
                            const entrance = secretEntrances[Math.floor(Math.random() * secretEntrances.length)];
                            levelData[entrance.y][entrance.x] = SECRET_WALL;
                            
                            // Add some valuable items to the secret room
                            const centerX = (roomX + Math.floor(roomW / 2)) * CELL_SIZE + CELL_SIZE/2;
                            const centerY = (roomY + Math.floor(roomH / 2)) * CELL_SIZE + CELL_SIZE/2;
                            
                            // Add a random valuable item
                            const secretLoot = Math.random();
                            if (secretLoot < 0.4) {
                                // Weapon
                                const weapons = ['shotgun', 'chaingun', 'rocket', 'plasma'];
                                const weaponType = weapons[Math.floor(Math.random() * weapons.length)];
                                items.push({
                                    x: centerX,
                                    y: centerY,
                                    type: 'weapon',
                                    weapon: weaponType,
                                    collected: false
                                });
                            } else if (secretLoot < 0.7) {
                                // Health
                                items.push({
                                    x: centerX,
                                    y: centerY,
                                    type: 'health',
                                    healing: 25,
                                    collected: false
                                });
                            } else {
                                // Multiple ammo packs
                                const ammoTypes = ['shotgun', 'chaingun', 'rocket', 'plasma'];
                                const ammoType = ammoTypes[Math.floor(Math.random() * ammoTypes.length)];
                                for (let i = 0; i < 2 + Math.floor(Math.random() * 3); i++) {
                                    items.push({
                                        x: centerX + (Math.random() - 0.5) * 40,
                                        y: centerY + (Math.random() - 0.5) * 40,
                                        type: 'ammo',
                                        weapon: ammoType,
                                        ammoAmount: 20,
                                        collected: false
                                    });
                                }
                            }
                            
                            secretRoomCreated = true;
                            console.log(`Created secret room at (${roomX}, ${roomY}) with entrance at (${entrance.x}, ${entrance.y})`);
                        }
                    }
                    attempts++;
                }
            }
        }

        function generateRoomObstacles(currentTheme, rooms) {
            // Add obstacles and details to make rooms more interesting
            rooms.forEach((room, roomIndex) => {
                // Skip the first room (starting room) - keep it simple
                if (roomIndex === 0) return;
                
                // 70% chance to add obstacles to each room
                if (Math.random() < 0.7) {
                    const numObstacles = 1 + Math.floor(Math.random() * 3); // 1-3 obstacles per room
                    
                    for (let i = 0; i < numObstacles; i++) {
                        // Find a valid position inside the room (not blocking doorways)
                        let placed = false;
                        let attempts = 0;
                        
                        while (!placed && attempts < 50) {
                            const obsX = room.x + 2 + Math.floor(Math.random() * Math.max(1, room.w - 4));
                            const obsY = room.y + 2 + Math.floor(Math.random() * Math.max(1, room.h - 4));
                            
                            // Check if this position is clear and not too close to doors
                            let validPosition = true;
                            
                            // Make sure it's not blocking a door or near room edges
                            if (obsX <= room.x + 1 || obsX >= room.x + room.w - 2 ||
                                obsY <= room.y + 1 || obsY >= room.y + room.h - 2) {
                                validPosition = false;
                            }
                            
                            // Check if position is already occupied
                            if (validPosition && levelData[obsY][obsX] !== currentTheme.floorType) {
                                validPosition = false;
                            }
                            
                            // Check if it's too close to doors
                            doors.forEach(door => {
                                const doorCellX = Math.floor(door.x / CELL_SIZE);
                                const doorCellY = Math.floor(door.y / CELL_SIZE);
                                const dist = Math.abs(obsX - doorCellX) + Math.abs(obsY - doorCellY);
                                if (dist < 3) validPosition = false;
                            });
                            
                            if (validPosition) {
                                // Random obstacle type
                                const obstacleType = Math.random();
                                
                                if (obstacleType < 0.4) {
                                    // Single pillar/column
                                    levelData[obsY][obsX] = currentTheme.wallType;
                                } else if (obstacleType < 0.7) {
                                    // Small 2x2 block
                                    if (obsX < room.x + room.w - 2 && obsY < room.y + room.h - 2) {
                                        levelData[obsY][obsX] = currentTheme.wallType;
                                        levelData[obsY][obsX + 1] = currentTheme.wallType;
                                        levelData[obsY + 1][obsX] = currentTheme.wallType;
                                        levelData[obsY + 1][obsX + 1] = currentTheme.wallType;
                                    }
                                } else {
                                    // Different floor texture detail
                                    const detailFloors = [FLOOR_DIRT, FLOOR_CARPET, FLOOR_TILE, FLOOR_MARBLE];
                                    const detailFloor = detailFloors[Math.floor(Math.random() * detailFloors.length)];
                                    levelData[obsY][obsX] = detailFloor;
                                }
                                placed = true;
                            }
                            attempts++;
                        }
                    }
                }
            });
        }

        function generateEnemies() {
            enemies = [];
            const levelFactor = Math.min(game.level, 15);
            const numEnemies = 8 + Math.floor(Math.random() * (levelFactor * 2));
            
            // Determine which enemy types to include based on level
            const availableTypes = ['zombie'];
            if (game.level >= 2) availableTypes.push('demon');
            if (game.level >= 4) availableTypes.push('cacodemon');
            if (game.level >= 6) availableTypes.push('baron');
            if (game.level >= 8) availableTypes.push('cyberdemon');
            
            // Check if this is a boss level
            const isBossLevel = game.level % 5 === 0;
            if (isBossLevel) {
                // Spawn boss in a floor area
                let bossSpawned = false;
                let attempts = 0;
                while (!bossSpawned && attempts < 200) {
                    const cellX = Math.floor(Math.random() * LEVEL_WIDTH);
                    const cellY = Math.floor(Math.random() * LEVEL_HEIGHT);
                    
                    if (isFloorType(levelData[cellY][cellX])) {
                        const x = cellX * CELL_SIZE + CELL_SIZE / 2;
                        const y = cellY * CELL_SIZE + CELL_SIZE / 2;
                        
                        if (isValidPosition(x, y, 20)) {
                            const bossType = game.level < 15 ? 'baron' : 'cyberdemon';
                            enemies.push(createEnemy(x, y, bossType, true));
                            bossSpawned = true;
                        }
                    }
                    attempts++;
                }
            }
            
            // Spawn regular enemies in floor areas
            for (let i = 0; i < numEnemies; i++) {
                let enemySpawned = false;
                let attempts = 0;
                while (!enemySpawned && attempts < 200) {
                    const cellX = Math.floor(Math.random() * LEVEL_WIDTH);
                    const cellY = Math.floor(Math.random() * LEVEL_HEIGHT);
                    
                    if (isFloorType(levelData[cellY][cellX])) {
                        const x = cellX * CELL_SIZE + CELL_SIZE / 2;
                        const y = cellY * CELL_SIZE + CELL_SIZE / 2;
                        
                        if (isValidPosition(x, y, 15)) {
                            const type = availableTypes[Math.floor(Math.random() * availableTypes.length)];
                            enemies.push(createEnemy(x, y, type));
                            enemySpawned = true;
                        }
                    }
                    attempts++;
                }
            }
        }

        function generateItems() {
            items = [];
            
            // Generate colored keys to match doors
            const keyTypes = ['red', 'yellow', 'blue'];
            doors.forEach(door => {
                let keyPlaced = false;
                let attempts = 0;
                while (!keyPlaced && attempts < 200) {
                    const cellX = Math.floor(Math.random() * LEVEL_WIDTH);
                    const cellY = Math.floor(Math.random() * LEVEL_HEIGHT);
                    
                    if (isFloorType(levelData[cellY][cellX])) {
                        const x = cellX * CELL_SIZE + CELL_SIZE / 2;
                        const y = cellY * CELL_SIZE + CELL_SIZE / 2;
                        
                        if (isValidPosition(x, y, 10)) {
                            items.push({ x, y, type: 'key', keyType: door.type, collected: false });
                            keyPlaced = true;
                        }
                    }
                    attempts++;
                }
            });
            
            // Add one extra key of random color
            let extraKeyPlaced = false;
            let attempts = 0;
            while (!extraKeyPlaced && attempts < 200) {
                const cellX = Math.floor(Math.random() * LEVEL_WIDTH);
                const cellY = Math.floor(Math.random() * LEVEL_HEIGHT);
                
                if (levelData[cellY][cellX] === FLOOR) {
                    const x = cellX * CELL_SIZE + CELL_SIZE / 2;
                    const y = cellY * CELL_SIZE + CELL_SIZE / 2;
                    
                    if (isValidPosition(x, y, 10)) {
                        const randomKeyType = keyTypes[Math.floor(Math.random() * keyTypes.length)];
                        items.push({ x, y, type: 'key', keyType: randomKeyType, collected: false });
                        extraKeyPlaced = true;
                    }
                }
                attempts++;
            }
            
            // Generate weapon pickups based on level progression
            const availableWeapons = ['shotgun', 'chaingun', 'rocket', 'plasma'].filter(weapon => 
                weapons[weapon].minLevel <= game.level
            );
            
            for (let i = 0; i < Math.min(2, availableWeapons.length); i++) {
                let weaponPlaced = false;
                let attempts = 0;
                while (!weaponPlaced && attempts < 200) {
                    const cellX = Math.floor(Math.random() * LEVEL_WIDTH);
                    const cellY = Math.floor(Math.random() * LEVEL_HEIGHT);
                    
                    if (isFloorType(levelData[cellY][cellX])) {
                        const x = cellX * CELL_SIZE + CELL_SIZE / 2;
                        const y = cellY * CELL_SIZE + CELL_SIZE / 2;
                        
                        if (isValidPosition(x, y, 10)) {
                            const weaponType = availableWeapons[Math.floor(Math.random() * availableWeapons.length)];
                            items.push({ x, y, type: 'weapon', weapon: weaponType, collected: false });
                            weaponPlaced = true;
                        }
                    }
                    attempts++;
                }
            }
            
            // Generate ammo pickups
            const ammoTypes = availableWeapons.filter(w => weapons[w].ammo !== -1);
            for (let i = 0; i < 2; i++) {
                let ammoPlaced = false;
                let attempts = 0;
                while (!ammoPlaced && attempts < 200 && ammoTypes.length > 0) {
                    const cellX = Math.floor(Math.random() * LEVEL_WIDTH);
                    const cellY = Math.floor(Math.random() * LEVEL_HEIGHT);
                    
                    if (isFloorType(levelData[cellY][cellX])) {
                        const x = cellX * CELL_SIZE + CELL_SIZE / 2;
                        const y = cellY * CELL_SIZE + CELL_SIZE / 2;
                        
                        if (isValidPosition(x, y, 10)) {
                            const ammoType = ammoTypes[Math.floor(Math.random() * ammoTypes.length)];
                            items.push({ x, y, type: 'ammo', weapon: ammoType, collected: false });
                            ammoPlaced = true;
                        }
                    }
                    attempts++;
                }
            }
            
            // Generate health packs
            for (let i = 0; i < 3; i++) {
                let healthPlaced = false;
                let attempts = 0;
                while (!healthPlaced && attempts < 200) {
                    const cellX = Math.floor(Math.random() * LEVEL_WIDTH);
                    const cellY = Math.floor(Math.random() * LEVEL_HEIGHT);
                    
                    if (isFloorType(levelData[cellY][cellX])) {
                        const x = cellX * CELL_SIZE + CELL_SIZE / 2;
                        const y = cellY * CELL_SIZE + CELL_SIZE / 2;
                        
                        if (isValidPosition(x, y, 10)) {
                            items.push({ x, y, type: 'health', collected: false });
                            healthPlaced = true;
                        }
                    }
                    attempts++;
                }
            }
        }

        function createEnemy(x, y, type, isBoss = false) {
            const template = enemyTypes[type];
            return {
                x, y,
                type,
                health: isBoss ? template.health * 2 : template.health,
                maxHealth: isBoss ? template.health * 2 : template.health,
                speed: template.speed,
                damage: isBoss ? template.damage * 1.5 : template.damage,
                color: isBoss ? '#FF0000' : template.color,
                size: isBoss ? template.size * 1.5 : template.size,
                points: isBoss ? template.points * 3 : template.points,
                angle: 0,
                lastAttack: 0,
                isBoss,
                ai: {
                    state: 'patrol',
                    targetX: x,
                    targetY: y,
                    lastSeen: 0
                }
            };
        }

        // Helper functions for floor and wall types
        function isFloorType(cellType) {
            return cellType === FLOOR || cellType === FLOOR_STONE || cellType === FLOOR_METAL || 
                   cellType === FLOOR_DIRT || cellType === FLOOR_CARPET || cellType === FLOOR_TILE || 
                   cellType === FLOOR_MARBLE || cellType === WATER || cellType === LAVA;
        }
        
        function isWallType(cellType) {
            return cellType === WALL || cellType === WALL_STONE || cellType === WALL_METAL || cellType === WALL_BRICK || 
                   cellType === WALL_TECH || cellType === WALL_MARBLE || cellType === WALL_WOOD || cellType === SECRET_WALL;
        }

        function isSolidWallType(cellType) {
            // Secret walls are not solid - player can walk through them to reveal them
            return cellType === WALL || cellType === WALL_STONE || cellType === WALL_METAL || cellType === WALL_BRICK || 
                   cellType === WALL_TECH || cellType === WALL_MARBLE || cellType === WALL_WOOD;
        }
        
        function isDoorType(cellType) {
            return cellType === DOOR || cellType === DOOR_RED || cellType === DOOR_YELLOW || cellType === DOOR_BLUE;
        }
        
        function isValidPosition(x, y, buffer = 15) {
            // Check distance from player
            const dist = Math.sqrt((x - player.x) ** 2 + (y - player.y) ** 2);
            if (dist < 50) return false;
            
            // Check collision with walls
            const cellX = Math.floor(x / CELL_SIZE);
            const cellY = Math.floor(y / CELL_SIZE);
            
            if (cellX < 0 || cellX >= LEVEL_WIDTH || cellY < 0 || cellY >= LEVEL_HEIGHT) return false;
            if (isWallType(levelData[cellY][cellX]) || isDoorType(levelData[cellY][cellX])) return false;
            
            return true;
        }
        
        // Helper functions for room generation
        function carveRectangularRoom(room, floorType) {
            for (let y = room.y; y < room.y + room.h; y++) {
                for (let x = room.x; x < room.x + room.w; x++) {
                    levelData[y][x] = floorType;
                }
            }
        }
        
        function carveIrregularRoom(room, floorType) {
            // Start with rectangular base
            carveRectangularRoom(room, floorType);
            
            // Add some irregular features
            const features = Math.floor(Math.random() * 3) + 1;
            for (let i = 0; i < features; i++) {
                if (Math.random() < 0.5) {
                    // Add an extension
                    const extW = Math.floor(Math.random() * 3) + 2;
                    const extH = Math.floor(Math.random() * 3) + 2;
                    const extX = room.x + Math.floor(Math.random() * (room.w - extW));
                    const extY = Math.random() < 0.5 ? room.y - extH : room.y + room.h;
                    
                    if (extY >= 1 && extY + extH < LEVEL_HEIGHT - 1) {
                        for (let y = extY; y < extY + extH; y++) {
                            for (let x = extX; x < extX + extW; x++) {
                                if (x >= 1 && x < LEVEL_WIDTH - 1) {
                                    levelData[y][x] = floorType;
                                }
                            }
                        }
                    }
                } else {
                    // Cut out a corner
                    const cutSize = Math.floor(Math.random() * 2) + 1;
                    const cutX = Math.random() < 0.5 ? room.x : room.x + room.w - cutSize;
                    const cutY = Math.random() < 0.5 ? room.y : room.y + room.h - cutSize;
                    
                    for (let y = cutY; y < cutY + cutSize && y < room.y + room.h; y++) {
                        for (let x = cutX; x < cutX + cutSize && x < room.x + room.w; x++) {
                            if (x >= 1 && x < LEVEL_WIDTH - 1 && y >= 1 && y < LEVEL_HEIGHT - 1) {
                                levelData[y][x] = levelThemes[Object.keys(levelThemes)[Math.floor(game.level / 3) % Object.keys(levelThemes).length]].wallType;
                            }
                        }
                    }
                }
            }
        }
        
        function createHallway(room1, room2, floorType) {
            // Find connection points on room edges closer to each other
            const x1 = room1.x + Math.floor(room1.w / 2);
            const y1 = room1.y + Math.floor(room1.h / 2);
            const x2 = room2.x + Math.floor(room2.w / 2);
            const y2 = room2.y + Math.floor(room2.h / 2);
            
            const cells = [];
            const segments = [];
            
            // Determine hallway width (mostly 1 tile, sometimes 2-3)
            const widthRoll = Math.random();
            let hallwayWidth;
            if (widthRoll < 0.7) {
                hallwayWidth = 1; // 70% chance for 1-wide
            } else if (widthRoll < 0.9) {
                hallwayWidth = 2; // 20% chance for 2-wide
            } else {
                hallwayWidth = 3; // 10% chance for 3-wide
            }
            
            // Create L-shaped hallway with clear segments
            if (Math.random() < 0.5) {
                // Horizontal first, then vertical
                const minX = Math.min(x1, x2);
                const maxX = Math.max(x1, x2);
                
                // Horizontal segment
                const hSegment = [];
                for (let x = minX; x <= maxX; x++) {
                    for (let w = 0; w < hallwayWidth; w++) {
                        const drawY = y1 + w;
                        if (x >= 0 && x < LEVEL_WIDTH && drawY >= 0 && drawY < LEVEL_HEIGHT) {
                            levelData[drawY][x] = floorType;
                            cells.push({x: x, y: drawY});
                            hSegment.push({x: x, y: drawY});
                        }
                    }
                }
                segments.push({
                    type: 'horizontal', 
                    cells: hSegment, 
                    centerX: Math.floor((minX + maxX) / 2), 
                    centerY: y1,
                    width: hallwayWidth
                });
                
                // Vertical segment
                const vSegment = [];
                const minY = Math.min(y1, y2);
                const maxY = Math.max(y1, y2);
                for (let y = minY; y <= maxY; y++) {
                    for (let w = 0; w < hallwayWidth; w++) {
                        const drawX = x2 + w;
                        if (drawX >= 0 && drawX < LEVEL_WIDTH && y >= 0 && y < LEVEL_HEIGHT) {
                            levelData[y][drawX] = floorType;
                            cells.push({x: drawX, y: y});
                            vSegment.push({x: drawX, y: y});
                        }
                    }
                }
                segments.push({
                    type: 'vertical', 
                    cells: vSegment, 
                    centerX: x2, 
                    centerY: Math.floor((minY + maxY) / 2),
                    width: hallwayWidth
                });
            } else {
                // Vertical first, then horizontal
                const minY = Math.min(y1, y2);
                const maxY = Math.max(y1, y2);
                
                // Vertical segment
                const vSegment = [];
                for (let y = minY; y <= maxY; y++) {
                    for (let w = 0; w < hallwayWidth; w++) {
                        const drawX = x1 + w;
                        if (drawX >= 0 && drawX < LEVEL_WIDTH && y >= 0 && y < LEVEL_HEIGHT) {
                            levelData[y][drawX] = floorType;
                            cells.push({x: drawX, y: y});
                            vSegment.push({x: drawX, y: y});
                        }
                    }
                }
                segments.push({
                    type: 'vertical', 
                    cells: vSegment, 
                    centerX: x1, 
                    centerY: Math.floor((minY + maxY) / 2),
                    width: hallwayWidth
                });
                
                // Horizontal segment
                const hSegment = [];
                const minX = Math.min(x1, x2);
                const maxX = Math.max(x1, x2);
                for (let x = minX; x <= maxX; x++) {
                    for (let w = 0; w < hallwayWidth; w++) {
                        const drawY = y2 + w;
                        if (x >= 0 && x < LEVEL_WIDTH && drawY >= 0 && drawY < LEVEL_HEIGHT) {
                            levelData[drawY][x] = floorType;
                            cells.push({x: x, y: drawY});
                            hSegment.push({x: x, y: drawY});
                        }
                    }
                }
                segments.push({
                    type: 'horizontal', 
                    cells: hSegment, 
                    centerX: Math.floor((minX + maxX) / 2), 
                    centerY: y2,
                    width: hallwayWidth
                });
            }
            
            return { cells: cells, segments: segments, from: room1, to: room2, width: hallwayWidth };
        }
        
        function getAccessibleRooms(startRoom, blockingDoors) {
            // Flood fill to find all accessible areas from start room without using blocked doors
            const accessible = new Set();
            const visited = new Set();
            const queue = [{x: Math.floor(startRoom.x + startRoom.w/2), y: Math.floor(startRoom.y + startRoom.h/2)}];
            
            while (queue.length > 0) {
                const current = queue.shift();
                const key = `${current.x},${current.y}`;
                
                if (visited.has(key) || current.x < 0 || current.x >= LEVEL_WIDTH || 
                    current.y < 0 || current.y >= LEVEL_HEIGHT) continue;
                    
                visited.add(key);
                
                const cellType = levelData[current.y][current.x];
                
                // Skip walls (including secret walls for enemy pathfinding)
                if (isWallType(cellType)) continue;
                
                // Skip blocked doors
                if (isDoorType(cellType)) {
                    const isBlocked = blockingDoors.some(door => 
                        Math.abs(door.cellX - current.x) <= 1 && Math.abs(door.cellY - current.y) <= 1
                    );
                    if (isBlocked) continue;
                }
                
                // This cell is accessible
                accessible.add(current);
                
                // Add neighbors to queue
                const neighbors = [
                    {x: current.x + 1, y: current.y},
                    {x: current.x - 1, y: current.y},
                    {x: current.x, y: current.y + 1},
                    {x: current.x, y: current.y - 1}
                ];
                
                for (const neighbor of neighbors) {
                    const neighKey = `${neighbor.x},${neighbor.y}`;
                    if (!visited.has(neighKey)) {
                        queue.push(neighbor);
                    }
                }
            }
            
            return Array.from(accessible);
        }
        
        // Line of sight checking for enemies
        function hasLineOfSight(x1, y1, x2, y2) {
            const dx = Math.abs(x2 - x1);
            const dy = Math.abs(y2 - y1);
            const steps = Math.max(dx, dy);
            
            if (steps === 0) return true;
            
            const stepX = (x2 - x1) / steps;
            const stepY = (y2 - y1) / steps;
            
            for (let i = 1; i < steps; i++) {
                const checkX = x1 + stepX * i;
                const checkY = y1 + stepY * i;
                
                const cellX = Math.floor(checkX / CELL_SIZE);
                const cellY = Math.floor(checkY / CELL_SIZE);
                
                if (cellX < 0 || cellX >= LEVEL_WIDTH || cellY < 0 || cellY >= LEVEL_HEIGHT) return false;
                
                const cellType = levelData[cellY][cellX];
                
                // Blocked by solid walls (but not secret walls - enemies can't see through them)
                if (isWallType(cellType)) return false;
                
                // Blocked by all doors (both locked and unlocked)
                if (isDoorType(cellType)) {
                    const door = doors.find(d => 
                        Math.abs(d.x - (cellX * CELL_SIZE + CELL_SIZE/2)) < CELL_SIZE/2 &&
                        Math.abs(d.y - (cellY * CELL_SIZE + CELL_SIZE/2)) < CELL_SIZE/2
                    );
                    // Block sight through doors unless they are opened
                    if (door && !door.opened) return false;
                }
            }
            
            return true;
        }

        function updateVisibility() {
            // Initialize maps if needed
            if (exploredMap.length === 0) {
                exploredMap = Array(LEVEL_HEIGHT).fill(null).map(() => Array(LEVEL_WIDTH).fill(false));
            }
            visibilityMap = Array(LEVEL_HEIGHT).fill(null).map(() => Array(LEVEL_WIDTH).fill(false));
            
            // Direct line-of-sight visibility calculation with higher resolution
            const playerCellX = Math.floor(player.x / CELL_SIZE);
            const playerCellY = Math.floor(player.y / CELL_SIZE);
            
            // Mark player's position as visible
            visibilityMap[playerCellY][playerCellX] = true;
            exploredMap[playerCellY][playerCellX] = true;
            
            // Define visibility range (in cells)
            const maxVisionRange = 12;
            
            // Cast rays in all directions for direct line-of-sight
            const rayCount = 360; // High resolution for smooth visibility
            for (let i = 0; i < rayCount; i++) {
                const angle = (i / rayCount) * Math.PI * 2;
                const dx = Math.cos(angle);
                const dy = Math.sin(angle);
                
                // Cast ray from player position
                for (let distance = 1; distance <= maxVisionRange; distance++) {
                    const rayX = player.x + dx * distance * CELL_SIZE;
                    const rayY = player.y + dy * distance * CELL_SIZE;
                    
                    const cellX = Math.floor(rayX / CELL_SIZE);
                    const cellY = Math.floor(rayY / CELL_SIZE);
                    
                    // Check bounds
                    if (cellX < 0 || cellX >= LEVEL_WIDTH || cellY < 0 || cellY >= LEVEL_HEIGHT) {
                        break; // Hit level boundary
                    }
                    
                    // Mark this cell as visible and explored
                    visibilityMap[cellY][cellX] = true;
                    exploredMap[cellY][cellX] = true;
                    
                    const cellType = levelData[cellY][cellX];
                    
                    // Stop ray at walls
                    if (isWallType(cellType)) {
                        break;
                    }
                    
                    // Stop ray at closed doors
                    if (isDoorType(cellType)) {
                        const door = doors.find(d => 
                            Math.abs(d.x - (cellX * CELL_SIZE + CELL_SIZE/2)) < CELL_SIZE/2 &&
                            Math.abs(d.y - (cellY * CELL_SIZE + CELL_SIZE/2)) < CELL_SIZE/2
                        );
                        // Stop if door exists and is not opened
                        if (door && !door.opened) {
                            break;
                        }
                    }
                }
            }
        }

        // Sound effects function
        function playSound(soundName) {
            if (!sounds[soundName]) return;
            
            try {
                // Enhanced sound generation for more realistic Doom-style audio
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                const filterNode = audioContext.createBiquadFilter();
                
                oscillator.connect(filterNode);
                filterNode.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                const soundConfig = sounds[soundName];
                
                // Different waveforms and effects for different sounds
                switch(soundName) {
                    case 'pistol':
                        oscillator.type = 'sawtooth';
                        oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
                        oscillator.frequency.exponentialRampToValueAtTime(200, audioContext.currentTime + 0.05);
                        filterNode.frequency.setValueAtTime(1200, audioContext.currentTime);
                        break;
                    case 'shotgun':
                        oscillator.type = 'square';
                        oscillator.frequency.setValueAtTime(150, audioContext.currentTime);
                        oscillator.frequency.exponentialRampToValueAtTime(50, audioContext.currentTime + 0.15);
                        filterNode.frequency.setValueAtTime(400, audioContext.currentTime);
                        break;
                    case 'chaingun':
                        oscillator.type = 'sawtooth';
                        oscillator.frequency.setValueAtTime(600 + Math.random() * 200, audioContext.currentTime);
