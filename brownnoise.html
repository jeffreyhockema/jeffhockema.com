<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Brown Noise - Pure Loop</title>
    <style>
        :root {
            --bg-color: #050505;
            --accent-color: #5c4033;
            --text-color: #c0c0c0;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: sans-serif;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        .button-container {
            width: 300px; height: 300px;
            display: flex; justify-content: center; align-items: center;
        }

        #master-toggle {
            width: 160px; height: 160px;
            border-radius: 50%;
            border: 4px solid var(--accent-color);
            background: transparent;
            color: var(--accent-color);
            font-size: 1.4rem; font-weight: bold;
            cursor: pointer;
            transition: all 0.4s ease;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        #master-toggle.playing {
            background: var(--accent-color);
            color: #000;
            transform: scale(1.1);
        }

        #settings-btn {
            position: absolute; top: 25px; right: 25px;
            background: none; border: none;
            fill: var(--text-color); opacity: 0.3; cursor: pointer;
        }

        #settings-menu {
            position: fixed; bottom: -100%; left: 0; width: 100%;
            background: #111; padding: 30px 20px;
            box-sizing: border-box; transition: bottom 0.4s ease;
            border-top: 2px solid var(--accent-color);
            z-index: 100; text-align: center;
        }

        #settings-menu.open { bottom: 0; }

        .control-group { max-width: 400px; margin: 0 auto 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-size: 0.7rem; color: #555; text-transform: uppercase; }
        input[type=range] { width: 100%; accent-color: var(--accent-color); cursor: pointer; }
        
        .btn-row { display: flex; flex-direction: column; gap: 10px; max-width: 400px; margin: 0 auto; }
        .ui-btn { 
            background: #222; border: none; color: white; 
            padding: 14px; border-radius: 8px; cursor: pointer; font-size: 0.9rem;
        }
        .apply-btn { background: var(--accent-color); font-weight: bold; color: #000; }
    </style>
</head>
<body>

    <button id="settings-btn">
        <svg width="32" height="32" viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
    </button>

    <div class="button-container">
        <button id="master-toggle">PLAY</button>
    </div>

    <audio id="audio1" loop playsinline></audio>
    <audio id="audio2" loop playsinline></audio>

    <div id="settings-menu">
        <div class="control-group">
            <label>Master Volume</label>
            <input type="range" id="vol-slider" min="0" max="1" step="0.01">
        </div>
        <div class="control-group">
            <label>Bass Power</label>
            <input type="range" id="bass-slider" min="-10" max="30" step="1">
        </div>
        <div class="control-group">
            <label>Muffle (Softness)</label>
            <input type="range" id="muffle-slider" min="300" max="5000" step="100">
        </div>
        
        <div class="btn-row">
            <button class="ui-btn apply-btn" id="apply-btn">Generate & Apply</button>
            <button class="ui-btn" id="close-btn">Done</button>
        </div>
    </div>

    <script>
        const a1 = document.getElementById('audio1');
        const a2 = document.getElementById('audio2');
        const toggleBtn = document.getElementById('master-toggle');
        const applyBtn = document.getElementById('apply-btn');
        
        let isPlaying = false;
        let switchTimer;
        let activePlayer = 1;
        const DURATION = 60; // seconds
        const SWITCH_INTERVAL = 30; // swap players every 30s

        function setCookie(name, val) { document.cookie = `${name}=${val};max-age=31536000;path=/`; }
        function getCookie(name) { 
            let v = document.cookie.match('(^|;) ?' + name + '=([^;]*)(;|$)');
            return v ? v[2] : null;
        }

        async function generateWavBlob() {
            const bass = parseFloat(document.getElementById('bass-slider').value);
            const muffle = parseFloat(document.getElementById('muffle-slider').value);
            const sr = 44100;
            const ctx = new OfflineAudioContext(1, sr * DURATION, sr);
            const buffer = ctx.createBuffer(1, sr * DURATION, sr);
            const data = buffer.getChannelData(0);
            
            let lastOut = 0.0;
            for (let i = 0; i < data.length; i++) {
                let white = Math.random() * 2 - 1;
                data[i] = (lastOut + (0.02 * white)) / 1.02;
                lastOut = data[i];
                data[i] *= 3.5;
            }

            const source = ctx.createBufferSource();
            source.buffer = buffer;
            const lp = ctx.createBiquadFilter();
            lp.type = "lowpass"; lp.frequency.value = muffle;
            const bs = ctx.createBiquadFilter();
            bs.type = "lowshelf"; bs.frequency.value = 200; bs.gain.value = bass;

            source.connect(lp); lp.connect(bs); bs.connect(ctx.destination);
            source.start();
            const rendered = await ctx.startRendering();
            
            // Standard WAV Header construction
            let len = rendered.length * 2 + 44, buf = new ArrayBuffer(len), view = new DataView(buf), pos = 0;
            const setU32 = (d) => { view.setUint32(pos, d, true); pos += 4; };
            const setU16 = (d) => { view.setUint16(pos, d, true); pos += 2; };
            setU32(0x46464952); setU32(len - 8); setU32(0x45564157); setU32(0x20746d66);
            setU32(16); setU16(1); setU16(1); setU32(sr); setU32(sr * 2); setU16(2); setU16(16);
            setU32(0x61746164); setU32(len - pos - 4);
            let d_chan = rendered.getChannelData(0);
            for(let i=0; i<d_chan.length; i++) {
                let s = Math.max(-1, Math.min(1, d_chan[i]));
                view.setInt16(pos, s < 0 ? s * 0x8000 : s * 0x7FFF, true); pos += 2;
            }
            return URL.createObjectURL(new Blob([buf], {type: "audio/wav"}));
        }

        function instantSwitch() {
            if (!isPlaying) return;
            const masterVol = parseFloat(document.getElementById('vol-slider').value);

            if (activePlayer === 1) {
                // Prep A2
                a2.currentTime = 0;
                a2.volume = masterVol;
                a2.play();
                // Kill A1 immediately
                a1.volume = 0;
                a1.pause();
                activePlayer = 2;
            } else {
                // Prep A1
                a1.currentTime = 0;
                a1.volume = masterVol;
                a1.play();
                // Kill A2 immediately
                a2.volume = 0;
                a2.pause();
                activePlayer = 1;
            }
            
            switchTimer = setTimeout(instantSwitch, SWITCH_INTERVAL * 1000);
        }

        toggleBtn.onclick = async function() {
            if (isPlaying) {
                isPlaying = false;
                clearTimeout(switchTimer);
                a1.pause(); a2.pause();
                this.textContent = 'PLAY';
                this.classList.remove('playing');
                return;
            }

            this.textContent = 'STOP';
            this.classList.add('playing');
            isPlaying = true;
            
            const blobUrl = await generateWavBlob();
            a1.src = blobUrl;
            a2.src = blobUrl;
            
            const masterVol = parseFloat(document.getElementById('vol-slider').value);
            a1.volume = masterVol;
            a1.play();
            
            // Start the switch cycle
            switchTimer = setTimeout(instantSwitch, SWITCH_INTERVAL * 1000);
        };

        applyBtn.onclick = async () => {
            const wasPlaying = isPlaying;
            if (wasPlaying) {
                isPlaying = false;
                clearTimeout(switchTimer);
                a1.pause(); a2.pause();
            }
            applyBtn.textContent = "Updating...";
            // This forces a re-render of the sound file
            const blobUrl = await generateWavBlob();
            a1.src = blobUrl;
            a2.src = blobUrl;
            
            applyBtn.textContent = "Generate & Apply";
            if (wasPlaying) {
                isPlaying = true;
                a1.volume = parseFloat(document.getElementById('vol-slider').value);
                a1.play();
                switchTimer = setTimeout(instantSwitch, SWITCH_INTERVAL * 1000);
            }
            setCookie('bass', document.getElementById('bass-slider').value);
            setCookie('muffle', document.getElementById('muffle-slider').value);
        };

        document.getElementById('vol-slider').oninput = (e) => {
            const v = e.target.value;
            if (activePlayer === 1) a1.volume = v; else a2.volume = v;
            setCookie('volume', v);
        };

        document.getElementById('close-btn').onclick = () => document.getElementById('settings-menu').classList.remove('open');
        document.getElementById('settings-btn').onclick = () => document.getElementById('settings-menu').classList.add('open');

        window.onload = () => {
            document.getElementById('vol-slider').value = getCookie('volume') || 0.5;
            document.getElementById('bass-slider').value = getCookie('bass') || 15;
            document.getElementById('muffle-slider').value = getCookie('muffle') || 1500;
        };
    </script>
</body>
</html>
