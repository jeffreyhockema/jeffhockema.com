<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seamless Brown Noise</title>
    <style>
        :root {
            --bg-color: #080808;
            --accent-color: #63422b;
            --text-color: #d1d1d1;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, sans-serif;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        .button-container {
            width: 300px; height: 300px;
            display: flex; justify-content: center; align-items: center;
        }

        #master-toggle {
            width: 160px; height: 160px;
            border-radius: 50%;
            border: 4px solid var(--accent-color);
            background: transparent;
            color: var(--accent-color);
            font-size: 1.4rem; font-weight: bold;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        #master-toggle.playing {
            background: var(--accent-color);
            color: var(--bg-color);
            transform: scale(1.1);
        }

        #settings-btn {
            position: absolute; top: 25px; right: 25px;
            background: none; border: none;
            fill: var(--text-color); opacity: 0.4; cursor: pointer;
        }

        #settings-menu {
            position: fixed; bottom: -100%; left: 0; width: 100%;
            background: #121212; padding: 30px 20px;
            box-sizing: border-box; transition: bottom 0.4s ease;
            border-top: 2px solid var(--accent-color);
            z-index: 100; text-align: center;
        }

        #settings-menu.open { bottom: 0; }

        .control-group { max-width: 400px; margin: 0 auto 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-size: 0.7rem; color: #666; letter-spacing: 1px; }
        input[type=range] { width: 100%; accent-color: var(--accent-color); cursor: pointer; }
        
        .btn-row { display: flex; flex-direction: column; gap: 10px; max-width: 400px; margin: 0 auto; }
        .ui-btn { 
            background: #222; border: none; color: white; 
            padding: 12px; border-radius: 8px; cursor: pointer;
        }
        .apply-btn { background: var(--accent-color); font-weight: bold; }
    </style>
</head>
<body>

    <button id="settings-btn">
        <svg width="32" height="32" viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
    </button>

    <div class="button-container">
        <button id="master-toggle">PLAY</button>
    </div>

    <div id="settings-menu">
        <div class="control-group">
            <label>VOLUME</label>
            <input type="range" id="vol-slider" min="0" max="1" step="0.01">
        </div>
        <div class="control-group">
            <label>BASS POWER</label>
            <input type="range" id="bass-slider" min="-10" max="30" step="1">
        </div>
        <div class="control-group">
            <label>MUFFLE (LOW PASS)</label>
            <input type="range" id="muffle-slider" min="400" max="8000" step="100">
        </div>
        
        <div class="btn-row">
            <button class="ui-btn apply-btn" id="apply-btn">Apply Settings</button>
            <button class="ui-btn" id="close-btn">Done</button>
        </div>
    </div>

    <script>
        const DEFAULTS = { volume: 0.5, bass: 12, muffle: 2500 };
        let audioCtx, source, gainNode, bassFilter, lpFilter;
        let isPlaying = false;

        function setCookie(name, val) { document.cookie = `${name}=${val};max-age=31536000;path=/`; }
        function getCookie(name) { 
            let v = document.cookie.match('(^|;) ?' + name + '=([^;]*)(;|$)');
            return v ? v[2] : null;
        }

        function initAudio() {
            // Create Audio Context with a fix for iOS locking
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            gainNode = audioCtx.createGain();
            bassFilter = audioCtx.createBiquadFilter();
            lpFilter = audioCtx.createBiquadFilter();

            bassFilter.type = "lowshelf";
            bassFilter.frequency.value = 200;
            lpFilter.type = "lowpass";

            lpFilter.connect(bassFilter);
            bassFilter.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            updateFromUI();
        }

        function generateBrownNoiseBuffer() {
            const bufferSize = audioCtx.sampleRate * 5; // 5 seconds of unique noise
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            let lastOut = 0.0;
            
            for (let i = 0; i < bufferSize; i++) {
                let white = Math.random() * 2 - 1;
                data[i] = (lastOut + (0.02 * white)) / 1.02;
                lastOut = data[i];
                data[i] *= 3.5;
            }
            return buffer;
        }

        function updateFromUI() {
            if (!gainNode) return;
            gainNode.gain.value = document.getElementById('vol-slider').value;
            bassFilter.gain.value = document.getElementById('bass-slider').value;
            lpFilter.frequency.value = document.getElementById('muffle-slider').value;
        }

        async function start() {
            if (!audioCtx) initAudio();
            if (audioCtx.state === 'suspended') await audioCtx.resume();

            source = audioCtx.createBufferSource();
            source.buffer = generateBrownNoiseBuffer();
            source.loop = true; // THIS IS THE KEY: Hardware-level seamless loop
            
            source.connect(lpFilter);
            source.start(0);
            isPlaying = true;
        }

        function stop() {
            if (source) {
                source.stop();
                source.disconnect();
            }
            isPlaying = false;
        }

        document.getElementById('master-toggle').onclick = function() {
            if (!isPlaying) {
                this.textContent = 'STOP';
                this.classList.add('playing');
                start();
            } else {
                this.textContent = 'PLAY';
                this.classList.remove('playing');
                stop();
            }
        };

        document.getElementById('apply-btn').onclick = function() {
            updateFromUI();
            setCookie('bass', document.getElementById('bass-slider').value);
            setCookie('muffle', document.getElementById('muffle-slider').value);
            this.textContent = "Applied!";
            setTimeout(() => this.textContent = "Apply Settings", 1000);
        };

        document.getElementById('vol-slider').oninput = (e) => {
            if (gainNode) gainNode.gain.value = e.target.value;
            setCookie('volume', e.target.value);
        };

        document.getElementById('settings-btn').onclick = () => document.getElementById('settings-menu').classList.add('open');
        document.getElementById('close-btn').onclick = () => document.getElementById('settings-menu').classList.remove('open');
        
        window.onload = () => {
            document.getElementById('vol-slider').value = getCookie('volume') || DEFAULTS.volume;
            document.getElementById('bass-slider').value = getCookie('bass') || DEFAULTS.bass;
            document.getElementById('muffle-slider').value = getCookie('muffle') || DEFAULTS.muffle;
        };
    </script>
</body>
</html>
