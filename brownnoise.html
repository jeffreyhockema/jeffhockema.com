<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Brown Noise</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --accent-color: #8b5a2b;
            --text-color: #efefef;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        .button-container {
            width: 300px; height: 300px;
            display: flex; justify-content: center; align-items: center;
        }

        #master-toggle {
            width: 160px; height: 160px;
            border-radius: 50%;
            border: 4px solid var(--accent-color);
            background: transparent;
            color: var(--accent-color);
            font-size: 1.4rem; font-weight: bold;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 5;
        }

        #master-toggle.playing {
            background: var(--accent-color);
            color: var(--bg-color);
            transform: scale(1.1);
        }

        #settings-btn {
            position: absolute; top: 25px; right: 25px;
            background: none; border: none;
            fill: var(--text-color); opacity: 0.5; cursor: pointer;
        }

        #settings-menu {
            position: fixed; bottom: -100%; left: 0; width: 100%;
            background: #1a1a1a; padding: 30px 20px;
            box-sizing: border-box; transition: bottom 0.4s ease;
            border-top: 3px solid var(--accent-color);
            z-index: 100; text-align: center;
        }

        #settings-menu.open { bottom: 0; }

        .control-group { max-width: 400px; margin: 0 auto 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-size: 0.75rem; color: #888; letter-spacing: 1px; }
        input[type=range] { width: 100%; accent-color: var(--accent-color); cursor: pointer; }
        
        .btn-row { display: flex; flex-direction: column; gap: 10px; max-width: 400px; margin: 0 auto; }
        .ui-btn { 
            background: #333; border: none; color: white; 
            padding: 12px; border-radius: 6px; cursor: pointer; font-size: 0.9rem;
        }
        .apply-btn { background: var(--accent-color); font-weight: bold; }
        .reset-btn { color: #ff6b6b; background: #222; }
    </style>
</head>
<body>

    <button id="settings-btn">
        <svg width="32" height="32" viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
    </button>

    <div class="button-container">
        <button id="master-toggle">PLAY</button>
    </div>

    <audio id="bg-audio" loop></audio>

    <div id="settings-menu">
        <div class="control-group">
            <label>VOLUME</label>
            <input type="range" id="vol-slider" min="0" max="1" step="0.01">
        </div>
        <div class="control-group">
            <label>BASS POWER</label>
            <input type="range" id="bass-slider" min="-10" max="30" step="1">
        </div>
        <div class="control-group">
            <label>MUFFLE (LOW PASS)</label>
            <input type="range" id="muffle-slider" min="400" max="8000" step="100">
        </div>
        
        <div class="btn-row">
            <button class="ui-btn apply-btn" id="apply-btn">Update Sound Profile</button>
            <button class="ui-btn reset-btn" id="reset-btn">Reset Defaults</button>
            <button class="ui-btn" id="close-btn">Close</button>
        </div>
    </div>

    <script>
        const DEFAULTS = { volume: 0.5, bass: 10, muffle: 3000 };
        const audioEl = document.getElementById('bg-audio');
        const toggleBtn = document.getElementById('master-toggle');
        const applyBtn = document.getElementById('apply-btn');
        
        function setCookie(name, val) { document.cookie = `${name}=${val};max-age=31536000;path=/`; }
        function getCookie(name) { 
            let v = document.cookie.match('(^|;) ?' + name + '=([^;]*)(;|$)');
            return v ? v[2] : null;
        }

        // --- THE "OFFLINE" RENDERER ---
        // This generates a unique audio file based on your slider settings
        async function generateCustomBrownNoise() {
            const bassVal = parseFloat(document.getElementById('bass-slider').value);
            const muffleVal = parseFloat(document.getElementById('muffle-slider').value);
            
            const sampleRate = 44100;
            const duration = 10; // 10 second loop is enough for noise
            const offlineCtx = new OfflineAudioContext(1, sampleRate * duration, sampleRate);

            // 1. Generate Raw Brown Noise
            const buffer = offlineCtx.createBuffer(1, sampleRate * duration, sampleRate);
            const data = buffer.getChannelData(0);
            let lastOut = 0.0;
            for (let i = 0; i < data.length; i++) {
                let white = Math.random() * 2 - 1;
                data[i] = (lastOut + (0.02 * white)) / 1.02;
                lastOut = data[i];
                data[i] *= 3.5; 
            }

            const source = offlineCtx.createBufferSource();
            source.buffer = buffer;

            // 2. Apply Filters to the Render
            const lpFilter = offlineCtx.createBiquadFilter();
            lpFilter.type = "lowpass";
            lpFilter.frequency.value = muffleVal;

            const bassFilter = offlineCtx.createBiquadFilter();
            bassFilter.type = "lowshelf";
            bassFilter.frequency.value = 200;
            bassFilter.gain.value = bassVal;

            source.connect(lpFilter);
            lpFilter.connect(bassFilter);
            bassFilter.connect(offlineCtx.destination);
            source.start();

            const renderedBuffer = await offlineCtx.startRendering();
            
            // 3. Convert Rendered Buffer to WAV Blob
            return bufferToWav(renderedBuffer);
        }

        function bufferToWav(abuffer) {
            let numOfChan = abuffer.numberOfChannels,
                length = abuffer.length * numOfChan * 2 + 44,
                buffer = new ArrayBuffer(length),
                view = new DataView(buffer),
                channels = [], i, sample,
                offset = 0,
                pos = 0;

            function setUint16(data) { view.setUint16(pos, data, true); pos += 2; }
            function setUint32(data) { view.setUint32(pos, data, true); pos += 4; }

            setUint32(0x46464952); // "RIFF"
            setUint32(length - 8); // file length - 8
            setUint32(0x45564157); // "WAVE"
            setUint32(0x20746d66); // "fmt "
            setUint32(16); // length of fmt chunk
            setUint16(1); // PCM format
            setUint16(numOfChan);
            setUint32(abuffer.sampleRate);
            setUint32(abuffer.sampleRate * 2 * numOfChan);
            setUint16(numOfChan * 2);
            setUint16(16);
            setUint32(0x61746164); // "data"
            setUint32(length - pos - 4);

            for(i=0; i<abuffer.numberOfChannels; i++) channels.push(abuffer.getChannelData(i));
            while(pos < length) {
                for(i=0; i<numOfChan; i++) {
                    sample = Math.max(-1, Math.min(1, channels[i][offset]));
                    sample = (sample < 0 ? sample * 0x8000 : sample * 0x7FFF);
                    view.setInt16(pos, sample, true);
                    pos += 2;
                }
                offset++;
            }
            return URL.createObjectURL(new Blob([buffer], {type: "audio/wav"}));
        }

        async function applyNewSettings() {
            const wasPlaying = !audioEl.paused;
            applyBtn.textContent = "Generating...";
            applyBtn.disabled = true;

            const newSrc = await generateCustomBrownNoise();
            audioEl.src = newSrc;
            
            setCookie('bass', document.getElementById('bass-slider').value);
            setCookie('muffle', document.getElementById('muffle-slider').value);

            if (wasPlaying) audioEl.play();
            
            applyBtn.textContent = "Update Sound Profile";
            applyBtn.disabled = false;
        }

        function loadUIFromCookies() {
            document.getElementById('vol-slider').value = getCookie('volume') || DEFAULTS.volume;
            document.getElementById('bass-slider').value = getCookie('bass') || DEFAULTS.bass;
            document.getElementById('muffle-slider').value = getCookie('muffle') || DEFAULTS.muffle;
            audioEl.volume = document.getElementById('vol-slider').value;
        }

        // Events
        toggleBtn.addEventListener('click', async () => {
            if (!audioEl.src) await applyNewSettings();
            if (audioEl.paused) {
                audioEl.play();
                toggleBtn.textContent = 'STOP';
                toggleBtn.classList.add('playing');
            } else {
                audioEl.pause();
                toggleBtn.textContent = 'PLAY';
                toggleBtn.classList.remove('playing');
            }
        });

        applyBtn.onclick = applyNewSettings;
        document.getElementById('vol-slider').oninput = (e) => {
            audioEl.volume = e.target.value;
            setCookie('volume', e.target.value);
        };

        document.getElementById('reset-btn').onclick = () => {
            document.getElementById('vol-slider').value = DEFAULTS.volume;
            document.getElementById('bass-slider').value = DEFAULTS.bass;
            document.getElementById('muffle-slider').value = DEFAULTS.muffle;
            applyNewSettings();
        };

        document.getElementById('settings-btn').onclick = () => document.getElementById('settings-menu').classList.add('open');
        document.getElementById('close-btn').onclick = () => document.getElementById('settings-menu').classList.remove('open');

        window.onload = loadUIFromCookies;
    </script>
</body>
</html>
