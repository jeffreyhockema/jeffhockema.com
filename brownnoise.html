<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Seamless Brown Noise</title>
    <style>
        :root {
            --bg-color: #000000;
            --accent-color: #8B4513; /* Saddle Brown */
            --text-color: #e0e0e0;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        .button-container {
            width: 300px; height: 300px;
            display: flex; justify-content: center; align-items: center;
            position: relative;
        }

        /* Pulsing animation to show it's alive */
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(139, 69, 19, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(139, 69, 19, 0); }
            100% { box-shadow: 0 0 0 0 rgba(139, 69, 19, 0); }
        }

        #master-toggle {
            width: 160px; height: 160px;
            border-radius: 50%;
            border: 4px solid var(--accent-color);
            background: transparent;
            color: var(--accent-color);
            font-size: 1.4rem; font-weight: 800;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 10;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        #master-toggle.playing {
            background: var(--accent-color);
            color: #fff;
            transform: scale(1.05);
            animation: pulse 2s infinite;
            border-color: #fff;
        }

        #status-indicator {
            position: absolute;
            bottom: -40px;
            width: 100%;
            text-align: center;
            font-size: 0.8rem;
            color: #666;
            opacity: 0;
            transition: opacity 0.5s;
        }
        #master-toggle.playing + #status-indicator { opacity: 1; }

        #settings-btn {
            position: absolute; top: 30px; right: 30px;
            background: none; border: none;
            fill: var(--text-color); opacity: 0.5; cursor: pointer;
        }

        #settings-menu {
            position: fixed; bottom: -100%; left: 0; width: 100%;
            background: #111; padding: 30px 20px;
            box-sizing: border-box; transition: bottom 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            border-top: 2px solid var(--accent-color);
            z-index: 100;
        }

        #settings-menu.open { bottom: 0; }

        .control-group { max-width: 400px; margin: 0 auto 25px; }
        label { display: block; margin-bottom: 10px; font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        input[type=range] { width: 100%; accent-color: var(--accent-color); cursor: pointer; height: 4px; border-radius: 2px; }
        
        .btn-row { display: flex; flex-direction: column; gap: 12px; max-width: 400px; margin: 0 auto; }
        .ui-btn { 
            background: #222; border: none; color: white; 
            padding: 14px; border-radius: 8px; cursor: pointer; font-size: 1rem;
        }
        .apply-btn { background: var(--accent-color); font-weight: 600; color: #000; }
        .close-btn { background: transparent; border: 1px solid #333; color: #888; }
    </style>
</head>
<body>

    <button id="settings-btn" aria-label="Settings">
        <svg width="28" height="28" viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
    </button>

    <div class="button-container">
        <button id="master-toggle">PLAY</button>
        <div id="status-indicator">Hardware Loop Active</div>
    </div>

    <audio id="audio1" loop playsinline crossorigin="anonymous"></audio>
    <audio id="audio2" loop playsinline crossorigin="anonymous"></audio>

    <div id="settings-menu">
        <div class="control-group">
            <label>Master Volume</label>
            <input type="range" id="vol-slider" min="0" max="1" step="0.01">
        </div>
        <div class="control-group">
            <label>Bass Depth</label>
            <input type="range" id="bass-slider" min="-5" max="30" step="1">
        </div>
        <div class="control-group">
            <label>Softness (Muffle)</label>
            <input type="range" id="muffle-slider" min="200" max="4000" step="50">
        </div>
        
        <div class="btn-row">
            <button class="ui-btn apply-btn" id="apply-btn">Generate & Apply</button>
            <button class="ui-btn close-btn" id="close-btn">Close</button>
        </div>
    </div>

    <script>
        // --- CONFIG ---
        const LOOP_DURATION = 15; // Seconds
        const FADE_DURATION = 3;  // Seconds
        
        // --- STATE ---
        let audioCtx;
        let sourceNode1, sourceNode2;
        let gainNode1, gainNode2; // The hardware faders
        let isPlaying = false;
        let activePlayer = 1; 
        let switchTimer;
        let fadeCurve, fadeCurveInverse;

        const a1 = document.getElementById('audio1');
        const a2 = document.getElementById('audio2');
        const toggleBtn = document.getElementById('master-toggle');
        const applyBtn = document.getElementById('apply-btn');

        // --- COOKIES ---
        function setCookie(name, val) { document.cookie = `${name}=${val};max-age=31536000;path=/`; }
        function getCookie(name) { 
            let v = document.cookie.match('(^|;) ?' + name + '=([^;]*)(;|$)');
            return v ? v[2] : null;
        }

        // --- AUDIO ENGINE ---

        // Pre-calculate Equal Power Curves (Cosine/Sine)
        // This ensures volume sum is always 1.0 (flat), not 0.7 or 1.4
        function initFadeCurves() {
            const resolution = 100;
            fadeCurve = new Float32Array(resolution);
            fadeCurveInverse = new Float32Array(resolution);
            for (let i = 0; i < resolution; i++) {
                const x = i / (resolution - 1);
                // Cosine equal-power curve
                fadeCurve[i] = Math.cos(x * 0.5 * Math.PI);        // Fading OUT (1 -> 0)
                fadeCurveInverse[i] = Math.sin(x * 0.5 * Math.PI); // Fading IN (0 -> 1)
            }
        }

        function initAudioContext() {
            if (audioCtx) return;
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            
            // Create inputs from the <audio> tags
            sourceNode1 = audioCtx.createMediaElementSource(a1);
            sourceNode2 = audioCtx.createMediaElementSource(a2);

            // Create individual gain nodes (Faders)
            gainNode1 = audioCtx.createGain();
            gainNode2 = audioCtx.createGain();

            // Connect graph: Source -> Gain -> Master
            sourceNode1.connect(gainNode1);
            sourceNode2.connect(gainNode2);
            gainNode1.connect(audioCtx.destination);
            gainNode2.connect(audioCtx.destination);

            // Initial state: Gain 1 is UP, Gain 2 is SILENT
            gainNode1.gain.value = 1;
            gainNode2.gain.value = 0;
            
            initFadeCurves();
        }

        async function generateWavBlob() {
            const bass = parseFloat(document.getElementById('bass-slider').value);
            const muffle = parseFloat(document.getElementById('muffle-slider').value);
            const sr = 44100;
            
            // Offline render to bake in EQ
            const ctx = new OfflineAudioContext(1, sr * LOOP_DURATION, sr);
            
            // Brown Noise Math
            const buffer = ctx.createBuffer(1, sr * LOOP_DURATION, sr);
            const data = buffer.getChannelData(0);
            let lastOut = 0.0;
            for (let i = 0; i < data.length; i++) {
                let white = Math.random() * 2 - 1;
                // Leaky integrator with high gain compensation
                data[i] = (lastOut + (0.02 * white)) / 1.02;
                lastOut = data[i];
                data[i] *= 3.5;
            }

            const source = ctx.createBufferSource();
            source.buffer = buffer;
            
            // Apply User EQ
            const lp = ctx.createBiquadFilter();
            lp.type = "lowpass"; lp.frequency.value = muffle;
            const bs = ctx.createBiquadFilter();
            bs.type = "lowshelf"; bs.frequency.value = 200; bs.gain.value = bass;

            source.connect(lp); lp.connect(bs); bs.connect(ctx.destination);
            source.start();
            
            const rendered = await ctx.startRendering();
            
            // Convert to WAV
            return bufferToWav(rendered);
        }

        function bufferToWav(abuffer) {
            let numOfChan = abuffer.numberOfChannels,
                length = abuffer.length * numOfChan * 2 + 44,
                buffer = new ArrayBuffer(length),
                view = new DataView(buffer),
                channels = [], i, sample, offset = 0, pos = 0;

            const setU16 = (d) => { view.setUint16(pos, d, true); pos += 2; }
            const setU32 = (d) => { view.setUint32(pos, d, true); pos += 4; }

            setU32(0x46464952); setU32(length - 8); setU32(0x45564157); setU32(0x20746d66);
            setU32(16); setU16(1); setU16(numOfChan); setU32(abuffer.sampleRate);
            setU32(abuffer.sampleRate * 2 * numOfChan); setU16(numOfChan * 2); setU16(16);
            setU32(0x61746164); setU32(length - pos - 4);

            for(i=0; i<abuffer.numberOfChannels; i++) channels.push(abuffer.getChannelData(i));

            while(pos < length) {
                for(i=0; i<numOfChan; i++) {
                    sample = Math.max(-1, Math.min(1, channels[i][offset])); 
                    sample = (sample < 0 ? sample * 0x8000 : sample * 0x7FFF);
                    view.setInt16(pos, sample, true); pos += 2;
                }
                offset++;
            }
            return URL.createObjectURL(new Blob([buffer], {type: "audio/wav"}));
        }

        function scheduleCrossfade() {
            if (!isPlaying) return;
            
            // The magic happens here. We schedule the fade on the hardware clock.
            // audioCtx.currentTime is reliable even when screen is locked.
            const now = audioCtx.currentTime;
            const masterVol = parseFloat(document.getElementById('vol-slider').value);

            // Scale the normalized curve by master volume
            const curveIn = new Float32Array(fadeCurveInverse.length);
            const curveOut = new Float32Array(fadeCurve.length);
            for(let i=0; i<fadeCurve.length; i++) {
                curveIn[i] = fadeCurveInverse[i] * masterVol;
                curveOut[i] = fadeCurve[i] * masterVol;
            }

            if (activePlayer === 1) {
                // Fade 1 -> 2
                // A2 starts playing slightly before the fade
                a2.play();
                
                // Hardware Automation
                gainNode1.gain.setValueCurveAtTime(curveOut, now, FADE_DURATION);
                gainNode2.gain.setValueCurveAtTime(curveIn, now, FADE_DURATION);
                
                activePlayer = 2;
            } else {
                // Fade 2 -> 1
                a1.play();
                
                gainNode1.gain.setValueCurveAtTime(curveIn, now, FADE_DURATION);
                gainNode2.gain.setValueCurveAtTime(curveOut, now, FADE_DURATION);
                
                activePlayer = 1;
            }

            // Schedule next switch. Loop duration minus fade duration to overlap.
            const nextSwitchTime = (LOOP_DURATION - FADE_DURATION) * 1000;
            switchTimer = setTimeout(scheduleCrossfade, nextSwitchTime);
        }

        // --- INTERACTION ---

        toggleBtn.onclick = async function() {
            if (!audioCtx) initAudioContext();
            if (audioCtx.state === 'suspended') await audioCtx.resume();

            if (isPlaying) {
                // Stop
                isPlaying = false;
                clearTimeout(switchTimer);
                
                // Ramp down smoothly to avoid click
                const now = audioCtx.currentTime;
                gainNode1.gain.linearRampToValueAtTime(0, now + 0.1);
                gainNode2.gain.linearRampToValueAtTime(0, now + 0.1);
                
                setTimeout(() => { a1.pause(); a2.pause(); }, 150);
                
                this.textContent = 'PLAY';
                this.classList.remove('playing');
                document.getElementById('status-indicator').innerText = "";
            } else {
                // Play
                this.textContent = 'STOP';
                this.classList.add('playing');
                document.getElementById('status-indicator').innerText = "Buffering...";
                
                if (!a1.src) {
                    const blob = await generateWavBlob();
                    a1.src = blob; a2.src = blob;
                }

                isPlaying = true;
                
                // Reset Gains
                const masterVol = parseFloat(document.getElementById('vol-slider').value);
                gainNode1.gain.value = masterVol;
                gainNode2.gain.value = 0;
                
                // Start A1 immediately
                a1.currentTime = 0;
                a1.play();
                activePlayer = 1;
                document.getElementById('status-indicator').innerText = "Loop Active";

                // Start the cycle
                const firstSwitchTime = (LOOP_DURATION - FADE_DURATION) * 1000;
                switchTimer = setTimeout(scheduleCrossfade, firstSwitchTime);
            }
        };

        applyBtn.onclick = async () => {
            const wasPlaying = isPlaying;
            if (wasPlaying) toggleBtn.click(); // Stop first
            
            applyBtn.textContent = "Rendering...";
            const blob = await generateWavBlob();
            a1.src = blob; a2.src = blob;
            applyBtn.textContent = "Generate & Apply";
            
            setCookie('bass', document.getElementById('bass-slider').value);
            setCookie('muffle', document.getElementById('muffle-slider').value);
            
            if (wasPlaying) toggleBtn.click(); // Restart
        };

        // Volume slider now updates the hardware gain directly
        document.getElementById('vol-slider').oninput = (e) => {
            const val = parseFloat(e.target.value);
            setCookie('volume', val);
            
            if (!isPlaying || !audioCtx) return;
            
            // If we are mid-fade, this might be tricky, but usually 
            // updating the active node is enough for perception.
            if (activePlayer === 1) {
                gainNode1.gain.setTargetAtTime(val, audioCtx.currentTime, 0.1);
            } else {
                gainNode2.gain.setTargetAtTime(val, audioCtx.currentTime, 0.1);
            }
        };

        document.getElementById('settings-btn').onclick = () => document.getElementById('settings-menu').classList.add('open');
        document.getElementById('close-btn').onclick = () => document.getElementById('settings-menu').classList.remove('open');

        window.onload = () => {
            document.getElementById('vol-slider').value = getCookie('volume') || 0.5;
            document.getElementById('bass-slider').value = getCookie('bass') || 10;
            document.getElementById('muffle-slider').value = getCookie('muffle') || 1000;
        };
    </script>
</body>
</html>
