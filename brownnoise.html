<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gapless Brown Noise</title>
    <style>
        :root {
            --bg-color: #050505;
            --accent-color: #8b5a2b;
            --text-color: #dcdcdc;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* --- THE PLAY BUTTON --- */
        .button-wrapper {
            position: relative;
            width: 200px; height: 200px;
            display: flex; justify-content: center; align-items: center;
        }

        #master-toggle {
            width: 140px; height: 140px;
            border-radius: 50%;
            background: transparent;
            border: 4px solid var(--accent-color);
            color: var(--accent-color);
            font-size: 1.5rem; font-weight: 700;
            cursor: pointer;
            z-index: 10;
            transition: all 0.3s ease;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Active State Animation */
        #master-toggle.playing {
            background: var(--accent-color);
            color: #111;
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(139, 90, 43, 0.4);
            border-color: #bfa18f;
        }

        /* --- SETTINGS --- */
        #settings-btn {
            position: absolute; top: 30px; right: 30px;
            background: none; border: none;
            fill: var(--text-color); opacity: 0.5; cursor: pointer;
            padding: 10px;
        }
        
        #settings-menu {
            position: fixed; bottom: -100%; left: 0; width: 100%;
            background: #111; padding: 30px 20px 50px;
            box-sizing: border-box; transition: bottom 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            border-top: 2px solid var(--accent-color);
            z-index: 50; box-shadow: 0 -10px 50px rgba(0,0,0,0.8);
        }
        #settings-menu.open { bottom: 0; }

        .control-group { max-width: 500px; margin: 0 auto 25px; }
        label { display: block; margin-bottom: 12px; font-size: 0.8rem; color: #888; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 600; }
        
        input[type=range] {
            width: 100%; height: 6px; background: #333; border-radius: 3px;
            outline: none; -webkit-appearance: none;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 24px; height: 24px;
            background: var(--accent-color); border-radius: 50%; cursor: pointer;
        }

        .close-btn {
            background: #222; color: #fff; border: 1px solid #444;
            padding: 15px 0; width: 100%; max-width: 500px;
            display: block; margin: 10px auto 0; border-radius: 8px;
            font-size: 1rem; font-weight: 600; cursor: pointer;
        }

        .status-text {
            margin-top: 20px; font-size: 0.8rem; color: #555; letter-spacing: 1px;
            height: 20px;
        }
    </style>
</head>
<body>

    <button id="settings-btn" aria-label="Settings">
        <svg width="28" height="28" viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
    </button>

    <div class="button-wrapper">
        <button id="master-toggle">PLAY</button>
    </div>
    <div class="status-text" id="status">Ready</div>

    <audio id="keep-alive" loop playsinline></audio>

    <div id="settings-menu">
        <div class="control-group">
            <label>Master Volume</label>
            <input type="range" id="vol-slider" min="0" max="1" step="0.01">
        </div>
        <div class="control-group">
            <label>Deep Bass</label>
            <input type="range" id="bass-slider" min="0" max="40" step="1">
        </div>
        <div class="control-group">
            <label>Muffle (Softness)</label>
            <input type="range" id="muffle-slider" min="200" max="5000" step="100">
        </div>
        <button class="close-btn" id="close-btn">Close Controls</button>
    </div>

    <script>
        // --- CONFIG ---
        // A tiny silent WAV file (Base64) to trick the OS into keeping the session active
        const SILENT_WAV = 'data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA';
        
        let audioCtx;
        let brownNoiseNode;
        let gainNode;
        let bassFilter;
        let muffleFilter;
        let isPlaying = false;
        
        const toggleBtn = document.getElementById('master-toggle');
        const keepAliveAudio = document.getElementById('keep-alive');
        const statusText = document.getElementById('status');

        // --- COOKIES ---
        function setCookie(n,v) { document.cookie = `${n}=${v};max-age=31536000;path=/`; }
        function getCookie(n) { let v = document.cookie.match('(^|;) ?'+n+'=([^;]*)(;|$)'); return v?v[2]:null; }

        // --- AUDIO ENGINE ---
        function initAudio() {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();

            // 1. Create the Filter Graph
            gainNode = audioCtx.createGain();
            bassFilter = audioCtx.createBiquadFilter();
            muffleFilter = audioCtx.createBiquadFilter();

            bassFilter.type = "lowshelf";
            bassFilter.frequency.value = 200; // Bass frequency
            
            muffleFilter.type = "lowpass"; // Cuts highs

            // Chain: Source (Created later) -> Muffle -> Bass -> Gain -> Destination
            muffleFilter.connect(bassFilter);
            bassFilter.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            loadSettings();
        }

        // Generates 5 seconds of brown noise and returns a "BufferSource"
        // BufferSources with loop=true are handled by the hardware = PERFECT LOOP
        function startBrownNoise() {
            const bufferSize = audioCtx.sampleRate * 5; // 5 seconds
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            
            let lastOut = 0.0;
            for (let i = 0; i < bufferSize; i++) {
                const white = Math.random() * 2 - 1;
                data[i] = (lastOut + (0.02 * white)) / 1.02;
                lastOut = data[i];
                data[i] *= 3.5; // Gain compensation
            }

            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            source.loop = true; // <--- The magic Gapless Switch
            source.connect(muffleFilter);
            source.start(0);
            return source;
        }

        function loadSettings() {
            const vol = getCookie('volume') || 0.5;
            const bass = getCookie('bass') || 20;
            const muffle = getCookie('muffle') || 1000; // Lower default for better sleep

            document.getElementById('vol-slider').value = vol;
            document.getElementById('bass-slider').value = bass;
            document.getElementById('muffle-slider').value = muffle;

            updateAudioNodes();
        }

        function updateAudioNodes() {
            if (!audioCtx) return;
            const vol = document.getElementById('vol-slider').value;
            const bass = document.getElementById('bass-slider').value;
            const muffle = document.getElementById('muffle-slider').value;

            // Smooth transitions to prevent clicks
            const now = audioCtx.currentTime;
            gainNode.gain.setTargetAtTime(vol, now, 0.1);
            bassFilter.gain.setTargetAtTime(bass, now, 0.1);
            muffleFilter.frequency.setTargetAtTime(muffle, now, 0.1);

            setCookie('volume', vol);
            setCookie('bass', bass);
            setCookie('muffle', muffle);
        }

        // --- INTERACTION ---
        toggleBtn.addEventListener('click', async () => {
            if (!audioCtx) initAudio();

            // iOS requires Resume() on click
            if (audioCtx.state === 'suspended') await audioCtx.resume();

            if (!isPlaying) {
                // START SEQUENCE
                
                // 1. Start the "Keeper" (Silent HTML Audio)
                // This keeps the browser tab "Active" in the OS eyes
                keepAliveAudio.src = SILENT_WAV;
                keepAliveAudio.play().catch(e => console.log("Background keeper failed", e));
                
                // 2. Start the Real Noise (Web Audio)
                if (brownNoiseNode) brownNoiseNode.stop();
                brownNoiseNode = startBrownNoise();

                // UI Updates
                toggleBtn.textContent = "STOP";
                toggleBtn.classList.add('playing');
                statusText.textContent = "Loop Active • Background Enabled";
                statusText.style.opacity = "1";
                
                isPlaying = true;
            } else {
                // STOP SEQUENCE
                brownNoiseNode.stop();
                keepAliveAudio.pause();
                
                toggleBtn.textContent = "PLAY";
                toggleBtn.classList.remove('playing');
                statusText.textContent = "Ready";
                statusText.style.opacity = "0.5";
                
                isPlaying = false;
            }
        });

        // Event Listeners for Sliders
        ['vol-slider', 'bass-slider', 'muffle-slider'].forEach(id => {
            document.getElementById(id).addEventListener('input', updateAudioNodes);
        });

        // Menu Logic
        const menu = document.getElementById('settings-menu');
        document.getElementById('settings-btn').onclick = () => menu.classList.add('open');
        document.getElementById('close-btn').onclick = () => menu.classList.remove('open');

        // Initial Load
        window.onload = loadSettings;
    </script>
</body>
</html>
